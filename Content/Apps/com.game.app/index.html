
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19OS Game Search</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  height: 100vh;
  background: #0f0f0f;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: white;
  overflow: hidden;
}

/* ===== SEARCH PANEL ===== */
.game-search {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 16px;
  padding: 12px;

  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

#gameSearchInput {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;

  background: rgba(255,255,255,0.1);
  color: white;
}

/* ===== RESULTS ===== */
#gameResults {
  margin-top: 10px;
  max-height: 200px;
  overflow-y: auto;
}

.game-item {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: center;
  transition: 0.2s;
}

.game-item:hover,
.game-item.active {
  background: rgba(255,255,255,0.15);
}

/* ===== WINDOWS ===== */
.window {
  position: absolute;
  width: 500px;
  height: 350px;
  background: rgba(30,30,30,0.95);
  border-radius: 16px;
  overflow: hidden;

  display: none;
  flex-direction: column;

  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

.window-header {
  padding: 10px;
  background: rgba(255,255,255,0.05);
  cursor: move;
  display: flex;
  justify-content: space-between;
}

.window iframe {
  flex: 1;
  border: none;
}

.close-btn {
  cursor: pointer;
  color: red;
}
</style>
</head>

<body>

<!-- 🔍 SEARCH -->
<div class="game-search">
  <input id="gameSearchInput" placeholder="Search games..." autofocus>
  <div id="gameResults"></div>
</div>

<!-- 🪟 GAME WINDOWS -->


<script>
/* ===== GAME DATABASE ===== */
const games = [
  { name: "Steal A Brainrot", id: "stealabrainrot", icon: "" },
  { name: "Ping Pong", id: "PingPong", icon: "" },
  { name: "Crimson Death", id: "crimsondeat", icon: "" },
  { name: "Pac Man", id: "PacMan",icon: "" }
];

let selectedIndex = -1;

/* ===== SEARCH ===== */
const input = document.getElementById("gameSearchInput");
const results = document.getElementById("gameResults");

input.addEventListener("input", renderGames);

function renderGames() {
  const value = input.value.toLowerCase();
  results.innerHTML = "";

  const filtered = games.filter(g =>
    g.name.toLowerCase().includes(value)
  );

  filtered.forEach((game, index) => {
    const div = document.createElement("div");
    div.className = "game-item";
    div.innerHTML = `${game.icon} ${game.name}`;

    div.onclick = () => openGame(game.id);

    results.appendChild(div);
  });

  selectedIndex = -1;
}

/* ===== OPEN GAME ===== */
function openGame(id) {
  const win = document.getElementById(id);
  if (!win) return;

  win.style.display = "flex";
  win.style.zIndex = Date.now();

  localStorage.setItem("lastGame", id);
}

/* ===== CLOSE ===== */
function closeWindow(id) {
  const win = document.getElementById(id);
  if (win) win.style.display = "none";
}

/* ===== KEYBOARD NAV ===== */
input.addEventListener("keydown", (e) => {
  const items = document.querySelectorAll(".game-item");

  if (e.key === "ArrowDown") {
    selectedIndex = (selectedIndex + 1) % items.length;
  }

  if (e.key === "ArrowUp") {
    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
  }

  if (e.key === "Enter" && items[selectedIndex]) {
    items[selectedIndex].click();
  }

  items.forEach(i => i.classList.remove("active"));
  if (items[selectedIndex]) {
    items[selectedIndex].classList.add("active");
  }
});

/* ===== DRAG WINDOWS ===== */
document.querySelectorAll(".window").forEach(win => {
  const header = win.querySelector(".window-header");

  let offsetX, offsetY, isDown = false;

  header.addEventListener("mousedown", (e) => {
    isDown = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDown) return;

    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });

  document.addEventListener("mouseup", () => {
    isDown = false;
  });
});

/* ===== LOAD LAST GAME ===== */
window.onload = () => {
  const last = localStorage.getItem("lastGame");
  if (last) openGame(last);

  renderGames();
};
</script>

</body>
</html>
