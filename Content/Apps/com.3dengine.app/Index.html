<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Geometry Dash Neon Engine</title>

<style>

:root{
    --bg1:#070b18;
    --bg2:#111b3a;
    --cyan:#4fdfff;
    --green:#71ffb6;
    --pink:#ff4f91;
    --orange:#ffb347;
    --white:#f4fbff;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#163b6a55,transparent 35%),
    radial-gradient(circle at bottom right,#4f1b6a66,transparent 40%),
    linear-gradient(180deg,var(--bg2),var(--bg1));
    font-family:Inter,system-ui,sans-serif;
    color:white;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
    touch-action:none;
}

.ui{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:14px;
    display:flex;
    justify-content:space-between;
    pointer-events:none;
    z-index:10;
}

.card{
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    padding:12px 16px;
    backdrop-filter:blur(10px);
}

.title{
    font-size:14px;
    color:#bcd6ff;
    text-transform:uppercase;
    letter-spacing:.14em;
}

.value{
    font-size:26px;
    font-weight:900;
}

.centerOverlay{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    z-index:20;
    background:linear-gradient(180deg,#00000088,#000000bb);
}

.menu{
    width:min(500px,92vw);
    background:rgba(10,14,28,.88);
    border:1px solid rgba(255,255,255,.12);
    border-radius:28px;
    padding:28px;
    text-align:center;
    box-shadow:0 25px 90px rgba(0,0,0,.5);
}

h1{
    margin:0 0 10px;
    font-size:clamp(2.5rem,7vw,5rem);
    line-height:.9;
    letter-spacing:-.08em;
}

p{
    color:#b7c7d7;
    line-height:1.6;
}

button{
    border:0;
    border-radius:18px;
    padding:16px 24px;
    font-size:18px;
    font-weight:900;
    color:#071019;
    background:linear-gradient(135deg,var(--cyan),var(--green));
    cursor:pointer;
    width:100%;
    margin-top:18px;
    box-shadow:0 10px 35px rgba(79,223,255,.35);
}

.controls{
    margin-top:20px;
    font-size:14px;
    color:#c9d7ea;
}

.mobileJump{
    position:fixed;
    inset:0;
    z-index:5;
}

.flash{
    animation:flash .18s linear;
}

@keyframes flash{
    0%{filter:brightness(1)}
    50%{filter:brightness(2)}
    100%{filter:brightness(1)}
}

.hidden{
    display:none;
}

</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="ui">
    <div class="card">
        <div class="title">Score</div>
        <div class="value" id="score">0</div>
    </div>

    <div class="card">
        <div class="title">Best</div>
        <div class="value" id="best">0</div>
    </div>

    <div class="card">
        <div class="title">Speed</div>
        <div class="value" id="speed">1x</div>
    </div>
</div>

<div class="centerOverlay" id="overlay">
    <div class="menu">
        <h1>NEON<br>DASH</h1>

        <p>
            Advanced Geometry Dash style engine.<br>
            Jump over spikes, fly through portals,
            survive infinite levels.
        </p>

        <button id="startBtn">
            START GAME
        </button>

        <div class="controls">
            SPACE / W / UP ARROW / TAP SCREEN
        </div>
    </div>
</div>

<div class="mobileJump" id="mobileJump"></div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const speedEl = document.getElementById("speed");

const best = localStorage.getItem("neon-best") || 0;
bestEl.textContent = best;

function resize(){
    canvas.width = innerWidth * devicePixelRatio;
    canvas.height = innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
resize();
addEventListener("resize",resize);

const game = {
    running:false,
    score:0,
    speed:8,
    gravity:.82,
    camera:0,
    groundY:innerHeight-180,
    obstacleTimer:0,
    bgOffset:0,
};

const player = {
    x:180,
    y:0,
    size:48,
    vy:0,
    rotation:0,
    grounded:false,
    mode:"cube",
    trail:[]
};

player.y = game.groundY;

const obstacles = [];
const particles = [];
const portals = [];
const stars = [];

for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*innerWidth,
        y:Math.random()*innerHeight,
        s:Math.random()*2+1,
        v:Math.random()*2+.5
    });
}

function reset(){

    game.running = true;
    game.score = 0;
    game.speed = 8;
    game.camera = 0;
    game.obstacleTimer = 0;

    player.x = 180;
    player.y = game.groundY;
    player.vy = 0;
    player.rotation = 0;
    player.grounded = true;
    player.mode = "cube";

    obstacles.length = 0;
    particles.length = 0;
    portals.length = 0;

    overlay.classList.add("hidden");
}

function jump(){

    if(!game.running){
        reset();
        return;
    }

    if(player.mode === "cube"){
        if(player.grounded){
            player.vy = -16;
            player.grounded = false;
        }
    }

    if(player.mode === "ship"){
        player.vy = -10;
    }
}

function spawnObstacle(){

    const type = Math.random();

    if(type < .75){

        obstacles.push({
            type:"spike",
            x:innerWidth + 100,
            y:game.groundY + 50,
            w:60,
            h:80 + Math.random()*80
        });

    }else{

        portals.push({
            x:innerWidth + 100,
            y:game.groundY - 120,
            r:45
        });

    }
}

function drawBackground(){

    const g = ctx.createLinearGradient(0,0,0,innerHeight);

    g.addColorStop(0,"#09162f");
    g.addColorStop(1,"#050711");

    ctx.fillStyle = g;
    ctx.fillRect(0,0,innerWidth,innerHeight);

    for(const s of stars){

        s.x -= s.v;

        if(s.x < -10){
            s.x = innerWidth + 20;
            s.y = Math.random()*innerHeight;
        }

        ctx.fillStyle = "white";
        ctx.fillRect(s.x,s.y,s.s,s.s);
    }

    ctx.fillStyle = "#102040";

    for(let i=0;i<30;i++){

        const x = i*140 - (game.camera*.3 % 140);

        ctx.fillRect(
            x,
            innerHeight-260,
            70,
            260
        );
    }

    ctx.fillStyle = "#173566";

    for(let i=0;i<60;i++){

        ctx.fillRect(
            i*80 - (game.camera % 80),
            game.groundY + 50,
            40,
            100
        );
    }

    ctx.strokeStyle = "#50dfff";
    ctx.lineWidth = 3;

    for(let i=0;i<innerWidth+80;i+=40){

        ctx.beginPath();
        ctx.moveTo(i-(game.camera%40),game.groundY+50);
        ctx.lineTo(i+20-(game.camera%40),game.groundY+70);
        ctx.stroke();
    }
}

function drawPlayer(){

    ctx.save();

    ctx.translate(player.x,player.y);
    ctx.rotate(player.rotation);

    ctx.shadowColor = "#50dfff";
    ctx.shadowBlur = 25;

    if(player.mode === "cube"){

        const grad = ctx.createLinearGradient(-30,-30,30,30);

        grad.addColorStop(0,"#50dfff");
        grad.addColorStop(1,"#71ffb6");

        ctx.fillStyle = grad;

        ctx.fillRect(
            -player.size/2,
            -player.size/2,
            player.size,
            player.size
        );

        ctx.fillStyle = "white";

        ctx.fillRect(-8,-8,16,16);

    }else{

        ctx.fillStyle = "#ff4f91";

        ctx.beginPath();
        ctx.moveTo(-30,20);
        ctx.lineTo(30,0);
        ctx.lineTo(-30,-20);
        ctx.closePath();
        ctx.fill();
    }

    ctx.restore();
}

function drawObstacles(){

    for(const o of obstacles){

        const grad = ctx.createLinearGradient(o.x,o.y-o.h,o.x,o.y);

        grad.addColorStop(0,"#ff4f91");
        grad.addColorStop(1,"#ffb347");

        ctx.fillStyle = grad;

        ctx.shadowColor = "#ff4f91";
        ctx.shadowBlur = 20;

        ctx.beginPath();

        ctx.moveTo(o.x,o.y);
        ctx.lineTo(o.x+o.w/2,o.y-o.h);
        ctx.lineTo(o.x+o.w,o.y);

        ctx.closePath();
        ctx.fill();
    }
}

function drawPortals(){

    for(const p of portals){

        ctx.save();

        ctx.translate(p.x,p.y);

        ctx.strokeStyle = "#9d5cff";
        ctx.lineWidth = 8;

        ctx.shadowColor = "#9d5cff";
        ctx.shadowBlur = 30;

        ctx.beginPath();
        ctx.arc(0,0,p.r,0,Math.PI*2);
        ctx.stroke();

        ctx.restore();
    }
}

function updatePlayer(){

    if(player.mode === "cube"){

        player.vy += game.gravity;
        player.y += player.vy;

        if(!player.grounded){
            player.rotation += .12;
        }

        if(player.y >= game.groundY){

            player.y = game.groundY;
            player.vy = 0;
            player.grounded = true;
            player.rotation = 0;
        }

    }else{

        player.vy += .35;
        player.y += player.vy;
        player.rotation = player.vy * .04;

        if(player.y > game.groundY + 80){
            endGame();
        }

        if(player.y < 80){
            player.y = 80;
            player.vy = 0;
        }
    }
}

function updateObjects(){

    game.obstacleTimer--;

    if(game.obstacleTimer <= 0){

        spawnObstacle();

        game.obstacleTimer =
            70 - Math.min(40,game.speed*2);
    }

    for(const o of obstacles){

        o.x -= game.speed;

        if(
            player.x + player.size/2 > o.x &&
            player.x - player.size/2 < o.x + o.w &&
            player.y + player.size/2 > o.y - o.h
        ){
            endGame();
        }

        if(!o.passed && o.x < player.x){

            o.passed = true;
            game.score += 10;
        }
    }

    for(const p of portals){

        p.x -= game.speed;

        const dx = player.x - p.x;
        const dy = player.y - p.y;

        if(Math.hypot(dx,dy) < p.r + 20){

            player.mode =
                player.mode === "cube"
                ? "ship"
                : "cube";

            p.used = true;

            document.body.classList.add("flash");

            setTimeout(()=>{
                document.body.classList.remove("flash");
            },180);
        }
    }

    for(let i=obstacles.length-1;i>=0;i--){
        if(obstacles[i].x < -200){
            obstacles.splice(i,1);
        }
    }

    for(let i=portals.length-1;i>=0;i--){
        if(portals[i].x < -200 || portals[i].used){
            portals.splice(i,1);
        }
    }
}

function emitTrail(){

    particles.push({
        x:player.x - 10,
        y:player.y,
        size:Math.random()*8+4,
        life:40,
        vy:(Math.random()-.5)*2
    });

    for(const p of particles){

        p.x -= game.speed*.6;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle =
            `rgba(80,223,255,${p.life/40})`;

        ctx.fillRect(
            p.x,
            p.y,
            p.size,
            p.size
        );
    }

    for(let i=particles.length-1;i>=0;i--){
        if(particles[i].life <= 0){
            particles.splice(i,1);
        }
    }
}

function endGame(){

    game.running = false;

    const best =
        Math.max(
            Number(localStorage.getItem("neon-best")||0),
            Math.floor(game.score)
        );

    localStorage.setItem("neon-best",best);

    bestEl.textContent = best;

    overlay.classList.remove("hidden");
}

function updateHud(){

    scoreEl.textContent =
        Math.floor(game.score);

    speedEl.textContent =
        game.speed.toFixed(1)+"x";
}

function loop(){

    drawBackground();

    if(game.running){

        game.camera += game.speed;

        game.score += .12 * game.speed;

        game.speed += .002;

        updatePlayer();

        updateObjects();

        emitTrail();
    }

    drawPortals();
    drawObstacles();
    drawPlayer();

    updateHud();

    requestAnimationFrame(loop);
}

loop();

function keyJump(e){

    const k = e.code;

    if(
        k === "Space" ||
        k === "ArrowUp" ||
        k === "KeyW"
    ){
        e.preventDefault();
        jump();
    }
}

addEventListener("keydown",keyJump);

document.getElementById("mobileJump")
.addEventListener("pointerdown",jump);

startBtn.addEventListener("click",reset);

</script>
</body>
</html>
