<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>19OS</title>

<link rel="stylesheet" href="CSS/main.css">

<style>
/* ===============================
   🍎 CONTROL CENTER
=============================== */
.cc {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
  pointer-events: none;
}

.cc-panel {
  width: 320px;
  margin: 20px;
  padding: 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  transform: translateY(-20px) scale(0.95);
  opacity: 0;
  transition: 0.3s ease;
  pointer-events: auto;
}

.cc.show .cc-panel {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.cc-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

#ccToggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}

.hidden { display: none; }

/* ================= NOTIFICATIONS ================= */
#notifications {
  position: fixed;
  top: 80px;
  right: 20px;
}

.notification {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 5px;
}
   #systemUpdateLock {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999;
}

.update-box {
  text-align: center;
  width: 300px;
}

.bar {
  width: 100%;
  height: 8px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 20px 0;
}

#barFill {
  width: 0%;
  height: 100%;
  background: lime;
  transition: width 0.2s linear;
}

#percent {
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- CONTROL CENTER -->
<div id="controlCenter" class="cc hidden">
  <div class="cc-panel glass">
    <div>Control Center</div>

    <div>
      <button onclick="setFocusMode('gaming')">🎮</button>
      <button onclick="setFocusMode('coding')">💻</button>
      <button onclick="setFocusMode('chill')">🌙</button>
    </div>

    <div>
      <button onclick="toggleWifi()">📶</button>
      <button onclick="toggleSound()">🔊</button>
      <button onclick="toggleTheme()">🎨</button>
    </div>
  </div>
</div>

<button id="ccToggle" onclick="toggleControlCenter()">⚙️</button>

<h2>19OS</h2>

<!-- WINDOWS -->
<div id="updateScreen" class="update-ui">
  <h2>System Update</h2>
  
  <p id="updateStatus">Idle</p>

  <div class="progress-bar">
    <div id="updateProgress"></div>
  </div>

  
</div>
   
<div id="cameraApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>

  <div class="window-titlebar">
    <span>Camera</span>
    <button onclick="closeWindow('cameraApp')">×</button>
  </div>

  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="cameraCanvas" class="hidden"></canvas>

  <button id="snapBtn">📸</button>
  <button id="switchBtn">🔄</button>
  <button id="downloadBtn" class="hidden">💾</button>
</div>

<!-- KEEPING YOUR APPS -->
<div id="myApp" class="appwindow hidden">
  <div class="window-titlebar">
    <span>Calculator</span>
    <button onclick="closeWindow('myApp')">×</button>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<div id="browser" class="appwindow hidden">
  <div class="window-titlebar">
    <span>Browser</span>
    <button onclick="closeWindow('browser')">×</button>
  </div>
  <iframe src="Apps/com.browser.app/Index.html" class="window-content"></iframe>
</div>

<!-- DOCK -->
<div class="dock">
  <button onclick="openWindow('myApp')">Calc</button>
  <button onclick="openWindow('browser')">🌐</button>
  <button onclick="openWindow('cameraApp')">📷</button>
  <button onclick="openPoki()">🎮</button>
</div>

<div id="notifications"></div>

<script src="js/Mode.js"></script>
   <script src="js/UpdatingPage.js"></script>
<script src="js/Plugin.js"></script>
<script>
// CAMERA FIX
let currentStream=null;
let useFront=true;

async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: useFront ? "user":"environment" }
  });

  cameraVideo.srcObject = currentStream;
}

// WINDOW SYSTEM
let z=100;

function bringToFront(win) {
  let maxZ = 0;
  document.querySelectorAll(".appwindow").forEach(w => {
    const z = parseInt(getComputedStyle(w).zIndex) || 0;
    if (z > maxZ) maxZ = z;
  });
  win.style.zIndex = maxZ + 1;
}

function openWindow(id){
  let el=document.getElementById(id);
  el.classList.remove("hidden");
  bringToFront(el);

  if(id==="cameraApp") startCamera();
}

function closeWindow(id){
  let el=document.getElementById(id);
  el.classList.add("hidden");

  if(id==="cameraApp" && currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
    currentStream=null;
  }
}

// DRAG
const startDrag = (e) => {
  const isTouch = e.type === "touchstart";

  const getX = (ev) => isTouch ? ev.touches[0].clientX : ev.clientX;
  const getY = (ev) => isTouch ? ev.touches[0].clientY : ev.clientY;

  // ONLY prevent default on touch (not mouse!)
  if (isTouch && e.cancelable) e.preventDefault();

  bringToFront(win);

  const rect = win.getBoundingClientRect();
  const shiftX = getX(e) - rect.left;
  const shiftY = getY(e) - rect.top;

  const move = (ev) => {
    if (isTouch && (!ev.touches || !ev.touches.length)) return;

    win.style.left = (getX(ev) - shiftX) + "px";
    win.style.top = (getY(ev) - shiftY) + "px";
  };

  const end = () => {
    document.removeEventListener(moveEvent, move);
    document.removeEventListener(endEvent, end);
  };

  const moveEvent = isTouch ? "touchmove" : "mousemove";
  const endEvent = isTouch ? "touchend" : "mouseup";

  document.addEventListener(moveEvent, move);
  document.addEventListener(endEvent, end);
};
// CONTROL CENTER FIX
function toggleControlCenter(){
  let cc=document.getElementById("controlCenter");

  if(cc.classList.contains("show")){
    cc.classList.remove("show");
    setTimeout(()=>cc.classList.add("hidden"),200);
  }else{
    cc.classList.remove("hidden");
    setTimeout(()=>cc.classList.add("show"),10);
  }
}

// SAFE CLICK CLOSE
document.addEventListener("click",e=>{
  let cc=document.getElementById("controlCenter");
  if(!cc) return;

  let panel=cc.querySelector(".cc-panel");
  if(!panel) return;

  if(!panel.contains(e.target) && e.target.id!=="ccToggle"){
    cc.classList.remove("show");
    setTimeout(()=>cc.classList.add("hidden"),200);
  }
});

// SYSTEM
function notify(msg){
  let n=document.createElement("div");
  n.className="notification";
  n.innerText=msg;
  notifications.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

function toggleWifi(){ notify("WiFi toggled"); }
function toggleSound(){ notify("Sound toggled"); }
function toggleTheme(){ notify("Theme switched"); }
function setFocusMode(m){ notify("Mode: "+m); }

// POKI FIX
function openPoki(){
  window.open("https://poki.com","_blank");
}
</script>

</body>
</html>
