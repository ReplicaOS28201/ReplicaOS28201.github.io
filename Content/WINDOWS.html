<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplicaOS - Desktop</title>
    <style>
        :root {
            --taskbar-bg: rgba(20, 20, 20, 0.85);
            --win-bg: #f3f3f3;
            --accent: #0078d4;
            --title-bar: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            /* High-quality backup wallpaper */
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Desktop Icons Area */
        #desktop {
            height: calc(100vh - 48px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-auto-flow: column;
            gap: 15px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            cursor: pointer;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .icon:hover { background: rgba(255, 255, 255, 0.15); }
        .icon img { width: 45px; height: 45px; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .icon span { font-size: 12px; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        /* Window Styling */
        .window {
            position: absolute;
            width: 600px;
            height: 400px;
            background: var(--win-bg);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }

        .title-bar {
            padding: 10px 15px;
            background: var(--title-bar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default; /* Drag logic handles this */
            user-select: none;
            border-bottom: 1px solid #ddd;
        }

        .window-controls { display: flex; gap: 5px; }
        .window-controls button {
            border: none;
            background: transparent;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-close:hover { background: #e81123; color: white; }
        .btn-min:hover { background: rgba(0,0,0,0.1); }

        .content { flex-grow: 1; overflow: auto; position: relative; }

        /* Taskbar */
        #taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 48px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 99999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .taskbar-left { display: flex; align-items: center; height: 100%; }
        .start-btn { padding: 0 15px; height: 100%; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .start-btn:hover { background: rgba(255,255,255,0.1); }

        .taskbar-right {
            color: white;
            padding-right: 15px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon" onclick="openWindow('win-browser')">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Browser">
            <span>Browser</span>
        </div>
        <div class="icon" onclick="openWindow('win-about')">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png" alt="About">
            <span>About</span>
        </div>
    </div>

    <div id="win-browser" class="window" style="top: 80px; left: 80px;">
        <div class="title-bar" onmousedown="dragElement(event, 'win-browser')">
            <span>Internet Browser</span>
            <div class="window-controls">
                <button class="btn-min" onclick="closeWindow('win-browser')">─</button>
                <button class="btn-close" onclick="closeWindow('win-browser')">✕</button>
            </div>
        </div>
        <div class="content">
            <iframe src="https://en.m.wikipedia.org/wiki/Main_Page" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="win-about" class="window" style="top: 150px; left: 200px;">
        <div class="title-bar" onmousedown="dragElement(event, 'win-about')">
            <span>About ReplicaOS</span>
            <div class="window-controls">
                <button class="btn-close" onclick="closeWindow('win-about')">✕</button>
            </div>
        </div>
        <div class="content" style="padding: 20px;">
            <h3 style="margin-top:0;">ReplicaOS 28201</h3>
            <p>Version 1.0.4 (Stable Build)</p>
            <p>Experience a desktop environment in your browser.</p>
            <hr style="border: 0; border-top: 1px solid #ccc;">
            <p id="visitor-count">Connecting to server...</p>
        </div>
    </div>

    <div id="taskbar">
        <div class="taskbar-left">
            <div class="start-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" width="22" alt="Start">
            </div>
        </div>
        <div class="taskbar-right">
            <div id="clock-time" style="font-weight: 500;">12:00 PM</div>
            <div id="clock-date" style="opacity: 0.8;">05/07/2026</div>
        </div>
    </div>

    <script>
        let highestZ = 100;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            focusWindow(id);
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }

        function focusWindow(id) {
            highestZ++;
            document.getElementById(id).style.zIndex = highestZ;
        }

        // --- Improved Draggable Logic ---
        function dragElement(e, id) {
            const elmnt = document.getElementById(id);
            focusWindow(id);
            
            let pos1 = 0, pos2 = 0, pos3 = e.clientX, pos4 = e.clientY;

            document.onmousemove = function(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            };

            document.onmouseup = function() {
                document.onmousemove = null;
                document.onmouseup = null;
            };
        }

        // --- Clock Logic ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('clock-date').innerText = now.toLocaleDateString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Visitor Tracking (Local Storage Sim for Reliability) ---
        function updateVisits() {
            let visits = localStorage.getItem('replica_visits') || 0;
            visits = parseInt(visits) + 1;
            localStorage.setItem('replica_visits', visits);
            document.getElementById('visitor-count').innerText = `Session/Local Visits: ${visits}`;
        }
        updateVisits();
    </script>
</body>
</html>
