<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ReplicaOS 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
  touch-action: none;
  perspective: 1400px;
}

#ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

#dock-container {
  pointer-events: auto;
}

/* ================= WINDOWS ================= */
.appwindow {
  position: absolute;
  width: 320px;
  height: 220px;
  background: rgba(20,20,20,0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  overflow: hidden;
  pointer-events: auto;
  transform-style: preserve-3d;
  transform: rotateX(4deg) rotateY(-5deg) translateZ(0);
  transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
  box-shadow: 0 16px 28px rgba(0, 0, 0, 0.45);

  left: 100px;
  top: 100px;
}

.hidden { display: none; }

.appwindow.active-3d {
  border-color: rgba(122, 188, 255, 0.6);
  box-shadow: 0 24px 40px rgba(0, 0, 0, 0.6), 0 0 26px rgba(116, 177, 255, 0.25);
  transform: rotateX(2deg) rotateY(0deg) translateZ(32px);
}

.window-titlebar {
  height: 40px;
  background: rgba(255,255,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
  color: white;
  cursor: grab;
}

.window-content {
  width: 100%;
  height: calc(100% - 40px);
  color: white;
  border: none;
}

.system-log {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 320px;
  max-height: 35vh;
  overflow: auto;
  color: #dce7ff;
  font-size: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  backdrop-filter: blur(8px);
  pointer-events: auto;
  z-index: 1200;
}

.system-log h3 {
  margin: 0;
  padding: 8px 10px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  font-size: 13px;
}

#system-log-list {
  padding: 10px;
}

#system-log-list div {
  margin-bottom: 8px;
}

.quick-send {
  margin-top: 8px;
  width: 100%;
  background: rgba(255, 255, 255, 0.14);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 6px;
  padding: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">

  <!-- CALC -->
  <div id="calc" class="appwindow hidden">
    <div class="window-titlebar">
      Calculator
      <button onclick="closeWindow('calc')">×</button>
    </div>
    <div class="window-content">
      <iframe class="window-content" src="Apps/com.calc.app/Index.html"></iframe>
      <button class="quick-send" onclick="Dock.send('calc', { source: 'calc', message: 'calc ping', time: Date.now() })">Send data to System</button>
    </div>
  </div>

  <!-- NOTES -->
  <div id="notes" class="appwindow hidden">
    <div class="window-titlebar">
      Notes
      <button onclick="closeWindow('notes')">×</button>
    </div>
    <div class="window-content">
      <textarea style="width:100%; height:70%; background:transparent; color:white; border:none;">Write notes...</textarea>
      <button class="quick-send" onclick="Dock.send('notes', { source: 'notes', message: 'notes ping', time: Date.now() })">Send data to System</button>
    </div>
  </div>

  <!-- BROWSER -->
  <div id="browser" class="appwindow hidden">
    <div class="window-titlebar">
      Browser
      <button onclick="closeWindow('browser')">×</button>
    </div>
    <div class="window-content">
      <iframe class="window-content" src="https://example.com"></iframe>
      <button class="quick-send" onclick="Dock.send('browser', { source: 'browser', message: 'browser ping', time: Date.now() })">Send data to System</button>
    </div>
  </div>

  <div id="dock-container"></div>

  <aside class="system-log" aria-live="polite">
    <h3>System Log</h3>
    <div id="system-log-list"></div>
  </aside>
</div>

<script>

/* ================= WINDOW SYSTEM ================= */
function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('hidden');
  bringToTop(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('hidden');
}

let topZIndex = 2000;

function bringToTop(target) {
  const el = typeof target === 'string' ? document.getElementById(target) : target;
  if (!el) return;
  document.querySelectorAll('.appwindow').forEach((win) => win.classList.remove('active-3d'));
  el.classList.add('active-3d');
  topZIndex += 1;
  el.style.zIndex = String(topZIndex);
}

/* ================= DRAG SYSTEM ================= */
let activeDrag = null;

document.querySelectorAll('.appwindow').forEach((win) => {
  const bar = win.querySelector('.window-titlebar');
  const closeBtn = bar.querySelector('button');

  win.addEventListener('pointerdown', () => bringToTop(win));
  closeBtn.addEventListener('pointerdown', (e) => e.stopPropagation());

  bar.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return;
    e.preventDefault();

    bringToTop(win);
    const rect = win.getBoundingClientRect();

    activeDrag = {
      win,
      pointerId: e.pointerId,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
    };

    bar.setPointerCapture(e.pointerId);
  });

  bar.addEventListener('pointermove', (e) => {
    if (!activeDrag || activeDrag.pointerId !== e.pointerId || activeDrag.win !== win) return;
    e.preventDefault();

    const nextLeft = e.clientX - activeDrag.offsetX;
    const nextTop = e.clientY - activeDrag.offsetY;
    win.style.left = `${nextLeft}px`;
    win.style.top = `${nextTop}px`;
    apply3DTilt(win, { x: e.clientX, y: e.clientY });
  });

  bar.addEventListener('pointerup', (e) => stopDrag(e, bar));
  bar.addEventListener('pointercancel', (e) => stopDrag(e, bar));
});

function stopDrag(e, bar) {
  if (!activeDrag || activeDrag.pointerId !== e.pointerId) return;
  activeDrag.win.style.transform = 'rotateX(2deg) rotateY(0deg) translateZ(24px)';
  activeDrag = null;
  if (bar.hasPointerCapture(e.pointerId)) {
    bar.releasePointerCapture(e.pointerId);
  }
}

function apply3DTilt(win, pos) {
  const rect = win.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  const deltaX = (pos.x - centerX) / rect.width;
  const deltaY = (pos.y - centerY) / rect.height;
  const rotateY = Math.max(-10, Math.min(10, deltaX * 14));
  const rotateX = Math.max(-10, Math.min(10, -deltaY * 14));
  win.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(28px)`;
}

/* ================= GAMEPAD SUPPORT (PlayStation/Xbox) ================= */
const appOrder = ['calc', 'notes', 'browser'];
let selectedAppIndex = 0;
let gamepadLastAction = 0;

window.addEventListener('gamepadconnected', (event) => {
  if (!window.System) return;
  System.send('gamepad', {
    type: 'connected',
    id: event.gamepad.id,
    index: event.gamepad.index,
  });
  renderSystemLogs();
});

window.addEventListener('gamepaddisconnected', (event) => {
  if (!window.System) return;
  System.send('gamepad', {
    type: 'disconnected',
    id: event.gamepad.id,
    index: event.gamepad.index,
  });
  renderSystemLogs();
});

function handleGamepadInput() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const pad = pads && pads[0];
  const now = performance.now();
  if (!pad || now - gamepadLastAction < 160) return;
  if (!window.System || !window.Dock) return;

  const dpadRight = pad.buttons[15]?.pressed;
  const dpadLeft = pad.buttons[14]?.pressed;
  const openBtn = pad.buttons[0]?.pressed; // A / Cross
  const closeBtn = pad.buttons[1]?.pressed; // B / Circle
  const sendBtn = pad.buttons[2]?.pressed; // X / Square
  const axisX = pad.axes[0] || 0;

  if (dpadRight || axisX > 0.65) {
    selectedAppIndex = (selectedAppIndex + 1) % appOrder.length;
    gamepadLastAction = now;
  } else if (dpadLeft || axisX < -0.65) {
    selectedAppIndex = (selectedAppIndex - 1 + appOrder.length) % appOrder.length;
    gamepadLastAction = now;
  } else if (openBtn) {
    openWindow(appOrder[selectedAppIndex]);
    System.open(appOrder[selectedAppIndex]);
    renderSystemLogs();
    gamepadLastAction = now;
  } else if (closeBtn) {
    closeWindow(appOrder[selectedAppIndex]);
    System.send(appOrder[selectedAppIndex], { source: 'gamepad', action: 'close' });
    renderSystemLogs();
    gamepadLastAction = now;
  } else if (sendBtn) {
    Dock.send(appOrder[selectedAppIndex], {
      source: 'gamepad',
      message: 'gamepad test payload',
      time: Date.now(),
    });
    gamepadLastAction = now;
  }
}

/* ================= THREE BACKGROUND ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geo = new THREE.BufferGeometry();
const arr = [];

for (let i=0;i<3000;i++) {
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
}

geo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));

const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.02 });
scene.add(new THREE.Points(geo, mat));

function animate() {
  requestAnimationFrame(animate);
  handleGamepadInput();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

<script src="./system32/DockManagment/server.js"></script>
<script src="./system32/DockManagment/dock.js"></script>

<script>
function renderSystemLogs() {
  const target = document.getElementById('system-log-list');
  if (!window.System || !target) return;

  target.innerHTML = System.getLogs()
    .map((entry) => `<div>[${entry.time}] ${entry.type} :: ${entry.app} ${entry.data ? JSON.stringify(entry.data) : ''}</div>`)
    .join('');
}

function handleDockEvent(event) {
  if (!event || !window.System) return;

  if (event.type === 'open-app') {
    openWindow(event.app);
    System.open(event.app);
    renderSystemLogs();
    return;
  }

  if (event.type === 'send-data') {
    System.send(event.app, event.data);
    renderSystemLogs();
  }
}

fetch('./system32/DockManagment/dock.html')
  .then((res) => res.text())
  .then((html) => {
    document.getElementById('dock-container').innerHTML = html;
    Dock.connectMain(handleDockEvent);
    Dock.init();
    renderSystemLogs();
  })
  .catch(() => {
    document.getElementById('dock-container').innerHTML = `
      <div class="dock" id="dock-root" aria-label="ReplicaOS Dock">
        <button class="dock-btn" data-app="calc" type="button">Calc</button>
        <button class="dock-btn" data-app="notes" type="button">Notes</button>
        <button class="dock-btn" data-app="browser" type="button">Browser</button>
      </div>
      <style>
        .dock {
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 10px;
          padding: 12px;
          border-radius: 40px;
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid rgba(255, 255, 255, 0.24);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
          z-index: 9999;
          pointer-events: auto;
        }
        .dock-btn {
          padding: 10px 14px;
          border: none;
          border-radius: 20px;
          background: rgba(255, 255, 255, 0.14);
          color: #ffffff;
          cursor: pointer;
          transition: transform 180ms ease, background 180ms ease;
        }
        .dock-btn:hover {
          background: rgba(255, 255, 255, 0.26);
          transform: scale(1.08);
        }
      </style>
    `;
    Dock.connectMain(handleDockEvent);
    Dock.init();
    renderSystemLogs();
  });
</script>
</body>
</html>
