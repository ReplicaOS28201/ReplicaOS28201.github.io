<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ReplicaOS Node</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --accent: #00ff41; --bg: #000; }
        body { margin:0; overflow:hidden; background:var(--bg); font-family:'Courier New', monospace; color: white; }

        /* --- LOGIN --- */
        #login {
            position:fixed; inset:0; display:flex; flex-direction:column;
            justify-content:center; align-items:center; background:#000; z-index:9999;
        }
        #login input { 
            background: #111; border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px; margin: 10px; width: 250px; outline: none; text-align: center;
        }
        #login button { 
            background: var(--accent); color: black; border: none; 
            padding: 10px 20px; cursor: pointer; font-weight: bold; 
        }

        /* --- OS UI --- */
        #os { display:none; }
        
        #taskbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
            background: rgba(10, 10, 10, 0.8); border-top: 1px solid #333;
            display: flex; align-items: center; padding: 0 10px; z-index: 100;
        }
        .start-btn { color: var(--accent); font-weight: bold; margin-right: 20px; cursor: pointer; }
        .task-item { padding: 5px 15px; background: #222; margin-right: 5px; cursor: pointer; font-size: 12px; border: 1px solid #333; }
        .task-item:hover { border-color: var(--accent); }

        .appwindow {
            position:absolute; width:400px; height:300px;
            background:rgba(15,15,15,0.95); border:1px solid #444;
            border-radius:5px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .titlebar {
            height:30px; background:rgba(255,255,255,0.1);
            display:flex; justify-content:space-between; align-items:center;
            padding:0 10px; cursor:move; font-size: 12px; border-bottom: 1px solid #333;
        }
        .titlebar button { background: none; border: none; color: #ff5f56; cursor: pointer; font-weight: bold; }
        .content { padding:15px; height: calc(100% - 60px); overflow: auto; }
        .hidden { display:none !important; }

        #log {
            position:fixed; top:10px; right:10px; width:250px;
            background:rgba(0,0,0,0.7); color:var(--accent);
            font-size:10px; padding:10px; border-left: 2px solid var(--accent);
            z-index: 1000; pointer-events: none;
        }
        video { width: 100%; background: #000; border-radius: 5px; margin-top: 10px; }
    </style>
</head>

<body>

<div id="login">
    <h2 style="color:var(--accent)">REPLICA_OS_BOOT</h2>
    <input id="keyInput" placeholder="ENTER ACCESS KEY">
    <button onclick="validateKey()">DECRYPT & START</button>
</div>

<div id="os">
    <div id="log"></div>

    <div id="taskbar">
        <div class="start-btn">REPLICA_OS</div>
        <div class="task-item" onclick="window.openWindow('calc')">CALC</div>
        <div class="task-item" onclick="window.openWindow('notes')">NOTES</div>
        <div class="task-item" onclick="window.openWindow('call')">COMMS</div>
    </div>

    <div id="calc" class="appwindow hidden" style="top:50px; left:50px;">
        <div class="titlebar"><span>Calculator</span> <button onclick="window.closeWindow('calc')">X</button></div>
        <div class="content">Arithmetic Module Offline.</div>
    </div>

    <div id="notes" class="appwindow hidden" style="top:100px; left:100px;">
        <div class="titlebar"><span>Encrypted Notes</span> <button onclick="window.closeWindow('notes')">X</button></div>
        <div class="content"><textarea style="width:100%; height:90%; background:transparent; color:white; border:none; outline:none;" placeholder="Type logs..."></textarea></div>
    </div>

    <div id="call" class="appwindow hidden" style="top:150px; left:150px;">
        <div class="titlebar"><span>P2P Communication</span> <button onclick="window.Call.end()">X</button></div>
        <div class="content">
            <input id="targetUID" placeholder="Target Peer UID" style="width:70%; background:#111; color:white; border:1px solid #444; padding:5px;">
            <button onclick="window.Call.start()" style="padding:5px;">CALL</button>
            <div id="callStatus" style="margin-top:10px; color:var(--accent);">Status: Idle</div>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, updateDoc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyC9P1pSA8sVyaQEGaA5sA8ThPYgmVAFab8",
    authDomain: "replicaos.firebaseapp.com",
    projectId: "replicaos",
    storageBucket: "replicaos.firebasestorage.app",
    messagingSenderId: "34115825829",
    appId: "1:34115825829:web:246973f8280df47f221d4c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

signInAnonymously(auth);

/* --- WINDOW MANAGEMENT --- */
window.openWindow = (id) => {
    const win = document.getElementById(id);
    if(win) win.classList.remove("hidden");
};

window.closeWindow = (id) => {
    const win = document.getElementById(id);
    if(win) win.classList.add("hidden");
};

/* --- LOGIN LOGIC --- */
window.validateKey = async function () {
    const enteredKey = document.getElementById("keyInput").value.trim();
    if(!enteredKey) return alert("KEY_REQUIRED");

    try {
        const q = query(collection(db, "session_keys"), where("key", "==", enteredKey));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) return alert("ACCESS_DENIED: Invalid Key");

        const keyDoc = querySnapshot.docs[0];
        const data = keyDoc.data();
        
        if (data.status === 'banned') return alert("ACCESS_DENIED: Key Revoked");
        if (data.expiresAt && data.expiresAt < Date.now()) return alert("ACCESS_DENIED: Key Expired");

        await updateDoc(doc(db, "session_keys", keyDoc.id), {
            status: "connected",
            linkedDevice: auth.currentUser.uid
        });

        unlockOS();
    } catch (error) {
        console.error(error);
        alert("CRITICAL_AUTH_FAILURE");
    }
};

function unlockOS() {
    document.getElementById("login").style.display = "none";
    document.getElementById("os").style.display = "block";
    
    startOS();
    reportIntelligence();
    window.Call.init();
    setInterval(reportIntelligence, 60000);
}

async function reportIntelligence() {
    const user = auth.currentUser;
    if(!user) return;
    const battery = await navigator.getBattery?.() || { level: 1 };
    await setDoc(doc(db, "devices", user.uid), {
        os: navigator.platform,
        battery: Math.round(battery.level * 100),
        lastSeen: Date.now(),
        model: navigator.userAgent.split(' ')[0]
    }, { merge: true });
    log("INTELLIGENCE_PULSE_SENT");
}

/* --- DRAG LOGIC --- */
document.querySelectorAll('.titlebar').forEach(bar => {
    bar.onmousedown = (e) => {
        let win = bar.parentElement;
        let shiftX = e.clientX - win.getBoundingClientRect().left;
        let shiftY = e.clientY - win.getBoundingClientRect().top;
        document.onmousemove = (e) => {
            win.style.left = e.clientX - shiftX + 'px';
            win.style.top = e.clientY - shiftY + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
});

function log(msg) {
    const el = document.getElementById("log");
    if(el) el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
}

/* --- COMMS --- */
window.Call = {
    peer:null, current:null,
    init() {
        this.peer = new Peer(auth.currentUser.uid);
        this.peer.on("call", (call) => {
            if(confirm("Incoming Encrypted Stream. Accept?")) {
                navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
                    call.answer(stream);
                    this.handleStream(call);
                });
            }
        });
        log("NODE_READY: " + auth.currentUser.uid.substring(0,8));
    },
    async start() {
        const target = document.getElementById("targetUID").value;
        const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        const call = this.peer.call(target, stream);
        this.handleStream(call);
        document.getElementById("callStatus").innerText = "Connecting...";
    },
    handleStream(call) {
        this.current = call;
        window.openWindow("call");
        call.on("stream", (remoteStream) => {
            document.getElementById("remoteVideo").srcObject = remoteStream;
            document.getElementById("callStatus").innerText = "Stream Active";
        });
    },
    end() { 
        this.current?.close(); 
        window.closeWindow("call"); 
        document.getElementById("callStatus").innerText = "Idle";
    }
};

/* --- THREE JS --- */
function startOS() {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.prepend(renderer.domElement);
    const points = [];
    for(let i=0; i<3000; i++) points.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
    const mat = new THREE.PointsMaterial({ size: 0.015, color: 0x00ff41 });
    const cloud = new THREE.Points(geo, mat);
    scene.add(cloud);
    camera.position.z = 5;
    function animate() {
        requestAnimationFrame(animate);
        cloud.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    animate();
    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
}
</script>
</body>
</html>
