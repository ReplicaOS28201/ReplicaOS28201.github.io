<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReplicaOS28201</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; }
        .hidden { display: none !important; }
        
        #world3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            display: none;
        }

        body.mode3d #world3d { display: block; }
        body.mode3d .appwindow:not(.hidden) { opacity: 0.9; }

        .appwindow {
            position: absolute;
            width: 400px; height: 300px;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .window-titlebar {
            padding: 10px; background: rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; cursor: move;
            user-select: none;
        }

        .window-content { flex: 1; border: none; background: white; }

        .dock {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; padding: 10px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); border-radius: 15px;
            z-index: 9999;
        }

        .dock-icon {
            padding: 10px 15px; border: none; border-radius: 8px;
            background: rgba(255,255,255,0.2); color: white; cursor: pointer;
        }

        /* Resize Handles */
        .resize-handle { position: absolute; z-index: 10; }
        .resize-br { width: 15px; height: 15px; right: 0; bottom: 0; cursor: nwse-resize; }
        .resize-r { width: 5px; height: 100%; right: 0; top: 0; cursor: e-resize; }
        .resize-b { height: 5px; width: 100%; bottom: 0; left: 0; cursor: s-resize; }
    </style>
</head>

<body>

<canvas id="world3d"></canvas>

<div id="myApp" class="appwindow hidden" style="left: 50px; top: 50px;">
    <div class="window-titlebar"><span>Calculator</span><button onclick="closeWindow('myApp')">×</button></div>
    <iframe src="about:blank" class="window-content"></iframe>
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>
</div>

<div id="fileExplorer" class="appwindow hidden" style="left: 100px; top: 100px;">
    <div class="window-titlebar"><span>File Explorer</span><button onclick="closeWindow('fileExplorer')">×</button></div>
    <div class="window-content" style="background: #222; padding: 20px;">
        <div id="fileDropZone" style="border: 2px dashed #444; padding: 20px; text-align: center;">
            Drag files here
        </div>
        <ul id="fileList"></ul>
    </div>
    <div class="resize-handle resize-br"></div>
</div>

<div class="dock">
    <button class="dock-icon" onclick="openWindow('myApp')">Calc</button>
    <button class="dock-icon" onclick="openWindow('fileExplorer')">Files</button>
    <button class="dock-icon" onclick="toggle3D()">Toggle 3D</button>
</div>

<script>
// --- STATE MANAGEMENT ---
let highestZ = 100;
const windowState = {};

function saveWindowState(el) {
    windowState[el.id] = {
        width: el.style.width,
        height: el.style.height,
        transform: el.style.transform
    };
    localStorage.setItem('os_windows', JSON.stringify(windowState));
}

function openWindow(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove("hidden");
    bringToFront(el);
}

function closeWindow(id) {
    document.getElementById(id).classList.add("hidden");
}

function bringToFront(el) {
    el.style.zIndex = ++highestZ;
}

// --- DRAG & RESIZE ---
function makeDraggable(win) {
    const header = win.querySelector(".window-titlebar");
    let x = 0, y = 0, tX = 0, tY = 0;

    header.onmousedown = (e) => {
        bringToFront(win);
        x = e.clientX; y = e.clientY;
        const style = window.getComputedStyle(win);
        const matrix = new WebKitCSSMatrix(style.transform);
        tX = matrix.m41; tY = matrix.m42;

        document.onmousemove = (e) => {
            const dx = e.clientX - x;
            const dy = e.clientY - y;
            win.style.transform = `translate3d(${tX + dx}px, ${tY + dy}px, 0)`;
        };
        document.onmouseup = () => {
            document.onmousemove = null;
            saveWindowState(win);
        };
    };
}

function makeResizable(win) {
    const handles = win.querySelectorAll(".resize-handle");
    handles.forEach(h => {
        h.onmousedown = (e) => {
            e.preventDefault();
            const startW = win.offsetWidth;
            const startH = win.offsetHeight;
            const startX = e.clientX;
            const startY = e.clientY;

            document.onmousemove = (e) => {
                if (h.classList.contains('resize-r') || h.classList.contains('resize-br'))
                    win.style.width = (startW + (e.clientX - startX)) + "px";
                if (h.classList.contains('resize-b') || h.classList.contains('resize-br'))
                    win.style.height = (startH + (e.clientY - startY)) + "px";
            };
            document.onmouseup = () => {
                document.onmousemove = null;
                saveWindowState(win);
            };
        };
    });
}

// --- 3D SYSTEM ---
let scene, camera, renderer, is3DActive = false;
let cubes = [];

function init3D() {
    if (scene) return;
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("world3d"), alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    cubes.push(createAppCube(0x00ffcc, "myApp", -2));
    cubes.push(createAppCube(0xffff00, "fileExplorer", 2));

    animate();
}

function createAppCube(color, appId, x) {
    const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshStandardMaterial({ color })
    );
    mesh.position.x = x;
    mesh.userData.app = appId;
    scene.add(mesh);
    return mesh;
}

function animate() {
    requestAnimationFrame(animate);
    if (!is3DActive) return;
    cubes.forEach(c => { c.rotation.y += 0.01; c.rotation.x += 0.005; });
    renderer.render(scene, camera);
}

function toggle3D() {
    is3DActive = !is3DActive;
    document.body.classList.toggle("mode3d", is3DActive);
    if (is3DActive) init3D();
}

// Interaction
window.addEventListener("click", (e) => {
    if (!is3DActive) return;
    const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(cubes);
    if (hits.length > 0) openWindow(hits[0].object.userData.app);
});

// Init
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".appwindow").forEach(win => {
        makeDraggable(win);
        makeResizable(win);
    });
});
</script>
</body>
</html>
