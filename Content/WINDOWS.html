<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>19OS</title>

<link rel="stylesheet" href="CSS/main.css">

<style>
/* ===============================
   🍎 CONTROL CENTER
=============================== */
.cc {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
  pointer-events: none;
}

.cc-panel {
  width: 320px;
  margin: 20px;
  padding: 16px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  transform: translateY(-20px) scale(0.95);
  opacity: 0;
  transition: 0.3s ease;
  pointer-events: auto;
}

.cc.show .cc-panel {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.cc-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

#ccToggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}

.hidden { display: none; }

/* ================= WINDOW ================= */
.appwindow {
  position: absolute;
  width: 420px;
  height: 320px;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  transition: 0.2s ease;
}

.window-titlebar {
  height: 35px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
  cursor: move;
  background: rgba(255,255,255,0.1);
}

.window-content {
  flex: 1;
  width: 100%;
  border: none;
}

/* ================= RESIZE ================= */
.resize-handle {
  position: absolute;
}

.resize-br {
  width: 15px;
  height: 15px;
  right: 0;
  bottom: 0;
  cursor: nwse-resize;
}

.resize-r {
  width: 8px;
  height: 100%;
  right: 0;
  top: 0;
  cursor: ew-resize;
}

.resize-b {
  height: 8px;
  width: 100%;
  bottom: 0;
  left: 0;
  cursor: ns-resize;
}

/* ================= DOCK ================= */
.dock {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
}

.dock-icon {
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
}

/* ================= NOTIFICATIONS ================= */
#notifications {
  position: fixed;
  top: 80px;
  right: 20px;
}

.notification {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<!-- CONTROL CENTER -->
<div id="controlCenter" class="cc hidden">
  <div class="cc-panel glass">
    <div>Control Center</div>

    <div>
      <button onclick="setFocusMode('gaming')">🎮</button>
      <button onclick="setFocusMode('coding')">💻</button>
      <button onclick="setFocusMode('chill')">🌙</button>
    </div>

    <div>
      <button onclick="toggleWifi()">📶</button>
      <button onclick="toggleSound()">🔊</button>
      <button onclick="toggleTheme()">🎨</button>
    </div>
  </div>
</div>

<button id="ccToggle" onclick="toggleControlCenter()">⚙️</button>

<h2>19OS</h2>

<!-- WINDOWS -->

<div id="cameraApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>

  <div class="window-titlebar">
    <span>Camera</span>
    <button onclick="closeWindow('cameraApp')">×</button>
  </div>

  <video id="cameraVideo" autoplay playsinline></video>
  <canvas id="cameraCanvas" class="hidden"></canvas>

  <button id="snapBtn">📸</button>
  <button id="switchBtn">🔄</button>
  <button id="downloadBtn" class="hidden">💾</button>
</div>

<!-- KEEPING YOUR APPS -->
<div id="myApp" class="appwindow hidden">
  <div class="window-titlebar">
    <span>Calculator</span>
    <button onclick="closeWindow('myApp')">×</button>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<div id="browser" class="appwindow hidden">
  <div class="window-titlebar">
    <span>Browser</span>
    <button onclick="closeWindow('browser')">×</button>
  </div>
  <iframe src="Apps/com.browser.app/Index.html" class="window-content"></iframe>
</div>

<!-- DOCK -->
<div class="dock">
  <button onclick="openWindow('myApp')">Calc</button>
  <button onclick="openWindow('browser')">🌐</button>
  <button onclick="openWindow('cameraApp')">📷</button>
  <button onclick="openPoki()">🎮</button>
</div>

<div id="notifications"></div>

<script src="js/Mode.js"></script>

<script>
// CAMERA FIX
let currentStream=null;
let useFront=true;

async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode: useFront ? "user":"environment" }
  });

  cameraVideo.srcObject = currentStream;
}

// WINDOW SYSTEM
let z=100;

function bringToFront(el){
  z++;
  el.style.zIndex=z;
}

function openWindow(id){
  let el=document.getElementById(id);
  el.classList.remove("hidden");
  bringToFront(el);

  if(id==="cameraApp") startCamera();
}

function closeWindow(id){
  let el=document.getElementById(id);
  el.classList.add("hidden");

  if(id==="cameraApp" && currentStream){
    currentStream.getTracks().forEach(t=>t.stop());
    currentStream=null;
  }
}

// DRAG
document.querySelectorAll(".appwindow").forEach(win=>{
  let bar=win.querySelector(".window-titlebar");

  bar.onmousedown=e=>{
    bringToFront(win);

    let shiftX=e.clientX - win.getBoundingClientRect().left;
    let shiftY=e.clientY - win.getBoundingClientRect().top;

    function move(e){
      win.style.left=e.clientX-shiftX+"px";
      win.style.top=e.clientY-shiftY+"px";
    }

    document.addEventListener("mousemove",move);
    document.onmouseup=()=>{
      document.removeEventListener("mousemove",move);
    };
  };
});

// CONTROL CENTER FIX
function toggleControlCenter(){
  let cc=document.getElementById("controlCenter");

  if(cc.classList.contains("show")){
    cc.classList.remove("show");
    setTimeout(()=>cc.classList.add("hidden"),200);
  }else{
    cc.classList.remove("hidden");
    setTimeout(()=>cc.classList.add("show"),10);
  }
}

// SAFE CLICK CLOSE
document.addEventListener("click",e=>{
  let cc=document.getElementById("controlCenter");
  if(!cc) return;

  let panel=cc.querySelector(".cc-panel");
  if(!panel) return;

  if(!panel.contains(e.target) && e.target.id!=="ccToggle"){
    cc.classList.remove("show");
    setTimeout(()=>cc.classList.add("hidden"),200);
  }
});

// SYSTEM
function notify(msg){
  let n=document.createElement("div");
  n.className="notification";
  n.innerText=msg;
  notifications.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

function toggleWifi(){ notify("WiFi toggled"); }
function toggleSound(){ notify("Sound toggled"); }
function toggleTheme(){ notify("Theme switched"); }
function setFocusMode(m){ notify("Mode: "+m); }

// POKI FIX
function openPoki(){
  window.open("https://poki.com","_blank");
}
</script>

</body>
</html>
