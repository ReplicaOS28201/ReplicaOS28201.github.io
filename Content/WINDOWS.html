<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">
<h2 class="title">19OS</h2>

<!-- Calculator -->
<div id="myApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Calculator</span>
    <div class="window-controls">
      <button class="closewin" data-target="myApp">×</button>
    </div>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<!-- Secret Lang -->
<div id="secret" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Secret Lang</span>
    <div class="window-controls">
      <button class="closewin" data-target="secret">×</button>
    </div>
  </div>
  <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
</div>

<!-- Poki -->
<div id="poki" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Poki</span>
    <div class="window-controls">
      <button class="closewin" data-target="poki">×</button>
    </div>
  </div>
  <iframe src="https://poki.com/" class="window-content"></iframe>
</div>

<!-- Crash Viewer -->
<div id="crashViewer" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Crash Viewer</span>
    <div class="window-controls">
      <button class="closewin" data-target="crashViewer">×</button>
    </div>
  </div>
  <div id="crashList"></div>
  <button onclick="clearCrashes()">Clear Logs</button>
</div>

<!-- Dock -->
<div class="dock glass">
  <button onclick="openWindow('myApp')">Calculator</button>
  <button onclick="openWindow('secret')">Secret</button>
  <button onclick="openWindow('poki')">Poki</button>
  <button onclick="openWindow('crashViewer')">Crash</button>
</div>
</div>

<script>
// ===============================
// GLOBALS
// ===============================
let zIndexCounter = 100;

// ===============================
// SPRING
// ===============================
function spring(v) {
  return { value: v, velocity: 0, target: v };
}

function step(s, k = 0.12, d = 0.75) {
  const f = (s.target - s.value) * k;
  s.velocity += f;
  s.velocity *= d;
  s.value += s.velocity;
}

// ===============================
// WINDOW STATE SYSTEM
// ===============================
function createWindowState(win) {
  const rect = win.getBoundingClientRect();

  win._state = {
    x: spring(rect.left),
    y: spring(rect.top),
    w: spring(rect.width),
    h: spring(rect.height),
    scaleX: spring(1),
    scaleY: spring(1),
    rot: spring(0)
  };
}

// unified renderer (VERY IMPORTANT)
function render(win) {
  const s = win._state;

  win.style.transform =
    `translate(${s.x.value}px, ${s.y.value}px) ` +
    `rotate(${s.rot.value}deg) ` +
    `scale(${s.scaleX.value}, ${s.scaleY.value})`;

  win.style.width = s.w.value + "px";
  win.style.height = s.h.value + "px";
}

// ===============================
// BRING TO FRONT
// ===============================
function bringToFront(el) {
  el.style.zIndex = ++zIndexCounter;
}

// ===============================
// DRAG SYSTEM (JIGGLE)
// ===============================
function makeDraggable(win) {
  const header = win.querySelector(".window-titlebar");
  if (!header) return;

  const s = win._state;

  let dragging = false;
  let offsetX = 0, offsetY = 0;

  header.addEventListener("pointerdown", e => {
    if (e.target.closest(".window-controls")) return;

    dragging = true;
    bringToFront(win);

    const rect = win.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    win.setPointerCapture(e.pointerId);
    requestAnimationFrame(loop);
  });

  header.addEventListener("pointermove", e => {
    if (!dragging) return;

    s.x.target = e.clientX - offsetX;
    s.y.target = e.clientY - offsetY;
  });

  header.addEventListener("pointerup", e => {
    dragging = false;
    win.releasePointerCapture(e.pointerId);
  });

  function loop() {
    step(s.x);
    step(s.y);

    // tilt effect
    s.rot.target = Math.max(-6, Math.min(6, s.x.velocity * 0.25));

    render(win);

    if (
      dragging ||
      Math.abs(s.x.velocity) > 0.1 ||
      Math.abs(s.y.velocity) > 0.1
    ) {
      requestAnimationFrame(loop);
    } else {
      s.rot.target = 0;
    }
  }
}

// ===============================
// RESIZE SYSTEM (JELLY)
// ===============================
function makeResizable(win) {
  const handles = win.querySelectorAll(".resize-handle");
  const s = win._state;

  handles.forEach(handle => {
    let resizing = false;
    let startX, startY, startW, startH;

    handle.addEventListener("pointerdown", e => {
      e.preventDefault();
      resizing = true;

      const rect = win.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startW = rect.width;
      startH = rect.height;

      win.setPointerCapture(e.pointerId);
      requestAnimationFrame(loop);
    });

    handle.addEventListener("pointermove", e => {
      if (!resizing) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        s.w.target = Math.max(200, startW + dx);
        s.scaleX.target = 1 + dx * 0.002;
      }

      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        s.h.target = Math.max(150, startH + dy);
        s.scaleY.target = 1 + dy * 0.002;
      }
    });

    handle.addEventListener("pointerup", e => {
      resizing = false;
      s.scaleX.target = 1;
      s.scaleY.target = 1;
      win.releasePointerCapture(e.pointerId);
    });

    function loop() {
      step(s.w, 0.15, 0.7);
      step(s.h, 0.15, 0.7);
      step(s.scaleX, 0.2, 0.6);
      step(s.scaleY, 0.2, 0.6);

      render(win);

      if (
        resizing ||
        Math.abs(s.w.velocity) > 0.1 ||
        Math.abs(s.h.velocity) > 0.1
      ) {
        requestAnimationFrame(loop);
      }
    }
  });
}

// ===============================
// OPEN / CLOSE
// ===============================
function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.remove("hidden");
  bringToFront(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.add("hidden");
}

// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    createWindowState(win);
    makeDraggable(win);
    makeResizable(win);

    win.style.willChange = "transform, width, height";
    win.style.transform = "translateZ(0)";
  });

  document.querySelectorAll(".closewin").forEach(btn => {
    btn.addEventListener("click", () => {
      closeWindow(btn.dataset.target);
    });
  });
});
</script>
<script src="js/crashlogger.js"></script>
</body>
</html>
