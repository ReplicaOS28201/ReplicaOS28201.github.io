<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReplicaOS - Ultimate</title>

<style>
:root {
    --taskbar-bg: rgba(20, 20, 20, 0.85);
    --win-bg: #f3f3f3;
    --accent: #0078d4;
    --title-bar: #ffffff;
}

* { box-sizing: border-box; }

body, html {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: system-ui;
    background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
}

/* Desktop */
#desktop {
    height: calc(100vh - 48px);
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, 90px);
    grid-auto-rows: 100px;
    gap: 15px;
}

.icon {
    color: white;
    text-align: center;
    cursor: pointer;
}
.icon img {
    width: 45px;
}

/* Window */
.window {
    position: absolute;
    width: 400px;
    height: 500px;
    background: var(--win-bg);
    border-radius: 10px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    display: none;
    flex-direction: column;
    overflow: hidden;
}

.title-bar {
    background: var(--title-bar);
    padding: 10px;
    display: flex;
    justify-content: space-between;
    cursor: grab;
    user-select: none;
    border-bottom: 1px solid #ddd;
}

.content {
    flex: 1;
}

/* Taskbar */
#taskbar {
    position: fixed;
    bottom: 0;
    height: 48px;
    width: 100%;
    background: var(--taskbar-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    padding: 0 15px;
}
</style>
</head>

<body>

<div id="desktop">
    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>
</div>

<!-- CHAT WINDOW -->
<div id="chat" class="window">
    <div class="title-bar" onpointerdown="dragElement(event, 'chat')">
        <span>Messenger</span>
        <button onclick="closeWindow('chat')">✕</button>
    </div>
    <div class="content"></div>
</div>

<div id="taskbar">
    <div>🪟 Start</div>
    <div id="clock"></div>
</div>

<script>
let highestZ = 1000;

/* ---------------- WINDOW SYSTEM ---------------- */

window.openWindow = (id) => {
    const el = document.getElementById(id);
    el.style.display = "flex";
    el.style.zIndex = ++highestZ;
};

window.closeWindow = (id) => {
    document.getElementById(id).style.display = "none";
};

/* ---------------- REAL DRAG SYSTEM ---------------- */

window.dragElement = (e, id) => {
    const el = document.getElementById(id);
    el.style.zIndex = ++highestZ;

    let rect = el.getBoundingClientRect();

    let x0 = e.clientX;
    let y0 = e.clientY;

    let startLeft = rect.left;
    let startTop = rect.top;

    let lastX = x0;
    let lastY = y0;
    let lastTime = Date.now();

    let vx = 0;
    let vy = 0;

    const maxX = () => window.innerWidth - el.offsetWidth;
    const maxY = () => window.innerHeight - el.offsetHeight - 48;

    const move = (ev) => {
        ev.preventDefault?.();

        let x = ev.clientX;
        let y = ev.clientY;

        let dx = x - x0;
        let dy = y - y0;

        let newLeft = startLeft + dx;
        let newTop = startTop + dy;

        let now = Date.now();
        let dt = now - lastTime;

        if (dt > 0) {
            vx = (x - lastX) / dt;
            vy = (y - lastY) / dt;
        }

        lastX = x;
        lastY = y;
        lastTime = now;

        newLeft = Math.max(0, Math.min(maxX(), newLeft));
        newTop = Math.max(0, Math.min(maxY(), newTop));

        el.style.left = newLeft + "px";
        el.style.top = newTop + "px";
    };

    const end = () => {
        document.removeEventListener("pointermove", move);
        document.removeEventListener("pointerup", end);

        let friction = 0.92;
        let vx2 = vx * 20;
        let vy2 = vy * 20;

        const inertia = () => {
            if (Math.abs(vx2) < 0.5 && Math.abs(vy2) < 0.5) {
                snap();
                return;
            }

            let left = parseFloat(el.style.left || 0) + vx2;
            let top = parseFloat(el.style.top || 0) + vy2;

            vx2 *= friction;
            vy2 *= friction;

            left = Math.max(0, Math.min(maxX(), left));
            top = Math.max(0, Math.min(maxY(), top));

            el.style.left = left + "px";
            el.style.top = top + "px";

            requestAnimationFrame(inertia);
        };

        inertia();
    };

    const snap = () => {
        let left = parseFloat(el.style.left || 0);
        let top = parseFloat(el.style.top || 0);

        const snap = 30;

        if (left < snap) left = 0;
        if (left > maxX() - snap) left = maxX();
        if (top < snap) top = 0;

        el.style.transition = "0.2s ease";
        el.style.left = left + "px";
        el.style.top = top + "px";

        setTimeout(() => el.style.transition = "", 200);
    };

    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", end);
};

/* CLOCK */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}, 1000);
</script>

</body>
</html>
