<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplicaOS - Discord Windows UI</title>

<style>
body { margin: 0; font-family: system-ui; background: #0b0c10; color: white; overflow: hidden; }

/* AUTH */
#auth { position: fixed; inset: 0; display:flex; justify-content:center; align-items:center; background:black; }
.box { background:#1c1c1f; padding:30px; border-radius:12px; width:320px; display:flex; flex-direction:column; gap:10px; }

/* DESKTOP */
#desktop { display:none; width:100vw; height:100vh; background:#111; }

/* TASKBAR */
#taskbar { position:absolute; bottom:0; height:45px; width:100%; background:#0008; display:flex; align-items:center; padding:0 10px; }

/* WINDOW */
.window { position:absolute; width:900px; height:550px; background:#2b2d31; display:none; flex-direction:column; }

/* CHAT */
#chat { flex:1; display:flex; flex-direction:column; }
#messages { flex:1; overflow:auto; padding:10px; }

/* CALL UI */
#callUI {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    gap: 10px;
    z-index: 99999;
}

video {
    width: 200px;
    border-radius: 10px;
}

/* BUTTONS */
button { cursor:pointer; }
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
    <div class="box">
        <input id="email" placeholder="email">
        <input id="pass" type="password" placeholder="password">
        <button id="login">Login</button>
        <button id="register">Register</button>
    </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div id="taskbar">
    <button onclick="openWin()">Discord</button>
</div>

<!-- DISCORD WINDOW -->
<div id="win" class="window">

<div style="padding:10px; background:#1e1f22; display:flex; justify-content:space-between;">
    <span>ReplicaOS Discord</span>

    <!-- 🔥 CALL BUTTON -->
    <button onclick="startCall()">📞 Call</button>

    <button onclick="closeWin()">X</button>
</div>

<div id="chat">
    <div id="messages"></div>
    <input id="msg" placeholder="message">
    <button onclick="send()">Send</button>
</div>

</div>
</div>

<!-- 🔥 CALL UI -->
<div id="callUI">
    <div>Call Active</div>

    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>

    <button onclick="mute()">Mute</button>
    <button onclick="hangup()">Hang Up</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* UI */
const authDiv = document.getElementById("auth");
const desktop = document.getElementById("desktop");
const win = document.getElementById("win");

let currentUser;

/* LOGIN */
login.onclick = () => signInWithEmailAndPassword(auth,email.value,pass.value);
register.onclick = async () => {
const u = await createUserWithEmailAndPassword(auth,email.value,pass.value);
currentUser = u.user;
};

onAuthStateChanged(auth,u=>{
if(u){
currentUser=u;
authDiv.style.display="none";
desktop.style.display="block";
}else{
authDiv.style.display="flex";
desktop.style.display="none";
}
});

/* WINDOW */
window.openWin=()=>win.style.display="flex";
window.closeWin=()=>win.style.display="none";

/* CHAT */
window.send=async()=>{
await addDoc(collection(db,"messages"),{
text:msg.value,
user:currentUser.email
});
msg.value="";
};

onSnapshot(collection(db,"messages"),snap=>{
messages.innerHTML="";
snap.forEach(d=>{
messages.innerHTML+=`<div><b>${d.data().user}</b>: ${d.data().text}</div>`;
});
});

/* =========================
   🔥 WEBRTC CALL SYSTEM
========================= */

let pc;
let localStream;

/* CONFIG */
const servers = {
iceServers:[
{ urls:"stun:stun.l.google.com:19302" }
]
};

/* START CALL */
window.startCall = async () => {

pc = new RTCPeerConnection(servers);

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

localVideo.srcObject = localStream;

/* remote stream */
pc.ontrack = e => {
remoteVideo.srcObject = e.streams[0];
};

const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

/* save offer to firebase */
await setDoc(doc(db,"calls","room1"),{
offer: JSON.stringify(offer)
});

listenForAnswer();
listenForIce();
document.getElementById("callUI").style.display="flex";
};

/* ANSWER CALL */
window.answerCall = async () => {

pc = new RTCPeerConnection(servers);

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

localVideo.srcObject = localStream;

pc.ontrack = e=>{
remoteVideo.srcObject = e.streams[0];
};

const callDoc = await getDoc(doc(db,"calls","room1"));
const offer = JSON.parse(callDoc.data().offer);

await pc.setRemoteDescription(offer);

const answer = await pc.createAnswer();
await pc.setLocalDescription(answer);

await setDoc(doc(db,"calls","room1"),{
answer: JSON.stringify(answer)
});

listenForIce();
};

/* ICE */
function listenForIce(){
onSnapshot(doc(db,"calls","room1"),snap=>{
const data = snap.data();
if(!data) return;

if(data.answer && pc.signalingState !== "stable"){
pc.setRemoteDescription(JSON.parse(data.answer));
}
});
}

/* MUTE */
window.mute=()=>{
localStream.getAudioTracks().forEach(t=>{
t.enabled = !t.enabled;
});
};

/* HANGUP */
window.hangup=()=>{
pc.close();
document.getElementById("callUI").style.display="none";
};
</script>

</body>
</html>
