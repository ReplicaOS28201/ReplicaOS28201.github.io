<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplicaOS - Discord Windows UI</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0c10;color:#fff;overflow:hidden}

/* ===== AUTH ===== */
#auth{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;
z-index:9999;
}
.box{background:#1c1c1f;padding:20px;border-radius:12px;width:300px;display:flex;flex-direction:column;gap:10px}
input,button{padding:10px;border:none;border-radius:8px}
button{background:#5865f2;color:white;cursor:pointer}

/* ===== DESKTOP ===== */
#desktop{
display:none;
width:100vw;height:100vh;
position:relative;
}

/* ===== TASKBAR ===== */
#taskbar{
position:absolute;bottom:0;left:0;right:0;height:45px;
background:#111;
display:flex;align-items:center;padding:5px;gap:10px
}
.taskbtn{background:#222;padding:6px 10px;border-radius:6px;cursor:pointer}

/* ===== WINDOW SYSTEM ===== */
.window{
position:absolute;
width:800px;
height:500px;
background:#1a1b1e;
border-radius:10px;
overflow:hidden;
display:none;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.titlebar{
height:35px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
cursor:move;
}

.close{
background:red;
border-radius:6px;
padding:3px 8px;
cursor:pointer;
}

.content{
flex:1;
display:flex;
}

/* ===== DISCORD UI ===== */
#sidebar{
width:70px;
background:#0f0f10;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
gap:10px;
}
.server{
width:45px;height:45px;border-radius:50%;background:#2b2d31;
display:flex;align-items:center;justify-content:center;cursor:pointer
}

#panel{
width:220px;background:#15161a;padding:10px
}
.channel{padding:6px;border-radius:6px;cursor:pointer}
.channel:hover{background:#2b2d31}

#chat{
flex:1;display:flex;flex-direction:column
}
#messages{
flex:1;overflow:auto;padding:10px
}
.msg{margin:5px 0;background:#2b2d31;padding:5px;border-radius:6px}

#input{display:flex}
#input input{flex:1}

</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
<div class="box">
<h3>ReplicaOS Login</h3>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- TASKBAR -->
<div id="taskbar">
<div class="taskbtn" onclick="openWindow('discordWin')">Discord</div>
</div>

<!-- DISCORD WINDOW -->
<div id="discordWin" class="window">

<div class="titlebar" onmousedown="dragStart(event,this.parentNode)">
<span>ReplicaOS Discord</span>
<div class="close" onclick="closeWin('discordWin')">X</div>
</div>

<div class="content">

<div id="sidebar"></div>
<div id="panel"></div>
<div id="chat">
<div id="messages"></div>
<div id="input">
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={apiKey:"X",authDomain:"X",projectId:"X"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user,currentServer,currentChannel;

/* ===== AUTH ===== */
window.register=async()=>{
const c=await createUserWithEmailAndPassword(auth,email.value,pass.value);
await setDoc(doc(db,"users",c.user.uid),{uid:c.user.uid,email:c.user.email});
};

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,pass.value);
};

onAuthStateChanged(auth,u=>{
if(!u)return;
user=u;

auth.style.display="none";
desktop.style.display="block";
openWindow('discordWin');
loadServers();
});

/* ===== WINDOWS SYSTEM ===== */
window.openWindow=(id)=>{
document.getElementById(id).style.display="flex";
};
window.closeWin=(id)=>{
document.getElementById(id).style.display="none";
};

/* DRAG */
let drag=false,offsetX,offsetY;
window.dragStart=(e,win)=>{
drag=true;
offsetX=e.clientX-win.offsetLeft;
offsetY=e.clientY-win.offsetTop;
document.onmousemove=e=>{
if(drag){
win.style.left=(e.clientX-offsetX)+"px";
win.style.top=(e.clientY-offsetY)+"px";
}
};
document.onmouseup=()=>drag=false;
};

/* ===== DISCORD CORE ===== */
window.createServer=async()=>{
const r=doc(collection(db,"servers"));
await setDoc(r,{name:"Server",members:[user.uid]});
};

function loadServers(){
onSnapshot(collection(db,"servers"),snap=>{
sidebar.innerHTML="";
snap.forEach(s=>{
sidebar.innerHTML+=`<div class='server' onclick="openServer('${s.id}')">S</div>`;
});
});
}

window.openServer=(id)=>{
currentServer=id;
onSnapshot(collection(db,"servers",id,"channels"),snap=>{
panel.innerHTML="";
snap.forEach(c=>{
panel.innerHTML+=`<div class='channel' onclick="openChannel('${c.id}')">#${c.data().name}</div>`;
});
});
};

window.openChannel=(id)=>{
currentChannel=id;
onSnapshot(collection(db,"servers",currentServer,"channels",id,"messages"),snap=>{
messages.innerHTML="";
snap.forEach(m=>{
messages.innerHTML+=`<div class='msg'><b>${m.data().username}</b>: ${m.data().text}</div>`;
});
});
};

window.send=async()=>{
await addDoc(collection(db,"servers",currentServer,"channels",currentChannel,"messages"),{
text:msg.value,
username:user.email,
time:serverTimestamp()
});
msg.value="";
};

</script>

</body>
</html>
