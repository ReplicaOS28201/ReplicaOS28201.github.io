<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
<style>
  /* ===============================
   🍎 CONTROL CENTER
=============================== */

.cc {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: flex-end;
  align-items: flex-start;

  pointer-events: none;
}

.cc-panel {
  width: 320px;
  margin: 20px;

  padding: 16px;
  border-radius: 20px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  transform: translateY(-20px) scale(0.95);
  opacity: 0;

  transition: all 0.3s ease;

  pointer-events: auto;
}

.cc.show .cc-panel {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.cc-header {
  font-weight: bold;
  margin-bottom: 10px;
}

.cc-group {
  margin-bottom: 12px;
}

.cc-buttons {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}

.cc-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;

  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
}

/* Toggle button */
#ccToggle {
  position: fixed;
  top: 10px;
  right: 10px;

  z-index: 9999;

  background: rgba(0,0,0,0.6);
  color: white;

  border: none;
  border-radius: 10px;
  padding: 8px;

  backdrop-filter: blur(10px);
}

/* Hidden */
.hidden {
  display: none;
}
</style>
</head>

<body>
  <!-- 🍎 CONTROL CENTER -->
<div id="controlCenter" class="cc hidden">
  <div class="cc-panel glass">

    <div class="cc-header">Control Center</div>

    <!-- Focus Modes -->
    <div class="cc-group">
      <span>Focus</span>
      <div class="cc-buttons">
        <button onclick="setFocusMode('gaming')">🎮</button>
        <button onclick="setFocusMode('coding')">💻</button>
        <button onclick="setFocusMode('chill')">🌙</button>
        <button onclick="setFocusMode('default')">🔓</button>
      </div>
    </div>

    <!-- Quick Toggles -->
    <div class="cc-group">
      <span>System</span>
      <div class="cc-buttons">
        <button onclick="toggleWifi()">📶</button>
        <button onclick="toggleSound()">🔊</button>
        <button onclick="toggleTheme()">🎨</button>
      </div>
    </div>

  </div>
</div>

<!-- Button to open -->
<button id="ccToggle" onclick="toggleControlCenter()">⚙️</button>
    <h2 class="title">19OS</h2>

    <!-- WINDOWS -->
    <div id="myApp" class="appwindow hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Calculator</span>
        <div class="window-controls">
          <button onclick="closeWindow('myApp'); event.stopPropagation();">×</button>
        </div>
      </div>
      <iframe src="Apps/com.calc.app/Index.html" class="window-content" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div id="secret" class="appwindow hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Secret Lang</span>
        <div class="window-controls">
          <button onclick="closeWindow('secret'); event.stopPropagation();">×</button>
        </div>
      </div>
      <iframe src="Apps/com.os.secretlang/Index.html" class="window-content" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div id="poki" class="appwindow hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Poki</span>
        <div class="window-controls">
          <button onclick="closeWindow('poki'); event.stopPropagation();">×</button>
        </div>
      </div>
      <iframe src="https://poki.com/" class="window-content" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div id="crashViewer" class="appwindow hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Crash Viewer</span>
        <button onclick="closeWindow('crashViewer'); event.stopPropagation();">×</button>
      </div>
      <div id="crashList"></div>
      <button onclick="clearCrashes()">Clear Logs</button>
    </div>

    <!-- DOCK -->
    <div class="dock glass">
      <button class="dock-icon" onclick="openWindow('myApp')">Calc</button>
      <button class="dock-icon" onclick="openWindow('secret')">Secret</button>
      <button class="dock-icon" onclick="openWindow('poki')">Poki</button>
      <button class="dock-icon" onclick="openWindow('crashViewer')">Crashes</button>
    </div>
  </div>

  <!-- ==============================
       19OS WINDOW SYSTEM
       ============================== -->
  <script>
    // --- CC -- 
    // ===============================
// 🍎 CONTROL CENTER LOGIC
// ===============================
function toggleControlCenter() {
  const cc = document.getElementById("controlCenter");

  if (cc.classList.contains("show")) {
    cc.classList.remove("show");
    setTimeout(() => cc.classList.add("hidden"), 200);
  } else {
    cc.classList.remove("hidden");
    setTimeout(() => cc.classList.add("show"), 10);
  }
}

// Close when clicking outside
document.addEventListener("click", (e) => {
  const cc = document.getElementById("controlCenter");
  const panel = cc.querySelector(".cc-panel");

  if (!panel.contains(e.target) && e.target.id !== "ccToggle") {
    cc.classList.remove("show");
    setTimeout(() => cc.classList.add("hidden"), 200);
  }
});

// ===============================
// 🔘 FAKE SYSTEM TOGGLES
// ===============================
let wifi = true;
function toggleWifi() {
  wifi = !wifi;
  FocusModes.notify("WiFi " + (wifi ? "On 📶" : "Off ❌"));
}

let sound = true;
function toggleSound() {
  sound = !sound;
  FocusModes.notify("Sound " + (sound ? "On 🔊" : "Muted 🔇"));
}

function toggleTheme() {
  const current = document.body.getAttribute("data-theme");

  const next = current === "dark" ? "light" : "dark";
  document.body.setAttribute("data-theme", next);

  FocusModes.notify("Theme: " + next);
}
    // ---------- Open / Close ----------
    let zIndexCounter = 100;
    function bringToFront(win){ zIndexCounter++; win.style.zIndex = zIndexCounter; }

    function openWindow(id) {
      const el = document.getElementById(id);
      if (!el) return console.warn("Window not found:", id);
      el.classList.remove("hidden");
      el.style.display = "flex";
      el.style.transform = "translate3d(0,0,0)";
      bringToFront(el);

      if (id === "crashViewer") renderCrashLogs();
    }

    function closeWindow(id) {
      const el = document.getElementById(id);
      if (!el) return console.warn("Window not found:", id);
      el.classList.add("hidden");
      el.style.display = "none";
    }

    // ---------- Drag ----------
function makeDraggable(win) {
  const header = win.querySelector(".window-titlebar");
  if (!header) return;

  // Make sure window has position absolute and initial transform
  win.style.position = "absolute";
  if (!win.style.transform) win.style.transform = "translate3d(0,0,0)";

  let isDragging = false;
  let offsetX = 0, offsetY = 0;
  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
  let rafId = null;

  function getPos(e) {
    return e.touches
      ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
      : { x: e.clientX, y: e.clientY };
  }

  function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    bringToFront(win);

    const rect = win.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("touchend", stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();

    const pos = getPos(e);
    targetX = pos.x - offsetX;
    targetY = pos.y - offsetY;

    if (!rafId) rafId = requestAnimationFrame(updatePosition);
  }

  function updatePosition() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const rect = win.getBoundingClientRect();

    currentX = Math.max(0, Math.min(targetX, vw - rect.width));
    currentY = Math.max(0, Math.min(targetY, vh - rect.height));

    win.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
    rafId = null;
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("touchend", stopDrag);
  }

  header.addEventListener("mousedown", startDrag);
  header.addEventListener("touchstart", startDrag, { passive: false });
}
    // ---------- Resize ----------
    function makeResizable(win){
      const handles = win.querySelectorAll(".resize-handle");
      handles.forEach(handle=>{
        let isResizing=false, startX, startY, startW, startH, targetW, targetH, rafId=null;

        function getPos(e){ return e.touches? {x:e.touches[0].clientX, y:e.touches[0].clientY} : {x:e.clientX, y:e.clientY}; }

        function startResize(e){
          e.preventDefault();
          isResizing=true;
          bringToFront(win);
          const rect=win.getBoundingClientRect();
          const pos=getPos(e);
          startX=pos.x; startY=pos.y;
          startW=rect.width; startH=rect.height;

          document.addEventListener("mousemove", resize);
          document.addEventListener("mouseup", stopResize);
          document.addEventListener("touchmove", resize, {passive:false});
          document.addEventListener("touchend", stopResize);
        }

        function resize(e){
          if(!isResizing) return;
          e.preventDefault();
          const pos=getPos(e);
          const dx=pos.x-startX, dy=pos.y-startY;

          if(handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) targetW = startW+dx;
          if(handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) targetH = startH+dy;

          if(!rafId) rafId = requestAnimationFrame(applyResize);
        }

        function applyResize(){
          if(targetW!==undefined) win.style.width = Math.max(0,targetW)+"px";
          if(targetH!==undefined) win.style.height = Math.max(0,targetH)+"px";
          rafId=null;
        }

        function stopResize(){
          isResizing=false;
          document.removeEventListener("mousemove", resize);
          document.removeEventListener("mouseup", stopResize);
          document.removeEventListener("touchmove", resize);
          document.removeEventListener("touchend", stopResize);
        }

        handle.addEventListener("mousedown", startResize);
        handle.addEventListener("touchstart", startResize, {passive:false});
      });
    }

    document.addEventListener("DOMContentLoaded", ()=>{
      document.querySelectorAll(".appwindow").forEach(win=>{
        makeDraggable(win);
        makeResizable(win);
      });
    });

    // ---------------- Crash Logger ----------------
    const CrashLogger = {
      logs: [],
      add(log){ this.logs.push({...log,time:new Date().toLocaleTimeString()}); },
      clear(){ this.logs=[]; }
    };

    function renderCrashLogs(){
      const list = document.getElementById("crashList");
      list.innerHTML="";
      CrashLogger.logs.forEach(log=>{
        const item=document.createElement("div");
        item.className="crash-item";
        item.innerHTML=`<b>${log.source}</b> - ${log.time}<br>${log.message}
        <details><summary>Stack</summary><pre>${log.stack}</pre></details>`;
        list.appendChild(item);
      });
    }

    function clearCrashes(){ CrashLogger.clear(); renderCrashLogs(); }
  </script>
</body>
</html>
