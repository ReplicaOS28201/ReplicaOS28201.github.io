<body>

    <button class="dock-icon" onclick="openWindow('poki')">Poki</button>

   <button class="dock-icon" onclick="toggle3D()">3D Mode</button>
  </div>

<script>
 function create3DWindow(appId, url, x, y) {
  // Create iframe (hidden)
  const iframe = document.createElement("iframe");
  iframe.src = url;
  iframe.style.position = "absolute";
  iframe.style.left = "-9999px";
  iframe.style.width = "800px";
  iframe.style.height = "600px";
  document.body.appendChild(iframe);

  // Render iframe into canvas
  const canvas = document.createElement("canvas");
  canvas.width = 800;
  canvas.height = 600;
  const ctx = canvas.getContext("2d");

  const texture = new THREE.CanvasTexture(canvas);

  const geo = new THREE.PlaneGeometry(4, 3);
  const mat = new THREE.MeshBasicMaterial({ map: texture });

  const panel = new THREE.Mesh(geo, mat);
  panel.position.set(x, y, 0);
  panel.userData.app = appId;

  scene.add(panel);

  // Update texture loop
  function updateTexture() {
    try {
      ctx.drawImage(iframe, 0, 0, canvas.width, canvas.height);
      texture.needsUpdate = true;
    } catch (e) {}
    requestAnimationFrame(updateTexture);
  }

  updateTexture();

  return panel;
}
 const apps3D = [];

apps3D.push(create3DWindow("myApp", "Apps/com.calc.app/Index.html", -3, 1));
apps3D.push(create3DWindow("secret", "Apps/com.os.secretlang/Index.html", 3, 1));

 
  // ===============================
// 19OS WINDOW SYSTEM (FULL)
// ===============================
// ---------- Z-Index System ----------
let zIndexCounter = 100;

let highestZ = 1;
const windowState = {};

function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.remove("hidden");

  // Restore position if saved
  if (windowState[id]) {
    el.style.left = windowState[id].left;
    el.style.top = windowState[id].top;
  }

  bringToFront(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  // Save position before closing
  windowState[id] = {
    left: el.style.left,
    top: el.style.top
  };

  el.classList.add("hidden");
}

function bringToFront(el) {
  highestZ++;
  el.style.zIndex = highestZ;
}

// ===============================
// DRAG SYSTEM (ULTRA SMOOTH)
// ===============================
function makeDraggable(windowEl) {
  const header = windowEl.querySelector(".window-titlebar");
  if (!header) return;

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  let targetX = 0;
  let targetY = 0;

  let currentX = 0;
  let currentY = 0;

  let rafId = null;

  function getPos(e) {
    return e.touches
      ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
      : { x: e.clientX, y: e.clientY };
  }

  function startDrag(e) {
    e.preventDefault();
    isDragging = true;

    bringToFront(windowEl);

    const rect = windowEl.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("touchend", stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();

    const pos = getPos(e);

    targetX = pos.x - offsetX;
    targetY = pos.y - offsetY;

    if (!rafId) rafId = requestAnimationFrame(updatePosition);
  }

  function updatePosition() {
    currentX = targetX;
    currentY = targetY;

    windowEl.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;

    rafId = null;
  }

  function stopDrag() {
  isDragging = false;

  // 🔥 SAVE POSITION
  saveWindowState(windowEl);

  document.removeEventListener("mousemove", drag);
  document.removeEventListener("mouseup", stopDrag);
  document.removeEventListener("touchmove", drag);
  document.removeEventListener("touchend", stopDrag);
}

  header.addEventListener("mousedown", startDrag);
  header.addEventListener("touchstart", startDrag, { passive: false });
}

// ===============================
// RESIZE SYSTEM (SMOOTH)
// ===============================
function makeResizable(windowEl) {
  const handles = windowEl.querySelectorAll(".resize-handle");

  handles.forEach(handle => {
    let isResizing = false;

    let startX, startY;
    let startWidth, startHeight;

    let targetWidth, targetHeight;
    let rafId = null;

    function getPos(e) {
      return e.touches
        ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
        : { x: e.clientX, y: e.clientY };
    }

    function startResize(e) {
      e.preventDefault();
      isResizing = true;

      bringToFront(windowEl);

      const rect = windowEl.getBoundingClientRect();
      const pos = getPos(e);

      startX = pos.x;
      startY = pos.y;

      startWidth = rect.width;
      startHeight = rect.height;

      document.addEventListener("mousemove", resize);
      document.addEventListener("mouseup", stopResize);
      document.addEventListener("touchmove", resize, { passive: false });
      document.addEventListener("touchend", stopResize);
    }

    function resize(e) {
      if (!isResizing) return;
      e.preventDefault();

      const pos = getPos(e);

      const dx = pos.x - startX;
      const dy = pos.y - startY;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        targetWidth = startWidth + dx;
      }

      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        targetHeight = startHeight + dy;
      }

      if (!rafId) rafId = requestAnimationFrame(applyResize);
    }

    function applyResize() {
      const minWidth = 200;
      const minHeight = 150;

      if (targetWidth !== undefined) {
        windowEl.style.width = Math.max(minWidth, targetWidth) + "px";
      }

      if (targetHeight !== undefined) {
        windowEl.style.height = Math.max(minHeight, targetHeight) + "px";
      }

      rafId = null;
    }

    function stopResize() {
  isResizing = false;

  // 🔥 SAVE SIZE
  saveWindowState(windowEl);

  document.removeEventListener("mousemove", resize);
  document.removeEventListener("mouseup", stopResize);
  document.removeEventListener("touchmove", resize);
  document.removeEventListener("touchend", stopResize);
}

    handle.addEventListener("mousedown", startResize);
    handle.addEventListener("touchstart", startResize, { passive: false });
  });
}



// ---------- File Explorer ----------
function addFilesToExplorer(fileList) {
  const list = document.getElementById("fileList");
  if (!list) return;

  [...fileList].forEach(file => {
    const item = document.createElement("li");
    item.style.padding = "10px";
    item.style.borderRadius = "8px";
    item.style.background = "rgba(255,255,255,0.06)";
    item.style.fontSize = "13px";

    item.textContent = `${file.name} (${Math.max(1, Math.round(file.size / 1024))} KB)`;
    list.appendChild(item);
  });
}

function initFileExplorer() {
  const dropZone = document.getElementById("fileDropZone");
  const picker = document.getElementById("filePicker");
  if (!dropZone || !picker) return;

  picker.addEventListener("change", e => {
    addFilesToExplorer(e.target.files || []);
    picker.value = "";
  });

  ["dragenter","dragover"].forEach(type => {
    dropZone.addEventListener(type, e => {
      e.preventDefault();
      dropZone.style.background = "rgba(255,255,255,0.15)";
    });
  });

  ["dragleave","drop"].forEach(type => {
    dropZone.addEventListener(type, e => {
      e.preventDefault();
      dropZone.style.background = "transparent";
    });
  });

  dropZone.addEventListener("drop", e => {
    addFilesToExplorer(e.dataTransfer.files || []);
  });
}

initFileExplorer();
  // ===============================
// INIT SYSTEM
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    makeDraggable(win);
    makeResizable(win);
  });
});
 // ===============================
// 🌍 3D MODE SYSTEM (OPTIONAL)
// ===============================
let scene, camera, renderer;
let is3DActive = false;
let cubes = [];

function init3D() {
  if (scene) return; // already initialized

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("world3d"),
    alpha: true
  });

  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.position.z = 5;

  // Light
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light);

  // Create cubes
  cubes.push(createAppCube(0x00ffcc, "myApp", -3));
  cubes.push(createAppCube(0xff0066, "secret", -1));
  cubes.push(createAppCube(0x0066ff, "poki", 1));
  cubes.push(createAppCube(0xffff00, "fileExplorer", 3));

  animate3D();
}

function createAppCube(color, appId, x) {
  const geo = new THREE.BoxGeometry();
  const mat = new THREE.MeshStandardMaterial({ color });

  const cube = new THREE.Mesh(geo, mat);
  cube.position.x = x;
  cube.userData.app = appId;

  scene.add(cube);
  return cube;
}

// ===============================
// 🖱️ CLICK IN 3D
// ===============================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", (event) => {
  if (!is3DActive) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(cubes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;

    if (obj.userData.app) {
      openWindow(obj.userData.app);
    }
  }
});

// ===============================
// 🔁 ANIMATION
// ===============================
function animate3D() {
  requestAnimationFrame(animate3D);

  if (!is3DActive) return;

  cubes.forEach(cube => {
    cube.rotation.x += 0.005;
    cube.rotation.y += 0.005;
  });

  renderer.render(scene, camera);
}

// ===============================
// 🔘 TOGGLE FUNCTION
// ===============================
function toggle3D() {
  is3DActive = !is3DActive;

  document.body.classList.toggle("mode3d", is3DActive);

  if (is3DActive) {
    init3D();
  }

  // Save state
  localStorage.setItem("3dMode", is3DActive);
}

// ===============================
// 💾 RESTORE MODE
// ===============================
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("3dMode") === "true";

  if (saved) {
    toggle3D();
  }
});

// ===============================
// 📱 RESIZE
// ===============================
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
