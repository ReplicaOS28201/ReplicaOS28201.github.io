<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ReplicaOS 3D - Spatial Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .dock {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); border-radius: 50px;
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.2);
        }

        .dock-btn {
            width: 50px; height: 50px; border: none; border-radius: 50%;
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; transition: 0.3s; font-size: 12px;
        }

        .dock-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="dock">
        <button class="dock-btn" onclick="spawnWindow('CALC', 0x00ffcc)">C</button>
        <button class="dock-btn" onclick="spawnWindow('FILE', 0xff0066)">F</button>
        <button class="dock-btn" onclick="spawnWindow('NET', 0x0066ff)">N</button>
        <button class="dock-btn" onclick="resetCamera()">⟲</button>
    </div>
</div>
<div id="app-layer">
    <div id="calcApp" class="appwindow hidden">
        <div class="titlebar">
            CALC
            <button onclick="closeApp('calcApp')">✕</button>
        </div>
        <div class="content">
            <input type="text" placeholder="2+2">
        </div>
    </div>

    <div id="fileApp" class="appwindow hidden">
        <div class="titlebar">
            FILE
            <button onclick="closeApp('fileApp')">✕</button>
        </div>
        <div class="content">
            File system here
        </div>
    </div>

    <div id="netApp" class="appwindow hidden">
        <div class="titlebar">
            NET
            <button onclick="closeApp('netApp')">✕</button>
        </div>
        <div class="content">
            Internet app
        </div>
    </div>
</div>
<script>
let scene, camera, renderer, raycaster, mouse;
let windows = []; // { mesh, title, minimized }
let isDragging = false;
let selectedWin = null;

let lastClick = 0;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 2, 15);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 0, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Starfield
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];

    for (let i = 0; i < 5000; i++) {
        starCoords.push(
            (Math.random() - 0.5) * 20,
            (Math.random() - 0.5) * 20,
            (Math.random() - 0.5) * 20
        );
    }

    starGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(starCoords, 3)
    );

    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.02,
    });

    scene.add(new THREE.Points(starGeo, starMat));

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    // INPUT EVENTS
    window.addEventListener("mousedown", (e) =>
        handleStart(e.clientX, e.clientY)
    );

    window.addEventListener(
        "touchstart",
        (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY),
        { passive: false }
    );

    window.addEventListener("mousemove", (e) =>
        handleMove(e.clientX, e.clientY)
    );

    window.addEventListener(
        "touchmove",
        (e) => {
            e.preventDefault();
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        },
        { passive: false }
    );

    window.addEventListener("mouseup", handleEnd);
    window.addEventListener("touchend", handleEnd);

    window.addEventListener("resize", onWindowResize);
}

/* -----------------------------
   3D WINDOW SYSTEM
------------------------------*/

function spawnWindow(title, color) {
    const canvas = document.createElement("canvas");
    canvas.width = 512;
    canvas.height = 384;

    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "rgba(30,30,30,0.95)";
    ctx.fillRect(0, 0, 512, 384);

    ctx.fillStyle = "#" + color.toString(16).padStart(6, "0");
    ctx.fillRect(0, 0, 512, 60);

    ctx.fillStyle = "white";
    ctx.font = "bold 32px sans-serif";
    ctx.fillText(title, 25, 42);

    // CLOSE (red)
    ctx.fillStyle = "#ff4b4b";
    ctx.beginPath();
    ctx.arc(480, 30, 15, 0, Math.PI * 2);
    ctx.fill();

    // MINIMIZE (yellow)
    ctx.fillStyle = "#ffd93d";
    ctx.beginPath();
    ctx.arc(440, 30, 15, 0, Math.PI * 2);
    ctx.fill();

    const texture = new THREE.CanvasTexture(canvas);

    const material = new THREE.MeshStandardMaterial({
        map: texture,
        transparent: true,
        side: THREE.DoubleSide,
    });

    const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(2.5, 1.8),
        material
    );

    mesh.position.set((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2, 0);
    mesh.userData.title = title;

    scene.add(mesh);

    windows.push({
        mesh,
        title,
        minimized: false,
    });
}

/* -----------------------------
   INPUT HANDLING
------------------------------*/

function handleStart(x, y) {
    const now = Date.now();

    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(
        windows.map((w) => w.mesh)
    );

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const win = windows.find((w) => w.mesh === obj);

        const uv = intersects[0].uv;

        // CLOSE BUTTON
        if (uv.x > 0.85 && uv.y > 0.75) {
            scene.remove(obj);
            windows = windows.filter((w) => w.mesh !== obj);
            return;
        }

        // MINIMIZE BUTTON
        if (uv.x > 0.75 && uv.x < 0.85 && uv.y > 0.75) {
            win.minimized = true;
            obj.visible = false;
            return;
        }

        // DOUBLE CLICK → OPEN APP WINDOW
        if (now - lastClick < 300) {
            if (obj.userData.title === "CALC") openApp("calcApp");
            if (obj.userData.title === "FILE") openApp("fileApp");
            if (obj.userData.title === "NET") openApp("netApp");
        }

        lastClick = now;

        isDragging = true;
        selectedWin = obj;
        obj.position.z = 0.2;
    }
}

function handleMove(x, y) {
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    if (isDragging && selectedWin) {
        const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
        vector.unproject(camera);

        const dir = vector.sub(camera.position).normalize();
        const dist = -camera.position.z / dir.z;

        const pos = camera.position.clone().add(dir.multiplyScalar(dist));

        selectedWin.position.x = pos.x;
        selectedWin.position.y = pos.y;
    } else {
        // camera parallax
        camera.position.x += (mouse.x * 0.5 - camera.position.x) * 0.02;
        camera.position.y += (mouse.y * 0.5 - camera.position.y) * 0.02;
        camera.lookAt(0, 0, 0);
    }
}

function handleEnd() {
    if (selectedWin) selectedWin.position.z = 0;
    isDragging = false;
    selectedWin = null;
}

/* -----------------------------
   APP WINDOW SYSTEM (HTML)
------------------------------*/

function openApp(id) {
    document.getElementById(id).classList.remove("hidden");
}

function closeApp(id) {
    document.getElementById(id).classList.add("hidden");
}

/* -----------------------------
   RESTORE FROM DOCK
------------------------------*/

function restoreWindow(title) {
    const win = windows.find(
        (w) => w.title === title && w.minimized
    );

    if (win) {
        win.mesh.visible = true;
        win.minimized = false;
        win.mesh.position.z = 0.2;
    } else {
        if (title === "CALC") spawnWindow("CALC", 0x00ffcc);
        if (title === "FILE") spawnWindow("FILE", 0xff0066);
        if (title === "NET") spawnWindow("NET", 0x0066ff);
    }
}

/* -----------------------------
   CAMERA RESET
------------------------------*/

function resetCamera() {
    camera.position.set(0, 0, 5);
}

/* -----------------------------
   RESIZE
------------------------------*/

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

/* -----------------------------
   RENDER LOOP
------------------------------*/

function animate() {
    requestAnimationFrame(animate);

    windows.forEach((win, i) => {
        if (win.mesh !== selectedWin) {
            win.mesh.position.y +=
                Math.sin(Date.now() * 0.001 + i) * 0.002;
        }
    });

    renderer.render(scene, camera);
}
</script>
</body>
</html>
