<<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ReplicaOS - System Edition</title>

<style>
:root {
    --taskbar-bg: rgba(20,20,20,0.85);
    --win-bg: #f3f3f3;
    --accent: #0078d4;
}

/* GLOBAL */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body,html {
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:system-ui;
    background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover;
}

/* DESKTOP */
#desktop{
    height:calc(100vh - 48px);
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,90px);
    gap:15px;
}

.icon{color:white;text-align:center;cursor:pointer;}
.icon img{width:45px;}

/* WINDOW */
.window{
    position:absolute;
    width:420px;
    height:500px;
    background:var(--win-bg);
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    display:none;
    flex-direction:column;
    left:0;
    top:0;
}

/* TASKBAR */
#taskbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:48px;
    background:var(--taskbar-bg);
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    padding:0 15px;
}

/* START MENU */
#startMenu{
    position:fixed;
    bottom:55px;
    left:10px;
    width:220px;
    background:rgba(30,30,30,0.95);
    border-radius:10px;
    display:none;
    flex-direction:column;
    padding:10px;
    color:white;
}

/* ================= SYSTEM NOTIFICATIONS (GLOBAL LAYER) ================= */
#systemNotifications{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999999;
}

.notification{
    width:260px;
    background:rgba(25,25,25,0.95);
    color:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideIn 0.25s ease;
}

@keyframes slideIn{
    from{transform:translateX(120%);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

.notif-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.notif-actions button{
    flex:1;
    border:none;
    padding:6px;
    border-radius:6px;
    cursor:pointer;
}

/* CALL COLORS */
.accept{background:#4CAF50;color:white;}
.decline{background:#e53935;color:white;}
</style>
</head>

<body>

<!-- SYSTEM NOTIFICATION LAYER (OUTSIDE OS) -->
<div id="systemNotifications"></div>

<!-- DESKTOP -->
<div id="desktop">

    <div class="icon" onclick="openWindow('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <div>Friends</div>
    </div>

    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>

    <div class="icon" onclick="openWindow('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <div>Call</div>
    </div>

</div>

<!-- WINDOWS -->
<div id="friends" class="window"></div>
<div id="chat" class="window"></div>

<div id="call" class="window">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
</div>

<!-- START MENU -->
<div id="startMenu"></div>

<!-- TASKBAR -->
<div id="taskbar">
    <div onclick="toggleStart()">🪟 Start</div>
    <div id="clock"></div>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getDatabase,
    ref,
    set,
    onValue,
    push,
    serverTimestamp,
    onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey:"YOUR_KEY",
    databaseURL:"YOUR_DB",
    projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */
const myId = Math.random().toString(36).substring(2,10);
set(ref(db,"presence/"+myId),true);
onDisconnect(ref(db,"presence/"+myId)).remove();

/* ================= SYSTEM NOTIFICATIONS ================= */
function notifySystem(title, text, actions = []) {
    const box = document.getElementById("systemNotifications");

    const n = document.createElement("div");
    n.className = "notification";

    n.innerHTML = `
        <b>${title}</b><br>
        <small>${text}</small>
        <div class="notif-actions"></div>
    `;

    const actionsBox = n.querySelector(".notif-actions");

    actions.forEach(a=>{
        const btn=document.createElement("button");
        btn.innerText=a.label;
        btn.className=a.type;
        btn.onclick=()=>a.action(n);
        actionsBox.appendChild(btn);
    });

    box.appendChild(n);

    setTimeout(()=>n.remove(),8000);
}

/* ================= FRIEND SYSTEM ================= */
onValue(ref(db,"friends/"+myId),(snap)=>{
    const data=snap.val()||{};
    console.log("Friends:",Object.keys(data));
});

/* ================= CHAT ================= */
window.sendMsg=(msg)=>{
    push(ref(db,"messages"),{
        from:myId,
        text:msg,
        time:serverTimestamp()
    });
};

onValue(ref(db,"messages"),(snap)=>{
    console.log("chat updated");
});

/* ================= CALL SYSTEM ================= */
const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
});

let localStream;

async function startMedia(){
    if(localStream) return;
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
}

pc.ontrack=(e)=>{
    document.getElementById("remoteVideo").srcObject=e.streams[0];
};

/* CALL NOTIFICATION (GLOBAL SYSTEM LEVEL) */
onValue(ref(db,"calls"),async(snap)=>{
    const calls=snap.val();
    if(!calls) return;

    for(const id in calls){
        const c=calls[id];

        if(c.to===myId && c.offer && !pc.currentRemoteDescription){

            notifySystem(
                "Incoming Call",
                "User "+c.from+" is calling you",
                [
                    {
                        label:"Accept",
                        type:"accept",
                        action:async()=>{
                            await startMedia();

                            await pc.setRemoteDescription(c.offer);

                            const ans=await pc.createAnswer();
                            await pc.setLocalDescription(ans);

                            set(ref(db,"calls/"+id+"/answer"),pc.localDescription);

                            openWindow("call");
                        }
                    },
                    {
                        label:"Decline",
                        type:"decline",
                        action:()=>{}
                    }
                ]
            );
        }
    }
});

/* ================= WINDOW CORE ================= */
let highestZ=1000;

window.openWindow=(id)=>{
    const el=document.getElementById(id);
    el.style.display="flex";
    el.style.zIndex=++highestZ;
    el.style.left="0px";
    el.style.top="0px";
};

window.toggleStart=()=>{
    const s=document.getElementById("startMenu");
    s.style.display=s.style.display==="flex"?"none":"flex";
};

/* CLOCK */
setInterval(()=>{
    document.getElementById("clock").innerText=
    new Date().toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
    });
},1000);

</script>

</body>
</html>
