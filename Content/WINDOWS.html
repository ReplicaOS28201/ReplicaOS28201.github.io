<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReplicaOS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* LOGIN */
#login {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#000;
  color:white;
  z-index:9999;
}

/* OS */
#os {
  display:none;
}

/* WINDOWS */
.appwindow {
  position:absolute;
  width:320px;
  height:220px;
  background:rgba(20,20,20,0.95);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
}

.hidden { display:none; }

.titlebar {
  height:35px;
  background:rgba(255,255,255,0.1);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  cursor:grab;
}

.content {
  height:calc(100% - 35px);
  color:white;
  padding:10px;
}

/* LOG */
#log {
  position:fixed;
  top:10px;
  right:10px;
  width:280px;
  max-height:200px;
  overflow:auto;
  background:rgba(0,0,0,0.6);
  color:#9fd;
  font-size:12px;
  padding:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <h2>ReplicaOS Key</h2>
  <input id="keyInput" placeholder="Enter Access Key">
  <button onclick="validateKey()">Unlock</button>
</div>

<!-- 💻 OS -->
<div id="os">

  <div id="log"></div>

  <!-- CALC -->
  <div id="calc" class="appwindow hidden">
    <div class="titlebar">Calculator <button onclick="closeWindow('calc')">X</button></div>
    <div class="content">Calculator App</div>
  </div>

  <!-- NOTES -->
  <div id="notes" class="appwindow hidden">
    <div class="titlebar">Notes <button onclick="closeWindow('notes')">X</button></div>
    <div class="content">Notes App</div>
  </div>

  <!-- CALL -->
  <div id="call" class="appwindow hidden">
    <div class="titlebar">Call <button onclick="Call.end()">X</button></div>
    <div class="content">
      <input id="targetUID" placeholder="User UID">
      <button onclick="Call.start()">Call</button>
      <button onclick="Call.accept()">Accept</button>
      <button onclick="Call.reject()">Reject</button>
      <div id="callStatus">Idle</div>
    </div>
  </div>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  setDoc,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "replicaos.firebaseapp.com",
  projectId: "replicaos",
  storageBucket: "replicaos.firebasestorage.app",
  messagingSenderId: "34115825829",
  appId: "1:34115825829:web:246973f8280df47f221d4c",
  measurementId: "G-F26619EETW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);

/* ================= KEY SYSTEM ================= */

window.validateKey = async function () {
  const key = document.getElementById("keyInput").value;

  const ref = doc(db, "keys", key);
  const snap = await getDoc(ref);

  if (!snap.exists()) return alert("Invalid Key");

  const data = snap.data();

  if (!data.active || data.used) {
    return alert("Key not valid");
  }

  await updateDoc(ref, { used: true });

  unlockOS();
};

function unlockOS() {
  document.getElementById("login").style.display = "none";
  document.getElementById("os").style.display = "block";

  startOS();
  Call.init();
}

/* ================= WINDOW SYSTEM ================= */

window.openWindow = (id) => {
  document.getElementById(id).classList.remove("hidden");
};

window.closeWindow = (id) => {
  document.getElementById(id).classList.add("hidden");
};

/* ================= SYSTEM LOG ================= */

function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML += `<div>${msg}</div>`;
}

/* ================= CALL SYSTEM ================= */

const Call = {
  peer:null,
  stream:null,
  current:null,

  async init() {
    const uid = auth.currentUser.uid;

    this.peer = new Peer(uid);

    this.peer.on("call", async (call) => {
      this.current = call;
      openWindow("call");
      document.getElementById("callStatus").innerText = "Incoming...";
    });
  },

  async start() {
    const target = document.getElementById("targetUID").value;
    this.current = this.peer.call(target, await this.getStream());
    openWindow("call");
    document.getElementById("callStatus").innerText = "Calling...";
  },

  async getStream() {
    if (!this.stream) {
      this.stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    }
    return this.stream;
  },

  accept() {
    document.getElementById("callStatus").innerText = "Connected";
  },

  reject() {
    this.current?.close();
    closeWindow("call");
  },

  end() {
    this.current?.close();
    closeWindow("call");
  }
};

/* ================= THREE BACKGROUND ================= */

function startOS() {
  log("OS Booted");

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const geo = new THREE.BufferGeometry();
  const arr = [];

  for (let i=0;i<2000;i++) {
    arr.push((Math.random()-0.5)*20);
    arr.push((Math.random()-0.5)*20);
    arr.push((Math.random()-0.5)*20);
  }

  geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

  const mat = new THREE.PointsMaterial({ size:0.02, color:0xffffff });

  scene.add(new THREE.Points(geo, mat));

  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }

  animate();
}

</script>

</body>
</html>
