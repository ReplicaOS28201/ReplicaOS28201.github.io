<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReplicaOS - Win11 Desktop + Discord</title>

<style>
/* ===================== GLOBAL ===================== */
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
    background: #0b0f17;
    color: white;
}

/* ===================== LOCK / AUTH ===================== */
#auth {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1f2e, #000);
    z-index: 9999;
}

.box {
    width: 340px;
    background: rgba(30,30,40,0.95);
    padding: 25px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}

input {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1b1f2a;
    color: white;
    outline: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

button:hover { background: #1d4ed8; }

/* ===================== DESKTOP ===================== */
#desktop {
    display: none;
    width: 100vw;
    height: 100vh;
    background: url('https://w.wallhaven.cc/full/1p/wallhaven-1p2w3v.jpg') center/cover;
    position: relative;
}

/* ===================== TASKBAR (Win11 style) ===================== */
#taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: rgba(20,20,20,0.75);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.taskbtn {
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
}

.taskbtn:hover {
    background: rgba(255,255,255,0.18);
}

/* ===================== WINDOW SYSTEM ===================== */
.window {
    position: absolute;
    width: 900px;
    height: 560px;
    background: #2b2f3a;
    border-radius: 12px;
    overflow: hidden;
    display: none;
    flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.titlebar {
    height: 36px;
    background: #1f2430;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    cursor: move;
}

.close {
    width: 22px;
    height: 22px;
    background: #ef4444;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.content {
    flex: 1;
    display: flex;
}

/* ===================== DISCORD UI ===================== */
#sidebar {
    width: 72px;
    background: #1a1d24;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
    gap: 10px;
}

.server {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #2c313c;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.server:hover {
    background: #5865f2;
    border-radius: 35%;
}

#panel {
    width: 240px;
    background: #23272f;
    padding: 10px;
}

.channel {
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    color: #aaa;
}

.channel:hover {
    background: #2f3440;
    color: white;
}

#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
}

.msg b { color: #fff; }
.msg p { margin: 2px 0; color: #ccc; }

#input {
    display: flex;
    padding: 10px;
    background: #1f2430;
}

#msg {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #2b2f3a;
    color: white;
}

</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
    <div class="box">
        <h3>ReplicaOS Login</h3>
        <input id="email" placeholder="Email" />
        <input id="pass" type="password" placeholder="Password" />
        <button id="login">Login</button>
        <button id="register">Register</button>
    </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

    <div id="taskbar">
        <div class="taskbtn" onclick="openWin('discord')">Discord</div>
        <div class="taskbtn" onclick="alert('Start Menu coming soon')">Start</div>
    </div>

    <!-- DISCORD WINDOW -->
    <div id="discord" class="window">
        <div class="titlebar" id="drag">
            <span>ReplicaOS Discord</span>
            <div class="close" onclick="closeWin('discord')">×</div>
        </div>

        <div class="content">
            <div id="sidebar">
                <div class="server" onclick="createServer()">+</div>
            </div>

            <div id="panel">
                <b>Channels</b>
            </div>

            <div id="chat">
                <div id="messages"></div>
                <div id="input">
                    <input id="msg" placeholder="Message..." />
                    <button onclick="send()">Send</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCnJPv3cclaIArwUPKEq5of0NyafJ7d4QI",
    authDomain: "replicanewos3030.firebaseapp.com",
    projectId: "replicanewos3030"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null, server = null, channel = null;

onAuthStateChanged(auth, u => {
    if (u) {
        user = u;
        auth.style.display = "none";
        desktop.style.display = "block";
    }
});

document.getElementById('login').onclick = async () => {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
};

document.getElementById('register').onclick = async () => {
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
};

window.openWin = id => document.getElementById(id).style.display = "flex";
window.closeWin = id => document.getElementById(id).style.display = "none";

window.createServer = async () => {
    const name = prompt("Server name");
    const ref = doc(collection(db,"servers"));
    await setDoc(ref,{name});
};

window.send = async () => {
    if (!channel) return;
    await addDoc(collection(db,"servers",server,"channels",channel,"messages"),{
        text: msg.value,
        user: user.email,
        time: serverTimestamp()
    });
    msg.value="";
};

// drag
const win = document.getElementById('discord');
const drag = document.getElementById('drag');
let d=false,x=0,y=0;
drag.onmousedown=e=>{d=true;x=e.clientX-win.offsetLeft;y=e.clientY-win.offsetTop};
document.onmousemove=e=>{if(d){win.style.left=(e.clientX-x)+'px';win.style.top=(e.clientY-y)+'px'}};
document.onmouseup=()=>d=false;

</script>
</body>
</html>
