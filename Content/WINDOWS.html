<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ReplicaOS Ultimate</title>

<style>

:root{
    --taskbar-bg:rgba(20,20,20,0.86);
    --win-bg:#f3f3f3;
    --accent:#0078d4;
}

/* ================= GLOBAL ================= */

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:system-ui;
}

body{
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80')
    center/cover no-repeat fixed;
}

/* ================= DESKTOP ================= */

#desktop{
    position:fixed;
    inset:0;

    padding:18px;
    padding-bottom:75px;

    display:grid;
    grid-template-columns:repeat(auto-fill,90px);

    gap:18px;

    align-content:start;
}

.icon{
    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;

    color:white;

    cursor:pointer;

    user-select:none;
}

.icon img{
    width:54px;
    height:54px;

    object-fit:contain;

    margin-bottom:6px;
}

/* ================= TASKBAR ================= */

#taskbar{
    position:fixed;

    left:0;
    right:0;
    bottom:0;

    height:55px;

    background:var(--taskbar-bg);

    backdrop-filter:blur(12px);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 14px;

    color:white;

    z-index:999999;
}

.taskBtn{
    cursor:pointer;
}

/* ================= START MENU ================= */

#startMenu{
    position:fixed;

    left:10px;
    bottom:65px;

    width:280px;

    background:rgba(25,25,25,0.96);

    backdrop-filter:blur(15px);

    border-radius:16px;

    padding:14px;

    display:none;
    flex-direction:column;

    gap:10px;

    z-index:999999;
}

.startItem{
    background:rgba(255,255,255,0.08);

    color:white;

    padding:12px;

    border-radius:10px;

    cursor:pointer;
}

/* ================= WINDOWS ================= */

.window{
    position:fixed;

    width:min(500px,95vw);
    height:min(600px,88vh);

    background:var(--win-bg);

    border-radius:16px;

    overflow:hidden;

    display:none;
    flex-direction:column;

    box-shadow:0 25px 60px rgba(0,0,0,0.45);

    z-index:5000;

    left:0;
    top:0;

    will-change:transform;

    animation:openAnim .16s ease;
}

@keyframes openAnim{
    from{
        transform:scale(.95);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.titlebar{
    height:46px;

    background:#1f1f1f;

    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 12px;

    cursor:move;

    user-select:none;

    touch-action:none;
}

.windowBtns{
    display:flex;
    gap:8px;
}

.windowBtns button{
    width:28px;
    height:28px;

    border:none;

    border-radius:8px;

    color:white;

    cursor:pointer;
}

.minBtn{
    background:#555;
}

.closeBtn{
    background:#e53935;
}

.windowContent{
    flex:1;

    overflow:auto;

    padding:16px;
}

/* ================= CALL ================= */

#call{
    background:black;
}

video{
    background:black;
}

#remoteVideo{
    width:100%;
    height:100%;
    object-fit:cover;
}

#localVideo{
    position:absolute;

    width:120px;
    height:170px;

    right:15px;
    bottom:90px;

    border-radius:12px;

    border:2px solid white;

    object-fit:cover;
}

#callControls{
    position:absolute;

    left:50%;
    bottom:16px;

    transform:translateX(-50%);

    display:flex;
    gap:10px;

    z-index:100;
}

#callControls button{
    border:none;

    padding:12px 16px;

    border-radius:12px;

    background:rgba(20,20,20,0.9);

    color:white;

    cursor:pointer;
}

#hangupBtn{
    background:#d32f2f !important;
}

/* ================= NOTIFICATIONS ================= */

#systemNotifications{
    position:fixed;

    top:15px;
    right:15px;

    display:flex;
    flex-direction:column;

    gap:10px;

    z-index:9999999;
}

.notification{
    width:290px;

    background:rgba(20,20,20,0.96);

    color:white;

    padding:14px;

    border-radius:14px;

    box-shadow:0 15px 40px rgba(0,0,0,0.45);
}

/* ================= GALLERY ================= */

.galleryGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.galleryGrid img{
    width:100%;
    border-radius:12px;
}

/* ================= MOBILE ================= */

@media (max-width:700px){

    .window{
        width:100vw !important;
        height:calc(100vh - 55px) !important;

        left:0 !important;
        top:0 !important;

        border-radius:0;
    }

    #localVideo{
        width:90px;
        height:130px;
    }

    .notification{
        width:calc(100vw - 30px);
    }

}

</style>
</head>

<body>

<!-- ================= NOTIFICATIONS ================= -->

<div id="systemNotifications"></div>

<!-- ================= DESKTOP ================= -->

<div id="desktop">

    <div class="icon" onclick="openWindow('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <div>Friends</div>
    </div>

    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>

    <div class="icon" onclick="openWindow('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <div>Call</div>
    </div>

    <div class="icon" onclick="openWindow('browser')">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
        <div>Browser</div>
    </div>

    <div class="icon" onclick="openWindow('music')">
        <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
        <div>Music</div>
    </div>

    <div class="icon" onclick="openWindow('notes')">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281760.png">
        <div>Notes</div>
    </div>

    <div class="icon" onclick="openWindow('gallery')">
        <img src="https://cdn-icons-png.flaticon.com/512/1375/1375106.png">
        <div>Gallery</div>
    </div>

    <div class="icon" onclick="openWindow('terminal')">
        <img src="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">
        <div>Terminal</div>
    </div>

</div>

<!-- ================= FRIENDS ================= -->

<div id="friends" class="window">

    <div class="titlebar">

        <span>Friends</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('friends')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <h2>Online Friends</h2>

        <div id="friendsList"></div>

    </div>

</div>

<!-- ================= CHAT ================= -->

<div id="chat" class="window">

    <div class="titlebar">

        <span>Chat</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('chat')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <div id="chatMessages"></div>

        <br>

        <input id="msgInput"
        placeholder="Type message..."
        style="
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#ddd;
        ">

    </div>

</div>

<!-- ================= CALL ================= -->

<div id="call" class="window">

    <div class="titlebar">

        <span>Call</span>

        <div class="windowBtns">

            <button id="muteBtn"
            style="background:#444;">🔇</button>

            <button id="cameraBtn"
            style="background:#1976d2;">📷</button>

            <button class="closeBtn"
            onclick="endCall()">✕</button>

        </div>

    </div>

    <div style="position:relative;flex:1;">

        <video id="remoteVideo"
        autoplay
        playsinline></video>

        <video id="localVideo"
        autoplay
        muted
        playsinline></video>

        <div id="callControls">

            <button id="toggleMic">
                🎤 Mute
            </button>

            <button id="toggleCam">
                📷 Camera
            </button>

            <button id="hangupBtn">
                📞 End
            </button>

        </div>

    </div>

</div>

<!-- ================= BROWSER ================= -->

<div id="browser" class="window">

    <div class="titlebar">

        <span>Browser</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('browser')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <div style="display:flex;gap:10px;">

            <input id="browserUrl"
            placeholder="https://google.com"
            style="
                flex:1;
                padding:12px;
                border:none;
                border-radius:10px;
                background:#ddd;
            ">

            <button onclick="openWebsite()">
                Go
            </button>

        </div>

        <br>

        <iframe id="browserFrame"
        style="
            width:100%;
            height:90%;
            border:none;
            border-radius:12px;
            background:white;
        "></iframe>

    </div>

</div>

<!-- ================= MUSIC ================= -->

<div id="music" class="window">

    <div class="titlebar">

        <span>Music</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('music')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <audio id="musicPlayer"
        controls
        style="width:100%;"></audio>

        <br><br>

        <button onclick="playDemoSong()">
            ▶ Play Song
        </button>

    </div>

</div>

<!-- ================= NOTES ================= -->

<div id="notes" class="window">

    <div class="titlebar">

        <span>Notes</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('notes')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <textarea id="notesArea"
        style="
            width:100%;
            height:100%;
            border:none;
            resize:none;
            border-radius:12px;
            padding:14px;
            background:#ddd;
        "></textarea>

    </div>

</div>

<!-- ================= GALLERY ================= -->

<div id="gallery" class="window">

    <div class="titlebar">

        <span>Gallery</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('gallery')">✕</button>

        </div>

    </div>

    <div class="windowContent">

        <div class="galleryGrid">

            <img src="https://picsum.photos/300/200?1">
            <img src="https://picsum.photos/300/200?2">
            <img src="https://picsum.photos/300/200?3">
            <img src="https://picsum.photos/300/200?4">

        </div>

    </div>

</div>

<!-- ================= TERMINAL ================= -->

<div id="terminal" class="window">

    <div class="titlebar">

        <span>Terminal</span>

        <div class="windowBtns">

            <button class="minBtn"
            onclick="this.closest('.window').style.display='none'">—</button>

            <button class="closeBtn"
            onclick="closeWindow('terminal')">✕</button>

        </div>

    </div>

    <div class="windowContent"
    style="
        background:black;
        color:#00ff66;
        font-family:monospace;
    ">

        <div id="terminalOutput">
            ReplicaOS Terminal v1.0
        </div>

        <br>

        <input id="terminalInput"
        placeholder="Command..."
        style="
            width:100%;
            padding:10px;
            background:#111;
            border:none;
            color:#00ff66;
        ">

    </div>

</div>

<!-- ================= START MENU ================= -->

<div id="startMenu">

    <div class="startItem"
    onclick="openWindow('friends')">
        Friends
    </div>

    <div class="startItem"
    onclick="openWindow('chat')">
        Chat
    </div>

    <div class="startItem"
    onclick="openWindow('browser')">
        Browser
    </div>

    <div class="startItem"
    onclick="openWindow('terminal')">
        Terminal
    </div>

</div>

<!-- ================= TASKBAR ================= -->

<div id="taskbar">

    <div class="taskBtn"
    onclick="toggleStart()">
        🪟 Start
    </div>

    <div id="clock"></div>

</div>

<script>

/* ================= WINDOW SYSTEM ================= */

let highestZ = 5000;

window.openWindow = id => {

    const win =
    document.getElementById(id);

    win.style.display = "flex";

    highestZ++;

    win.style.zIndex = highestZ;

};

window.closeWindow = id => {

    document.getElementById(id)
    .style.display = "none";

};

window.toggleStart = () => {

    const menu =
    document.getElementById("startMenu");

    menu.style.display =
    menu.style.display === "flex"
    ? "none"
    : "flex";

};

/* ================= DRAGGING ================= */

document.querySelectorAll(".window")
.forEach(win => {

    const bar =
    win.querySelector(".titlebar");

    let dragging = false;

    let offsetX = 0;
    let offsetY = 0;

    bar.addEventListener(
    "pointerdown",
    e => {

        if(window.innerWidth <= 700)
        return;

        dragging = true;

        offsetX =
        e.clientX - win.offsetLeft;

        offsetY =
        e.clientY - win.offsetTop;

    });

    window.addEventListener(
    "pointermove",
    e => {

        if(!dragging) return;

        win.style.left =
        (e.clientX - offsetX) + "px";

        win.style.top =
        (e.clientY - offsetY) + "px";

    });

    window.addEventListener(
    "pointerup",
    () => dragging = false
    );

});

/* ================= CLOCK ================= */

function updateClock(){

    document.getElementById("clock")
    .innerText =
    new Date().toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
    });

}

updateClock();

setInterval(updateClock,1000);

/* ================= BROWSER ================= */

window.openWebsite = () => {

    let url =
    document.getElementById("browserUrl")
    .value;

    if(!url.startsWith("https://")){
        url = "https://" + url;
    }

    document.getElementById(
        "browserFrame"
    ).src = url;

};

/* ================= MUSIC ================= */

window.playDemoSong = () => {

    const player =
    document.getElementById(
        "musicPlayer"
    );

    player.src =
    "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

    player.play();

};

/* ================= NOTES ================= */

const notesArea =
document.getElementById("notesArea");

notesArea.value =
localStorage.replicaNotes || "";

notesArea.oninput = () => {

    localStorage.replicaNotes =
    notesArea.value;

};

/* ================= TERMINAL ================= */

const terminalInput =
document.getElementById("terminalInput");

const terminalOutput =
document.getElementById("terminalOutput");

terminalInput.addEventListener(
"keydown",
e => {

    if(e.key !== "Enter") return;

    const cmd =
    terminalInput.value.trim();

    terminalOutput.innerHTML += `
        <br><br>> ${cmd}
    `;

    if(cmd === "help"){

        terminalOutput.innerHTML += `
            <br>
            help, clear, date
        `;

    }

    else if(cmd === "clear"){

        terminalOutput.innerHTML =
        "ReplicaOS Terminal v1.0";

    }

    else if(cmd === "date"){

        terminalOutput.innerHTML += `
            <br>
            ${new Date()}
        `;

    }

    else{

        terminalOutput.innerHTML += `
            <br>
            Unknown command
        `;

    }

    terminalInput.value = "";

});

/* ================= CALL CONTROLS ================= */

let micMuted = false;
let camDisabled = false;

document.getElementById("toggleMic")
.onclick = () => {

    micMuted = !micMuted;

    document.getElementById(
        "toggleMic"
    ).innerText =
    micMuted
    ? "🔇 Unmute"
    : "🎤 Mute";

};

document.getElementById("toggleCam")
.onclick = () => {

    camDisabled = !camDisabled;

    document.getElementById(
        "toggleCam"
    ).innerText =
    camDisabled
    ? "📷 Enable"
    : "📷 Camera";

};

document.getElementById("muteBtn")
.onclick = () => {

    document.getElementById(
        "toggleMic"
    ).click();

};

document.getElementById("cameraBtn")
.onclick = () => {

    document.getElementById(
        "toggleCam"
    ).click();

};

window.endCall = () => {

    closeWindow("call");

};

/* ================= NOTIFICATIONS ================= */

function notifySystem(title,text){

    const holder =
    document.getElementById(
        "systemNotifications"
    );

    const n =
    document.createElement("div");

    n.className = "notification";

    n.innerHTML = `
        <b>${title}</b>
        <br><br>
        ${text}
    `;

    holder.appendChild(n);

    setTimeout(() => {

        if(n.parentNode){
            n.remove();
        }

    },5000);

}

/* ================= BOOT ================= */

window.addEventListener(
"load",
() => {

    notifySystem(
        "ReplicaOS",
        "System boot completed"
    );

});

</script>

</body>
</html>
