  localStream: null,
  incomingCallId: null,

  async init() {
    const {
      initializeApp, getFirestore, doc, setDoc, updateDoc,

      getAuth, signInAnonymously, onAuthStateChanged

    const _0x7a91 = [

  "34115825829",
  "1:34115825829:web:246973f8280df47f221d4c",

];

const firebaseConfig = (() => {
  const _0xf = (i) => _0x7a91[i];

  return {
    apiKey: _0xf(0),
    authDomain: _0xf(1),

    this.db = getFirestore(app);

    await signInAnonymously(this.auth);

    onAuthStateChanged(this.auth, (u) => {

  initPeer(uid) {

    this.peer.on("call", call => {

    });
  },

  async getMedia() {
    if (!this.localStream) {
      this.localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });

      document.getElementById("localVideo").srcObject = this.localStream;
    }
    return this.localStream;
  },

  async start() {
    const target = document.getElementById("callTarget").value;
    if (!target) return alert("Enter UID");

    const callId = crypto.randomUUID();

    await window.FB.setDoc(window.FB.doc(this.db, "calls", callId), {
      from: this.user.uid,
      to: target,
      status: "ringing"
    });

    const stream = await this.getMedia();

    const call = this.peer.call(target, stream);
    this.currentCall = call;

    call.on("stream", remote => {
      document.getElementById("remoteVideo").srcObject = remote;
    });

    openWindow("call");
    this.setStatus("Calling " + target);
  },

  listen() {
    const q = window.FB.query(
      window.FB.collection(this.db, "calls"),
      window.FB.where("to", "==", this.user.uid),
      window.FB.where("status", "==", "ringing")
    );

    window.FB.onSnapshot(q, snap => {
      snap.forEach(docSnap => {
        this.incomingCallId = docSnap.id;

        openWindow("call");
        this.setStatus("Incoming call...");
      });
    });
  },

  async accept() {
    if (!this.currentCall) return;

    await window.FB.updateDoc(
      window.FB.doc(this.db, "calls", this.incomingCallId),
      { status: "accepted" }
    );

    const stream = await this.getMedia();

    this.currentCall.answer(stream);

    this.currentCall.on("stream", remote => {
      document.getElementById("remoteVideo").srcObject = remote;
    });

    this.setStatus("Connected");
  },

  async reject() {
    if (!this.incomingCallId) return;

    await window.FB.updateDoc(
      window.FB.doc(this.db, "calls", this.incomingCallId),
      { status: "rejected" }
    );

    this.end();
  },

  end() {
    if (this.currentCall) this.currentCall.close();

    document.getElementById("remoteVideo").srcObject = null;

    this.currentCall = null;
    this.setStatus("Ended");
    closeWindow("call");
  },

  setStatus(msg) {
    document.getElementById("callStatus").innerText = msg;
  }
};

/* ================= WINDOW SYSTEM ================= */
/**
 * Internal helper to manage visibility, ARIA states, and native dialog behavior.
 * Supports both ID strings and direct HTMLElement references for flexibility.
 */
function setWindowState(target, isOpen) {
  const el = typeof target === 'string' ? document.getElementById(target) : target;

  if (!el) return;

  // Handle native <dialog> elements correctly for focus/backdrop support
  if (el.tagName === 'DIALOG') {
    if (isOpen) {
      if (!el.open) el.showModal();
    } else {
      if (el.open) el.close();
    }
  } else {
    // Handle standard elements with class toggling and ARIA attributes
    el.classList.toggle('hidden', !isOpen);
    el.setAttribute('aria-hidden', String(!isOpen));
  }
}

/**
 * Opens a window by ID or element reference.
 * @param {string|HTMLElement} id 
 */
function openWindow(id) {
  setWindowState(id, true);
}

/**
 * Closes a window by ID or element reference.
 * @param {string|HTMLElement} id 
 */
function closeWindow(id) {
  setWindowState(id, false);
}

/* ================= DRAG SYSTEM ================= */
document.querySelectorAll('.appwindow').forEach((win) => {
  const bar = win.querySelector('.window-titlebar');

  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  bar.addEventListener('mousedown', start);
  bar.addEventListener('touchstart', start, { passive: false });

  function start(e) {
    e.preventDefault();
    dragging = true;

    const rect = win.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', stop);
  }

  function move(e) {
    if (!dragging) return;
    e.preventDefault();

    const pos = getPos(e);
    win.style.left = `${pos.x - offsetX}px`;
    win.style.top = `${pos.y - offsetY}px`;
  }

  function stop() {
    dragging = false;

    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', stop);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', stop);
  }

  function getPos(e) {
    return e.touches
      ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
      : { x: e.clientX, y: e.clientY };
  }
});

/* ================= THREE BACKGROUND ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geo = new THREE.BufferGeometry();
const arr = [];

for (let i=0;i<3000;i++) {
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
}

geo.setAttribute('position', new THREE.Float32BufferAttribute(arr,3));

const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.02 });
scene.add(new THREE.Points(geo, mat));

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

<script>
function renderSystemLogs() {
  const target = document.getElementById('system-log-list');
  if (!window.System || !target) return;

  target.innerHTML = System.getLogs()
    .map((entry) => `<div>[${entry.time}] ${entry.type} :: ${entry.app} ${entry.data ? JSON.stringify(entry.data) : ''}</div>`)
    .join('');
}

function handleDockEvent(event) {
  if (!event || !window.System) return;

  if (event.type === 'open-app') {
    openWindow(event.app);
    System.open(event.app);
    renderSystemLogs();
    return;
  }

  if (event.type === 'send-data') {
    System.send(event.app, event.data);
    renderSystemLogs();
  }
}

fetch('./system32/DockManagment/dock.html')
  .then((res) => res.text())
  .then((html) => {
    document.getElementById('dock-container').innerHTML = html;
    Dock.connectMain(handleDockEvent);
    Dock.init();
    renderSystemLogs();
  });
</script>
