<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ReplicaOS - System Edition</title>

<style>
:root {
    --taskbar-bg: rgba(20,20,20,0.85);
    --win-bg: #f3f3f3;
    --accent: #0078d4;
}

/* GLOBAL */
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body,html {
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:system-ui;
    background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover;
}

/* DESKTOP */
#desktop{
    height:calc(100vh - 48px);
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,90px);
    gap:15px;
}

.icon{color:white;text-align:center;cursor:pointer;}
.icon img{width:45px;}

/* WINDOW */
.window{
    position:absolute;
    width:420px;
    height:500px;
    background:var(--win-bg);
    border-radius:10px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
    display:none;
    flex-direction:column;
    left:0;
    top:0;
}

/* TASKBAR */
#taskbar{
    position:fixed;
    bottom:0;
    width:100%;
    height:48px;
    background:var(--taskbar-bg);
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    padding:0 15px;
}

/* START MENU */
#startMenu{
    position:fixed;
    bottom:55px;
    left:10px;
    width:220px;
    background:rgba(30,30,30,0.95);
    border-radius:10px;
    display:none;
    flex-direction:column;
    padding:10px;
    color:white;
}

/* ================= SYSTEM NOTIFICATIONS (GLOBAL LAYER) ================= */
#systemNotifications{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999999;
}

.notification{
    width:260px;
    background:rgba(25,25,25,0.95);
    color:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideIn 0.25s ease;
}

@keyframes slideIn{
    from{transform:translateX(120%);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

.notif-actions{
    display:flex;
    gap:8px;
    margin-top:10px;
}

.notif-actions button{
    flex:1;
    border:none;
    padding:6px;
    border-radius:6px;
    cursor:pointer;
}
#call {
    background: #000;
    overflow: hidden;
    position: relative;
}

#remoteVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#localVideo {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 120px;
    border: 2px solid white;
    border-radius: 8px;
}
/* CALL COLORS */
.accept{background:#4CAF50;color:white;}
.decline{background:#e53935;color:white;}
</style>
</head>

<body>

<!-- SYSTEM NOTIFICATION LAYER (OUTSIDE OS) -->
<div id="systemNotifications"></div>

<!-- DESKTOP -->
<div id="desktop">

    <div class="icon" onclick="openWindow('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <div>Friends</div>
    </div>

    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>

    <div class="icon" onclick="openWindow('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <div>Call</div>
    </div>

</div>

<!-- WINDOWS -->
<div id="friends" class="window">
    <h1>Friends Window</h1>
</div>
<div id="chat" class="window">
    <h1>Chat Window</h1>
</div>

<div id="call" class="window">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
</div>

<!-- START MENU -->
<div id="startMenu"></div>

<!-- TASKBAR -->
<div id="taskbar">
    <div onclick="toggleStart()">🪟 Start</div>
    <div id="clock"></div>
</div>

<script type="module">
//* ================= FIREBASE CONFIG ================= */
// Make sure these are filled!
const firebaseConfig = {
  apiKey: "AIzaSyCnJPv3cclaIArwUPKEq5of0NyafJ7d4QI",
  authDomain: "replicanewos3030.firebaseapp.com",
  projectId: "replicanewos3030",
  storageBucket: "replicanewos3030.firebasestorage.app",
  messagingSenderId: "60780972584",
  appId: "1:60780972584:web:db097a4cda968fec80831d",
  measurementId: "G-HBTY5EYH29"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER SETUP ================= */
const myId = Math.random().toString(36).substring(2, 10);
const presenceRef = ref(db, "presence/" + myId);
set(presenceRef, true);
onDisconnect(presenceRef).remove();

/* ================= WEBRTC CORE ================= */
const pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

let localStream;

// 1. Handle incoming ICE candidates
pc.onicecandidate = (e) => {
    if (e.candidate) {
        // You would typically push these to a 'candidates' collection in Firebase
        // For a simple demo, we'll focus on the Offer/Answer flow
    }
};

pc.ontrack = (e) => {
    const remoteVid = document.getElementById("remoteVideo");
    if (remoteVid) remoteVid.srcObject = e.streams[0];
};

async function startMedia() {
    if (!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }
}

/* ================= CALLING LOGIC ================= */

// FUNCTION: Initiate a call
window.makeCall = async (targetId) => {
    await startMedia();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const callRef = push(ref(db, "calls"));
    const callId = callRef.key;

    await set(callRef, {
        from: myId,
        to: targetId,
        offer: { type: offer.type, sdp: offer.sdp },
        status: "pending"
    });

    // Listen for the answer
    onValue(ref(db, `calls/${callId}/answer`), async (snap) => {
        const answer = snap.val();
        if (answer && !pc.currentRemoteDescription) {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    });
};

// LISTEN: Incoming Calls
onValue(ref(db, "calls"), async (snap) => {
    const data = snap.val();
    if (!data) return;

    Object.keys(data).forEach(async (id) => {
        const c = data[id];
        if (c.to === myId && c.offer && !pc.currentRemoteDescription) {
            notifySystem("Incoming Call", `User ${c.from} is calling`, [
                {
                    label: "Accept",
                    type: "accept",
                    action: async (notif) => {
                        await startMedia();
                        await pc.setRemoteDescription(new RTCSessionDescription(c.offer));
                        const ans = await pc.createAnswer();
                        await pc.setLocalDescription(ans);
                        
                        update(ref(db, `calls/${id}`), { 
                            answer: { type: ans.type, sdp: ans.sdp },
                            status: "active" 
                        });
                        
                        openWindow("call");
                        notif.remove();
                    }
                },
                {
                    label: "Decline",
                    type: "decline",
                    action: (notif) => notif.remove()
                }
            ]);
        }
    });
});

/* ================= WINDOW MANAGEMENT ================= */
let highestZ = 1000;
window.openWindow = (id) => {
    const el = document.getElementById(id);
    el.style.display = "flex";
    el.style.zIndex = ++highestZ;
    // Center the window
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.transform = "translate(-50%, -50%)";
};

window.toggleStart = () => {
    const s = document.getElementById("startMenu");
    s.style.display = s.style.display === "flex" ? "none" : "flex";
};

setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}, 1000);
</script>

</body>
</html>
