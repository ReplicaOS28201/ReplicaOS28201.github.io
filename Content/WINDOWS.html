<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">

  <h2 class="title">19OS</h2>

  <!-- WINDOWS -->
  <div id="myApp" class="appwindow hidden">
    <div class="resize-handle resize-br"></div> <!-- bottom right -->
<div class="resize-handle resize-r"></div>  <!-- right -->
<div class="resize-handle resize-b"></div>  <!-- bottom -->
  <div class="window-titlebar">
    <span>My App</span>
    <div class="window-controls">
      <button onclick="closeWindow('myApp')">×</button>
    </div>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content" style="width: 100%; height:100%;"></iframe>
</div>
  <div id="poki" class="appwindow hidden">
    <div class="resize-handle resize-br"></div> <!-- bottom right -->
<div class="resize-handle resize-r"></div>  <!-- right -->
<div class="resize-handle resize-b"></div>  <!-- bottom -->
  <div class="window-titlebar">
    <span>My App</span>
    <div class="window-controls">
      <button onclick="closeWindow('poki')">×</button>
    </div>
  </div>
  <iframe src="https://poki.com/" class="window-content" style="width: 100%; height:100%;"></iframe>
</div>
  <div id="crashViewer" class="appwindow hidden">
    <div class="resize-handle resize-br"></div> <!-- bottom right -->
<div class="resize-handle resize-r"></div>  <!-- right -->
<div class="resize-handle resize-b"></div>  <!-- bottom -->
  <div class="window-titlebar">
    <span>Crash Viewer</span>
    <button onclick="closeWindow('crashViewer')">✖</button>
  </div>

  <div id="crashList"></div>

  <button onclick="clearCrashes()">Clear Logs</button>
</div>
  <!-- DOCK -->
  <div class="dock glass">
    <button class="dock-icon" onclick="openWindow('myApp')">Calculator</button>
    <button class="dock-icon" onclick="openWindow('poki')">Poki</button>
    <button class="dock-icon" onclick="openWindow('crashViewer')">Crashviewer</button>
  </div>

</div>

<script src="js/moduleapps.js"></script>
  <script src="js/crashlogger.js"></script>
  <script>
    function openCrashViewer() {
  openWindow("crashViewer");
  renderCrashLogs();
}

function renderCrashLogs() {
  const list = document.getElementById("crashList");
  list.innerHTML = "";

  CrashLogger.logs.forEach(log => {
    const item = document.createElement("div");
    item.className = "crash-item";

    item.innerHTML = `
      <b>${log.source}</b> - ${log.time}<br>
      ${log.message}
      <details>
        <summary>Stack</summary>
        <pre>${log.stack}</pre>
      </details>
    `;

    list.appendChild(item);
  });
}

function clearCrashes() {
  CrashLogger.clear();
  renderCrashLogs();
}
  </script>
</body>
</html>
