<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>19OS Windows</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>

  <!-- POKI WINDOW -->
  <div id="poki" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>My App</span>
      <div class="window-controls">
        <button onclick="closeWindow('poki')">×</button>
      </div>
    </div>

    <iframe src="https://poki.com/" class="window-content" style="width:100%; height:100%;"></iframe>
  </div>

  <!-- CRASH VIEWER -->
  <div id="crashViewer" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>Crash Viewer</span>
      <button onclick="closeWindow('crashViewer')">✖</button>
    </div>

    <div id="crashList"></div>
    <button onclick="clearCrashes()">Clear Logs</button>
  </div>

  <!-- FILE EXPLORER -->
  <div id="fileExplorer" class="appwindow hidden">
    <div class="resize-handle resize-br"></div>
    <div class="resize-handle resize-r"></div>
    <div class="resize-handle resize-b"></div>

    <div class="window-titlebar">
      <span>File Explorer</span>
      <div class="window-controls">
        <button onclick="closeWindow('fileExplorer')">×</button>
      </div>
    </div>

    <div class="window-content">
      <div id="fileDropZone" style="border:1px dashed rgba(255,255,255,0.3); border-radius:10px; padding:12px; margin-bottom:12px;">
        Drag files here or
        <label for="filePicker" style="text-decoration:underline; cursor:pointer;">browse</label>
        <input id="filePicker" type="file" multiple style="display:none;">
      </div>

      <ul id="fileList" style="list-style:none; margin:0; padding:0; display:grid; gap:8px;"></ul>
    </div>
  </div>

  <!-- DOCK -->
  <div class="dock glass">
    <button class="dock-icon" onclick="openWindow('myApp')">Calculator</button>
    <button class="dock-icon" onclick="openWindow('secret')">Secret Lang</button>
    <button class="dock-icon" onclick="openWindow('poki')">Poki</button>
    <button class="dock-icon" onclick="openWindow('fileExplorer')">Files</button>
    <button class="dock-icon" onclick="openWindow('crashViewer')">Crashviewer</button>
  </div>

<script>
// ===============================
// 19OS WINDOW SYSTEM
// ===============================

function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return console.warn("Window not found:", id);

  el.classList.remove("hidden");
  el.style.display = "block";
  el.style.pointerEvents = "auto";

  bringToFront(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.classList.add("hidden");
  el.style.display = "none";
}

// ---------- Drag System ----------
function makeDraggable(windowEl) {
  const header = windowEl.querySelector(".window-titlebar");

  let isDragging = false;
  let offsetX = 0, offsetY = 0;
  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;
  let rafId = null;

  function getPos(e) {
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX, y: p.clientY };
}

  function startDrag(e) {
    e.preventDefault();
    isDragging = true;

    bringToFront(windowEl);

    const rect = windowEl.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag, { passive:false });
    document.addEventListener("touchend", stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();

    const pos = getPos(e);

    const maxX = window.innerWidth - windowEl.offsetWidth;
    const maxY = window.innerHeight - windowEl.offsetHeight;

    targetX = Math.min(Math.max(0, pos.x - offsetX), Math.max(0, maxX));
    targetY = Math.min(Math.max(0, pos.y - offsetY), Math.max(0, maxY));

    if (!rafId) rafId = requestAnimationFrame(update);
  }

  function update() {
    currentX = targetX;
    currentY = targetY;
    windowEl.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
    rafId = null;
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("touchend", stopDrag);
  }

  header.addEventListener("mousedown", startDrag);
  header.addEventListener("touchstart", startDrag, { passive:false });
}

// ---------- File Explorer ----------
function addFilesToExplorer(fileList) {
  const list = document.getElementById("fileList");
  if (!list) return;

  [...fileList].forEach(file => {
    const item = document.createElement("li");
    item.style.padding = "10px";
    item.style.borderRadius = "8px";
    item.style.background = "rgba(255,255,255,0.06)";
    item.style.fontSize = "13px";

    item.textContent = `${file.name} (${Math.max(1, Math.round(file.size / 1024))} KB)`;
    list.appendChild(item);
  });
}

function initFileExplorer() {
  const dropZone = document.getElementById("fileDropZone");
  const picker = document.getElementById("filePicker");
  if (!dropZone || !picker) return;

  picker.addEventListener("change", e => {
    addFilesToExplorer(e.target.files || []);
    picker.value = "";
  });

  ["dragenter","dragover"].forEach(type => {
    dropZone.addEventListener(type, e => {
      e.preventDefault();
      dropZone.style.background = "rgba(255,255,255,0.15)";
    });
  });

  ["dragleave","drop"].forEach(type => {
    dropZone.addEventListener(type, e => {
      e.preventDefault();
      dropZone.style.background = "transparent";
    });
  });

  dropZone.addEventListener("drop", e => {
    addFilesToExplorer(e.dataTransfer.files || []);
  });
}

initFileExplorer();
  document.querySelectorAll(".appwindow").forEach(makeDraggable);
</script>

</body>
</html>
