<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    /* ===========================
       Liquid Glass Style
       =========================== */
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 30px rgba(0,0,0,0.1);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      background: linear-gradient(120deg, #4a90e2, #50e3c2);
    }

    #desktop {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .title {
      text-align: center;
      color: white;
      margin: 12px 0;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    

    

    /* subtle floating animation for glass effect */
    .glass-float {
      animation: floatGlass 6s ease-in-out infinite;
    }

    @keyframes floatGlass {
      0%,100% { transform: translateY(0) }
      50% { transform: translateY(-6px) }
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div id="desktop">
    <h2 class="title">19OS</h2>

    <!-- WINDOWS -->
    <div id="myApp" class="appwindow glass glass-float hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Calculator</span>
        <div class="window-controls">
          <button onclick="closeWindow('myApp')">×</button>
        </div>
      </div>
      <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
    </div>

    <div id="secret" class="appwindow glass glass-float hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Secret Lang</span>
        <div class="window-controls">
          <button onclick="closeWindow('secret')">×</button>
        </div>
      </div>
      <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
    </div>

    <div id="poki" class="appwindow glass glass-float hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Poki</span>
        <div class="window-controls">
          <button onclick="closeWindow('poki')">×</button>
        </div>
      </div>
      <iframe src="https://poki.com/" class="window-content"></iframe>
    </div>

    <div id="crashViewer" class="appwindow glass glass-float hidden">
      <div class="resize-handle resize-br"></div>
      <div class="resize-handle resize-r"></div>
      <div class="resize-handle resize-b"></div>
      <div class="window-titlebar">
        <span>Crash Viewer</span>
        <button onclick="closeWindow('crashViewer')">✖</button>
      </div>
      <div id="crashList"></div>
      <button onclick="clearCrashes()">Clear Logs</button>
    </div>

    <!-- DOCK -->
    <div class="dock glass glass-float">
      <button class="dock-icon" onclick="openWindow('myApp')">Calc</button>
      <button class="dock-icon" onclick="openWindow('secret')">Secret</button>
      <button class="dock-icon" onclick="openWindow('poki')">Poki</button>
      <button class="dock-icon" onclick="openWindow('crashViewer')">Crashes</button>
    </div>
  </div>

  <!-- ==============================
       19OS WINDOW SYSTEM
       ============================== -->
  <script>
    // ---------- Open / Close ----------
    let zIndexCounter = 100;
    function bringToFront(win){ zIndexCounter++; win.style.zIndex = zIndexCounter; }

    function openWindow(id) {
      const el = document.getElementById(id);
      if (!el) return console.warn("Window not found:", id);
      el.classList.remove("hidden");
      el.style.display = "flex";
      el.style.transform = "translate3d(0,0,0)";
      bringToFront(el);

      if (id === "crashViewer") renderCrashLogs();
    }

    function closeWindow(id) {
      const el = document.getElementById(id);
      if (!el) return console.warn("Window not found:", id);
      el.classList.add("hidden");
      el.style.display = "none";
    }

    // ---------- Drag ----------
function makeDraggable(win) {
  const header = win.querySelector(".window-titlebar");
  if (!header) return;

  // Make sure window has position absolute and initial transform
  win.style.position = "absolute";
  if (!win.style.transform) win.style.transform = "translate3d(0,0,0)";

  let isDragging = false;
  let offsetX = 0, offsetY = 0;
  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
  let rafId = null;

  function getPos(e) {
    return e.touches
      ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
      : { x: e.clientX, y: e.clientY };
  }

  function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    bringToFront(win);

    const rect = win.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", drag, { passive: false });
    document.addEventListener("touchend", stopDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();

    const pos = getPos(e);
    targetX = pos.x - offsetX;
    targetY = pos.y - offsetY;

    if (!rafId) rafId = requestAnimationFrame(updatePosition);
  }

  function updatePosition() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const rect = win.getBoundingClientRect();

    currentX = Math.max(0, Math.min(targetX, vw - rect.width));
    currentY = Math.max(0, Math.min(targetY, vh - rect.height));

    win.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
    rafId = null;
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("mousemove", drag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", drag);
    document.removeEventListener("touchend", stopDrag);
  }

  header.addEventListener("mousedown", startDrag);
  header.addEventListener("touchstart", startDrag, { passive: false });
}
    // ---------- Resize ----------
    function makeResizable(win){
      const handles = win.querySelectorAll(".resize-handle");
      handles.forEach(handle=>{
        let isResizing=false, startX, startY, startW, startH, targetW, targetH, rafId=null;

        function getPos(e){ return e.touches? {x:e.touches[0].clientX, y:e.touches[0].clientY} : {x:e.clientX, y:e.clientY}; }

        function startResize(e){
          e.preventDefault();
          isResizing=true;
          bringToFront(win);
          const rect=win.getBoundingClientRect();
          const pos=getPos(e);
          startX=pos.x; startY=pos.y;
          startW=rect.width; startH=rect.height;

          document.addEventListener("mousemove", resize);
          document.addEventListener("mouseup", stopResize);
          document.addEventListener("touchmove", resize, {passive:false});
          document.addEventListener("touchend", stopResize);
        }

        function resize(e){
          if(!isResizing) return;
          e.preventDefault();
          const pos=getPos(e);
          const dx=pos.x-startX, dy=pos.y-startY;

          if(handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) targetW = startW+dx;
          if(handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) targetH = startH+dy;

          if(!rafId) rafId = requestAnimationFrame(applyResize);
        }

        function applyResize(){
          if(targetW!==undefined) win.style.width = Math.max(0,targetW)+"px";
          if(targetH!==undefined) win.style.height = Math.max(0,targetH)+"px";
          rafId=null;
        }

        function stopResize(){
          isResizing=false;
          document.removeEventListener("mousemove", resize);
          document.removeEventListener("mouseup", stopResize);
          document.removeEventListener("touchmove", resize);
          document.removeEventListener("touchend", stopResize);
        }

        handle.addEventListener("mousedown", startResize);
        handle.addEventListener("touchstart", startResize, {passive:false});
      });
    }

    document.addEventListener("DOMContentLoaded", ()=>{
      document.querySelectorAll(".appwindow").forEach(win=>{
        makeDraggable(win);
        makeResizable(win);
      });
    });

    // ---------------- Crash Logger ----------------
    const CrashLogger = {
      logs: [],
      add(log){ this.logs.push({...log,time:new Date().toLocaleTimeString()}); },
      clear(){ this.logs=[]; }
    };

    function renderCrashLogs(){
      const list = document.getElementById("crashList");
      list.innerHTML="";
      CrashLogger.logs.forEach(log=>{
        const item=document.createElement("div");
        item.className="crash-item";
        item.innerHTML=`<b>${log.source}</b> - ${log.time}<br>${log.message}
        <details><summary>Stack</summary><pre>${log.stack}</pre></details>`;
        list.appendChild(item);
      });
    }

    function clearCrashes(){ CrashLogger.clear(); renderCrashLogs(); }
  </script>
</body>
</html>
