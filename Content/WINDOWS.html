<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ReplicaOS - System Edition</title>

<style>

:root{
    --taskbar-bg:rgba(20,20,20,0.85);
    --win-bg:#f3f3f3;
    --accent:#0078d4;
}

/* ================= GLOBAL ================= */

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:system-ui;
    background:black;
}

body{
    background:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80')
    center/cover no-repeat fixed;
}

/* ================= DESKTOP ================= */

#desktop{
    position:fixed;
    inset:0;
    padding:20px;
    padding-bottom:70px;

    display:grid;
    grid-template-columns:repeat(auto-fill,90px);
    gap:18px;

    align-content:start;

    z-index:1;
}

.icon{
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
    text-align:center;
    cursor:pointer;
    user-select:none;
}

.icon img{
    width:52px;
    height:52px;
    object-fit:contain;
    margin-bottom:6px;
}

/* ================= TASKBAR ================= */

#taskbar{
    position:fixed;
    left:0;
    right:0;
    bottom:0;

    height:52px;

    background:var(--taskbar-bg);

    backdrop-filter:blur(12px);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 14px;

    color:white;

    z-index:99999;
}

.taskBtn{
    cursor:pointer;
    user-select:none;
}

/* ================= START MENU ================= */

#startMenu{
    position:fixed;

    left:10px;
    bottom:62px;

    width:260px;

    background:rgba(25,25,25,0.96);

    backdrop-filter:blur(15px);

    border-radius:14px;

    padding:12px;

    display:none;
    flex-direction:column;

    gap:10px;

    z-index:999999;
}

.startItem{
    background:rgba(255,255,255,0.08);

    padding:12px;
    border-radius:10px;

    color:white;

    cursor:pointer;
}

/* ================= WINDOW SYSTEM ================= */

.window{
    position:fixed;

    width:min(450px,95vw);
    height:min(550px,85vh);

    background:var(--win-bg);

    border-radius:16px;

    overflow:hidden;

    box-shadow:0 25px 60px rgba(0,0,0,0.45);

    display:none;
    flex-direction:column;

    z-index:5000;


    transform:translate(-50%,-50%);

    touch-action:none;
}

/* ================= TITLEBAR ================= */

.titlebar{
    height:44px;

    background:#1f1f1f;

    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 12px;

    cursor:move;

    user-select:none;

    flex-shrink:0;
}

.windowBtns{
    display:flex;
    gap:8px;
}

.windowBtns button{
    border:none;

    width:28px;
    height:28px;

    border-radius:8px;

    color:white;

    cursor:pointer;
}

.closeBtn{
    background:#e53935;
}

.minBtn{
    background:#555;
}

/* ================= CONTENT ================= */

.windowContent{
    flex:1;
    overflow:auto;
    padding:16px;
}

/* ================= CALL WINDOW ================= */

#call{
    background:black;
}

#remoteVideo{
    width:100%;
    height:100%;
    object-fit:cover;
}

#localVideo{
    position:absolute;

    width:120px;
    height:170px;

    bottom:15px;
    right:15px;

    border-radius:12px;

    border:2px solid white;

    object-fit:cover;

    background:black;
}

/* ================= NOTIFICATIONS ================= */

#systemNotifications{
    position:fixed;

    top:15px;
    right:15px;

    display:flex;
    flex-direction:column;

    gap:10px;

    z-index:9999999;
}

.notification{
    width:280px;

    background:rgba(20,20,20,0.95);

    color:white;

    border-radius:14px;

    padding:14px;

    box-shadow:0 15px 40px rgba(0,0,0,0.45);

    animation:slideIn .25s ease;
}

.notification h3{
    margin:0 0 5px 0;
}

.notification p{
    margin:0;
    opacity:.85;
}

.notif-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
}

.notif-actions button{
    flex:1;
    border:none;
    padding:9px;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.accept{
    background:#4CAF50;
}

.decline{
    background:#e53935;
}

@keyframes slideIn{
    from{
        transform:translateX(120%);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

/* ================= MOBILE ================= */

@media (max-width:700px){

    #desktop{
        grid-template-columns:repeat(auto-fill,80px);
        gap:12px;
        padding:12px;
        padding-bottom:70px;
    }

    .window{
        width:100vw !important;
        height:calc(100vh - 52px) !important;

        left:0 !important;
        top:0 !important;

        transform:none !important;

        border-radius:0;
    }

    #localVideo{
        width:90px;
        height:130px;
    }

    .notification{
        width:calc(100vw - 30px);
    }

}

</style>
</head>

<body>

<!-- SYSTEM NOTIFICATIONS -->
<div id="systemNotifications"></div>

<!-- DESKTOP -->
<div id="desktop">

    <div class="icon" onclick="openWindow('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <div>Friends</div>
    </div>

    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>

    <div class="icon" onclick="openWindow('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <div>Call</div>
    </div>

</div>

<!-- FRIENDS -->
<div id="friends" class="window">

    <div class="titlebar">
        <span>Friends</span>

        <div class="windowBtns">
            <button class="minBtn">—</button>
            <button class="closeBtn"
            onclick="closeWindow('friends')">✕</button>
        </div>
    </div>

    <div class="windowContent">

        <h2>Online Friends</h2>

        <div id="friendsList"></div>

    </div>

</div>

<!-- CHAT -->
<div id="chat" class="window">

    <div class="titlebar">
        <span>Chat</span>

        <div class="windowBtns">
            <button class="minBtn">—</button>
            <button class="closeBtn"
            onclick="closeWindow('chat')">✕</button>
        </div>
    </div>

    <div class="windowContent">

        <h2>ReplicaOS Chat</h2>

        <input id="msgInput"
        placeholder="Type message..."
        style="width:100%;padding:12px;border-radius:10px;border:none;background:#ddd;">

    </div>

</div>

<!-- CALL -->
<div id="call" class="window">

    <div class="titlebar">
        <span>Call</span>

        <div class="windowBtns">
            <button class="closeBtn"
            onclick="closeWindow('call')">✕</button>
        </div>
    </div>

    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>

</div>

<!-- START MENU -->
<div id="startMenu">

    <div class="startItem"
    onclick="openWindow('friends')">
        Friends
    </div>

    <div class="startItem"
    onclick="openWindow('chat')">
        Chat
    </div>

    <div class="startItem"
    onclick="openWindow('call')">
        Call
    </div>

</div>

<!-- TASKBAR -->
<div id="taskbar">

    <div class="taskBtn"
    onclick="toggleStart()">
        🪟 Start
    </div>

    <div id="clock"></div>

</div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    onValue,
    push,
    update,
    onDisconnect
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCnJPv3cclaIArwUPKEq5of0NyafJ7d4QI",

  authDomain: "replicanewos3030.firebaseapp.com",

  projectId: "replicanewos3030",

  storageBucket: "replicanewos3030.firebasestorage.app",

  messagingSenderId: "60780972584",

  appId: "1:60780972584:web:db097a4cda968fec80831d"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= USER ================= */

const myId = Math.random()
.toString(36)
.substring(2,10);

console.log("MY ID:", myId);

const presenceRef = ref(db, "presence/" + myId);

set(presenceRef, true);

onDisconnect(presenceRef).remove();

/* ================= FRIENDS ================= */

onValue(ref(db,"presence"), snap => {

    const data = snap.val() || {};

    const list = document.getElementById("friendsList");

    list.innerHTML = "";

    Object.keys(data).forEach(id => {

        if(id === myId) return;

        const div = document.createElement("div");

        div.style.background = "#ddd";
        div.style.padding = "12px";
        div.style.borderRadius = "10px";
        div.style.marginBottom = "10px";

        div.innerHTML = `
            <b>${id}</b><br><br>

            <button onclick="makeCall('${id}')">
                Call
            </button>
        `;

        list.appendChild(div);

    });

});

/* ================= WEBRTC ================= */

const pc = new RTCPeerConnection({

    iceServers:[
        {
            urls:"stun:stun.l.google.com:19302"
        }
    ]

});

let localStream;

pc.ontrack = e => {

    document.getElementById("remoteVideo")
    .srcObject = e.streams[0];

};

async function startMedia(){

    if(localStream) return;

    localStream =
    await navigator.mediaDevices.getUserMedia({
        video:true,
        audio:true
    });

    document.getElementById("localVideo")
    .srcObject = localStream;

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

}

/* ================= CALLING ================= */

window.makeCall = async (targetId) => {

    await startMedia();

    const offer = await pc.createOffer();

    await pc.setLocalDescription(offer);

    const callRef = push(ref(db,"calls"));

    const callId = callRef.key;

    await set(callRef,{

        from:myId,
        to:targetId,

        offer:{
            type:offer.type,
            sdp:offer.sdp
        },

        status:"pending"

    });

    onValue(ref(db,`calls/${callId}/answer`),
    async snap => {

        const answer = snap.val();

        if(answer && !pc.currentRemoteDescription){

            await pc.setRemoteDescription(
                new RTCSessionDescription(answer)
            );

            openWindow("call");

        }

    });

};

/* ================= INCOMING CALLS ================= */

onValue(ref(db,"calls"), async snap => {

    const data = snap.val();

    if(!data) return;

    Object.keys(data).forEach(async id => {

        const c = data[id];

        if(
            c.to === myId &&
            c.offer &&
            !pc.currentRemoteDescription
        ){

            notifySystem(
                "Incoming Call",
                `${c.from} is calling`,
                [

                    {
                        label:"Accept",
                        type:"accept",

                        action:async notif => {

                            await startMedia();

                            await pc.setRemoteDescription(
                                new RTCSessionDescription(c.offer)
                            );

                            const ans =
                            await pc.createAnswer();

                            await pc.setLocalDescription(ans);

                            update(
                                ref(db,`calls/${id}`),
                                {
                                    answer:{
                                        type:ans.type,
                                        sdp:ans.sdp
                                    },
                                    status:"active"
                                }
                            );

                            openWindow("call");

                            notif.remove();

                        }

                    },

                    {
                        label:"Decline",
                        type:"decline",
                        action:notif => notif.remove()
                    }

                ]
            );

        }

    });

});

/* ================= WINDOW SYSTEM ================= */

let highestZ = 5000;

window.openWindow = id => {

    const win = document.getElementById(id);

    win.style.display = "flex";

    highestZ++;

    win.style.zIndex = highestZ;

    if(window.innerWidth > 700){

        win.style.left = "50%";
        win.style.top = "50%";

        win.style.transform =
        "translate(-50%,-50%)";

    }

};

window.closeWindow = id => {

    document.getElementById(id)
    .style.display = "none";

};

window.toggleStart = () => {

    const menu =
    document.getElementById("startMenu");

    menu.style.display =
    menu.style.display === "flex"
    ? "none"
    : "flex";

};

/* ================= DRAGGING ================= */

document.querySelectorAll(".window")
.forEach(win => {

    const bar = win.querySelector(".titlebar");

    let dragging = false;

    let offsetX = 0;
    let offsetY = 0;

    const start = (x,y) => {

        if(window.innerWidth <= 700) return;

        dragging = true;

        highestZ++;

        win.style.zIndex = highestZ;

        win.style.transform = "none";

        offsetX = x - win.offsetLeft;
        offsetY = y - win.offsetTop;

    };

    const move = (x,y) => {

        if(!dragging) return;

        win.style.left =
        (x - offsetX) + "px";

        win.style.top =
        (y - offsetY) + "px";

    };

    const stop = () => {
        dragging = false;
    };

    /* MOUSE */

    bar.addEventListener("mousedown", e => {
        start(e.clientX, e.clientY);
    });

    window.addEventListener("mousemove", e => {
        move(e.clientX, e.clientY);
    });

    window.addEventListener("mouseup", stop);

    /* TOUCH */

    bar.addEventListener("touchstart", e => {

        const t = e.touches[0];

        start(t.clientX, t.clientY);

    });

    window.addEventListener("touchmove", e => {

        const t = e.touches[0];

        move(t.clientX, t.clientY);

    });

    window.addEventListener("touchend", stop);

});

/* ================= NOTIFICATIONS ================= */

function notifySystem(title,text,actions=[]){

    const holder =
    document.getElementById("systemNotifications");

    const n = document.createElement("div");

    n.className = "notification";

    n.innerHTML = `
        <h3>${title}</h3>
        <p>${text}</p>
    `;

    if(actions.length){

        const row = document.createElement("div");

        row.className = "notif-actions";

        actions.forEach(a => {

            const btn =
            document.createElement("button");

            btn.innerText = a.label;

            btn.className = a.type;

            btn.onclick = () => a.action(n);

            row.appendChild(btn);

        });

        n.appendChild(row);

    }

    holder.appendChild(n);

    setTimeout(() => {

        if(n.parentNode){
            n.remove();
        }

    }, 15000);

}

/* ================= CLOCK ================= */

setInterval(() => {

    document.getElementById("clock")
    .innerText =
    new Date().toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
    });

},1000);

</script>

</body>
</html>
