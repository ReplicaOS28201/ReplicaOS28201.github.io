<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReplicaOS - System Edition</title>
    <style>
        :root {
            --taskbar-bg: rgba(20, 20, 20, 0.85);
            --win-bg: #f3f3f3;
            --accent: #0078d4;
            --accent-hover: #005a9e;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: black;
        }

        body {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
        }

        /* ================= DESKTOP ================= */
        #desktop {
            position: fixed;
            inset: 0;
            padding: 20px;
            padding-bottom: 70px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            gap: 18px;
            align-content: start;
            z-index: 1;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .icon img {
            width: 52px;
            height: 52px;
            object-fit: contain;
            margin-bottom: 6px;
            transition: transform 0.2s;
        }

        .icon:hover img { transform: scale(1.1); }

        /* ================= TASKBAR ================= */
        #taskbar {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 52px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            color: white;
            z-index: 99999;
        }

        .taskBtn {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .taskBtn:hover { background: rgba(255,255,255,0.1); }

        /* ================= WINDOW SYSTEM ================= */
        .window {
            position: fixed;
            width: min(450px, 95vw);
            height: min(550px, 85vh);
            background: var(--win-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
            display: none;
            flex-direction: column;
            z-index: 5000;
            transform: translate(-50%, -50%);
            touch-action: none;
        }

        .titlebar {
            height: 40px;
            background: #1f1f1f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            cursor: move;
            user-select: none;
            flex-shrink: 0;
        }

        .windowBtns button {
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            margin-left: 5px;
        }

        .closeBtn { background: #e53935; }
        .closeBtn:hover { background: #b71c1c; }
        .minBtn { background: #555; }

        .windowContent {
            flex: 1;
            overflow: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        /* ================= CHAT UI ================= */
        #chatMessages {
            flex: 1;
            background: #e5e5e5;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
        }

        #msgInput {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        #sendBtn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #sendBtn:hover { background: var(--accent-hover); }

        /* ================= CALL UI ================= */
        #call { background: black; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo {
            position: absolute;
            width: 120px; height: 170px;
            bottom: 15px; right: 15px;
            border-radius: 12px;
            border: 2px solid white;
            object-fit: cover;
            background: #222;
        }

        /* ================= START MENU ================= */
        #startMenu {
            position: fixed;
            left: 10px; bottom: 62px;
            width: 260px;
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 999999;
        }

        .startItem {
            padding: 12px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .startItem:hover { background: rgba(255,255,255,0.1); }

        /* ================= NOTIFICATIONS ================= */
        #systemNotifications {
            position: fixed; top: 15px; right: 15px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 9999999;
        }

        .notification {
            width: 300px;
            background: rgba(30, 30, 30, 0.98);
            color: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        .notif-actions { display: flex; gap: 10px; margin-top: 10px; }
        .notif-actions button {
            flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; color: white;
        }
        .accept { background: #4CAF50; }
        .decline { background: #f44336; }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 700px) {
            .window {
                width: 100vw !important;
                height: calc(100vh - 52px) !important;
                left: 0 !important; top: 0 !important;
                transform: none !important;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div id="systemNotifications"></div>

<div id="desktop">
    <div class="icon" onclick="openWindow('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <div>Friends</div>
    </div>
    <div class="icon" onclick="openWindow('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <div>Chat</div>
    </div>
    <div class="icon" onclick="openWindow('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <div>Call</div>
    </div>
</div>

<div id="friends" class="window">
    <div class="titlebar">
        <span>Friends List</span>
        <div class="windowBtns">
            <button class="minBtn">—</button>
            <button class="closeBtn" onclick="closeWindow('friends')">✕</button>
        </div>
    </div>
    <div class="windowContent">
        <h3 style="margin-top:0">Online Now</h3>
        <div id="friendsList"></div>
    </div>
</div>

<div id="chat" class="window">
    <div class="titlebar">
        <span>Global Chat</span>
        <div class="windowBtns">
            <button class="minBtn">—</button>
            <button class="closeBtn" onclick="closeWindow('chat')">✕</button>
        </div>
    </div>
    <div class="windowContent">
        <div id="chatMessages"></div>
        <div class="chat-input-area">
            <input id="msgInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<div id="call" class="window">
    <div class="titlebar">
        <span>Active Call</span>
        <div class="windowBtns">
            <button class="closeBtn" onclick="closeWindow('call')">✕</button>
        </div>
    </div>
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
</div>

<div id="startMenu">
    <div class="startItem" onclick="openWindow('friends')">👥 Friends</div>
    <div class="startItem" onclick="openWindow('chat')">💬 Global Chat</div>
    <div class="startItem" onclick="openWindow('call')">📞 Video Call</div>
</div>

<div id="taskbar">
    <div class="taskBtn" onclick="toggleStart()">🪟 Start</div>
    <div id="clock">00:00</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, update, onDisconnect, onChildAdded } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCnJPv3cclaIArwUPKEq5of0NyafJ7d4QI",
        authDomain: "replicanewos3030.firebaseapp.com",
        projectId: "replicanewos3030",
        storageBucket: "replicanewos3030.firebasestorage.app",
        messagingSenderId: "60780972584",
        appId: "1:60780972584:web:db097a4cda968fec80831d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Identity
    const myId = "User_" + Math.random().toString(36).substring(2, 7);
    const presenceRef = ref(db, "presence/" + myId);
    set(presenceRef, true);
    onDisconnect(presenceRef).remove();

    /* ================= CHAT LOGIC ================= */
    const msgInput = document.getElementById("msgInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatContainer = document.getElementById("chatMessages");

    function sendMessage() {
        const text = msgInput.value.trim();
        if(!text) return;
        push(ref(db, "globalChat"), {
            sender: myId,
            text: text,
            time: Date.now()
        });
        msgInput.value = "";
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if(e.key === "Enter") sendMessage(); };

    onChildAdded(ref(db, "globalChat"), (snap) => {
        const data = snap.val();
        const div = document.createElement("div");
        const isMe = data.sender === myId;
        div.style.alignSelf = isMe ? "flex-end" : "flex-start";
        div.style.background = isMe ? "#0078d4" : "#fff";
        div.style.color = isMe ? "white" : "black";
        div.style.padding = "8px 12px";
        div.style.borderRadius = "10px";
        div.style.maxWidth = "80%";
        div.style.fontSize = "14px";
        div.innerHTML = `<b style="font-size:10px; display:block; opacity:0.8">${data.sender}</b>${data.text}`;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });

    /* ================= FRIENDS & PRESENCE ================= */
    onValue(ref(db, "presence"), snap => {
        const list = document.getElementById("friendsList");
        list.innerHTML = "";
        const data = snap.val() || {};
        Object.keys(data).forEach(id => {
            if(id === myId) return;
            const item = document.createElement("div");
            item.style = "background:#fff; margin-bottom:8px; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center";
            item.innerHTML = `<span>${id}</span> <button onclick="makeCall('${id}')" style="background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer">Call</button>`;
            list.appendChild(item);
        });
    });

    /* ================= WEBRTC CALLING ================= */
    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    let localStream;

    pc.ontrack = e => { document.getElementById("remoteVideo").srcObject = e.streams[0]; };

    async function startMedia() {
        if (localStream) return;
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }

    window.makeCall = async (targetId) => {
        await startMedia();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        const callRef = push(ref(db, "calls"));
        await set(callRef, { from: myId, to: targetId, offer: { type: offer.type, sdp: offer.sdp }, status: "pending" });
        
        onValue(ref(db, `calls/${callRef.key}/answer`), async snap => {
            const answer = snap.val();
            if (answer && !pc.currentRemoteDescription) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                openWindow("call");
            }
        });
    };

    onValue(ref(db, "calls"), async snap => {
        const data = snap.val();
        if (!data) return;
        Object.keys(data).forEach(async id => {
            const c = data[id];
            if (c.to === myId && c.offer && !pc.currentRemoteDescription) {
                notifySystem("Incoming Call", `${c.from} is calling...`, [
                    { label: "Accept", type: "accept", action: async (n) => {
                        await startMedia();
                        await pc.setRemoteDescription(new RTCSessionDescription(c.offer));
                        const ans = await pc.createAnswer();
                        await pc.setLocalDescription(ans);
                        update(ref(db, `calls/${id}`), { answer: { type: ans.type, sdp: ans.sdp }, status: "active" });
                        openWindow("call");
                        n.remove();
                    }},
                    { label: "Ignore", type: "decline", action: (n) => n.remove() }
                ]);
            }
        });
    });

    /* ================= UI HELPERS ================= */
    let highestZ = 5000;
    window.openWindow = id => {
        const win = document.getElementById(id);
        win.style.display = "flex";
        win.style.zIndex = ++highestZ;
        if (window.innerWidth > 700) {
            win.style.left = "50%"; win.style.top = "50%";
            win.style.transform = "translate(-50%, -50%)";
        }
    };

    window.closeWindow = id => { document.getElementById(id).style.display = "none"; };
    
    window.toggleStart = () => {
        const m = document.getElementById("startMenu");
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
    };

    function notifySystem(title, text, actions) {
        const h = document.getElementById("systemNotifications");
        const n = document.createElement("div");
        n.className = "notification";
        n.innerHTML = `<b>${title}</b><p style="margin:5px 0">${text}</p>`;
        const row = document.createElement("div");
        row.className = "notif-actions";
        actions.forEach(a => {
            const b = document.createElement("button");
            b.innerText = a.label; b.className = a.type;
            b.onclick = () => a.action(n);
            row.appendChild(b);
        });
        n.appendChild(row);
        h.appendChild(n);
    }

    /* ================= DRAGGING ================= */
    document.querySelectorAll(".window").forEach(win => {
        const bar = win.querySelector(".titlebar");
        let drag = false, ox, oy;
        const start = (e) => {
            if (window.innerWidth <= 700) return;
            drag = true; win.style.zIndex = ++highestZ;
            win.style.transform = "none";
            const t = e.touches ? e.touches[0] : e;
            ox = t.clientX - win.offsetLeft; oy = t.clientY - win.offsetTop;
        };
        const move = (e) => {
            if (!drag) return;
            const t = e.touches ? e.touches[0] : e;
            win.style.left = (t.clientX - ox) + "px"; win.style.top = (t.clientY - oy) + "px";
        };
        bar.onmousedown = bar.ontouchstart = start;
        window.onmousemove = window.ontouchmove = move;
        window.onmouseup = window.ontouchend = () => drag = false;
    });

    setInterval(() => {
        document.getElementById("clock").innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);
</script>

</body>
</html>
