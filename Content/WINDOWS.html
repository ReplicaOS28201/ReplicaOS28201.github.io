<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplicaOS Pro Call System</title>

<style>

/* ================= UI ================= */

body{
    margin:0;
    font-family:system-ui;
    background:#111;
    color:white;
}

#auth{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#222;
    padding:20px;
    border-radius:12px;
    width:300px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input,button{
    padding:10px;
    border:none;
    border-radius:8px;
}

button{
    cursor:pointer;
    background:#0078d4;
    color:white;
}

/* ================= DESKTOP ================= */

#desktop{
    display:none;
    padding:20px;
}

.icon{
    display:inline-block;
    margin:10px;
    padding:10px;
    background:#222;
    border-radius:10px;
    cursor:pointer;
}

/* ================= WINDOWS ================= */

.window{
    display:none;
    position:fixed;
    top:50px;
    left:50px;
    width:400px;
    height:500px;
    background:#222;
    border-radius:12px;
    overflow:hidden;
    flex-direction:column;
}

.title{
    background:#111;
    padding:10px;
}

.content{
    flex:1;
    padding:10px;
    overflow:auto;
}

/* ================= CHAT ================= */

.msg{
    background:#0078d4;
    margin:5px;
    padding:8px;
    border-radius:8px;
}

/* ================= CALL ================= */

video{
    width:100%;
    height:200px;
    background:black;
}

</style>
</head>

<body>

<!-- ================= AUTH ================= -->

<div id="auth">
<div class="box">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>
</div>

<!-- ================= DESKTOP ================= -->

<div id="desktop">

<div class="icon" onclick="openWin('friends')">Friends</div>
<div class="icon" onclick="openWin('chat')">Chat</div>
<div class="icon" onclick="openWin('call')">Call</div>

</div>

<!-- ================= FRIENDS ================= -->

<div id="friends" class="window">
<div class="title">Friends</div>
<div class="content" id="friendsList"></div>
</div>

<!-- ================= CHAT ================= -->

<div id="chat" class="window">
<div class="title">Chat</div>
<div class="content">

<div id="messages"></div>

<input id="msgInput" placeholder="message">
<button onclick="sendMsg()">Send</button>

</div>
</div>

<!-- ================= CALL ================= -->

<div id="call" class="window">
<div class="title">Call</div>
<div class="content">

<video id="local" autoplay muted></video>
<video id="remote" autoplay></video>

<button onclick="endCall()">End Call</button>

</div>
</div>

<!-- ================= FIREBASE ================= -->

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
collection,
addDoc,
onSnapshot,
query,
serverTimestamp,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= CONFIG ================= */

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID",
appId:"YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= GLOBAL ================= */

let user = null;
let peer;
let localStream;

/* ================= AUTH ================= */

window.register = async () => {

await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

};

window.login = async () => {

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

};

onAuthStateChanged(auth, async u => {

if(!u) return;

user = u;

auth.style.display="none";
desktop.style.display="block";

/* save user */

await setDoc(doc(db,"users",u.uid),{
uid:u.uid,
email:u.email
},{merge:true});

loadFriends();
listenCalls();

});

/* ================= FRIENDS ================= */

function loadFriends(){

onSnapshot(collection(db,"users"),snap=>{

friendsList.innerHTML="";

snap.forEach(d=>{

if(d.id===user.uid) return;

friendsList.innerHTML+=`
<div>
${d.data().email}
<button onclick="startCall('${d.id}')">Call</button>
</div>
`;

});

});

}

/* ================= CHAT ================= */

window.sendMsg = async () => {

await addDoc(collection(db,"messages"),{
text:msgInput.value,
uid:user.uid,
time:serverTimestamp()
});

msgInput.value="";

};

onSnapshot(collection(db,"messages"),snap=>{

messages.innerHTML="";

snap.forEach(m=>{

messages.innerHTML+=`
<div class="msg">${m.data().text}</div>
`;

});

});

/* ================= WEBRTC CALL ================= */

const servers = {
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
};

window.startCall = async (to) => {

const callRef = doc(collection(db,"calls"));

peer = new RTCPeerConnection(servers);

localStream = await navigator.mediaDevices.getUserMedia({
video:true,audio:true
});

local.srcObject = localStream;

localStream.getTracks().forEach(t=>{
peer.addTrack(t,localStream);
});

const remoteStream = new MediaStream();
remote.srcObject = remoteStream;

peer.ontrack = e=>{
e.streams[0].getTracks().forEach(t=>{
remoteStream.addTrack(t);
});
};

const offer = await peer.createOffer();
await peer.setLocalDescription(offer);

await setDoc(callRef,{
caller:user.uid,
callee:to,
offer:JSON.stringify(offer)
});

/* listen answer */

onSnapshot(callRef,snap=>{

const data = snap.data();

if(data.answer && !peer.currentRemoteDescription){

peer.setRemoteDescription(
new RTCSessionDescription(
JSON.parse(data.answer)
)
);

}

});

peer.onicecandidate = e=>{

if(e.candidate){

setDoc(callRef,{
candidate:JSON.stringify(e.candidate)
},{merge:true});

}

};

};

/* ================= LISTEN CALLS ================= */

function listenCalls(){

onSnapshot(collection(db,"calls"),snap=>{

snap.forEach(async c=>{

const d = c.data();

if(d.callee === user.uid && d.answer){

peer.setRemoteDescription(
new RTCSessionDescription(
JSON.parse(d.answer)
)
);

}

if(d.callee===user.uid && !peer){

if(confirm("Incoming call")){

window.startAnswer(c.id);

}

}

});

});

}

/* ================= ANSWER ================= */

window.startAnswer = async (id)=>{

const ref = doc(db,"calls",id);

peer = new RTCPeerConnection(servers);

localStream = await navigator.mediaDevices.getUserMedia({
video:true,audio:true
});

local.srcObject = localStream;

localStream.getTracks().forEach(t=>{
peer.addTrack(t,localStream);
});

const remoteStream = new MediaStream();
remote.srcObject = remoteStream;

peer.ontrack = e=>{
e.streams[0].getTracks().forEach(t=>{
remoteStream.addTrack(t);
});
};

const callData = (await getDoc(ref)).data();

await peer.setRemoteDescription(
new RTCSessionDescription(
JSON.parse(callData.offer)
)
);

const answer = await peer.createAnswer();
await peer.setLocalDescription(answer);

await setDoc(ref,{
answer:JSON.stringify(answer)
},{merge:true});

};

/* ================= END CALL ================= */

window.endCall = () => {

peer?.close();
localStream?.getTracks().forEach(t=>t.stop());

call.style.display="none";

};

/* ================= UI ================= */

window.openWin = id=>{

document.getElementById(id).style.display="flex";

};

</script>

</body>
</html>
