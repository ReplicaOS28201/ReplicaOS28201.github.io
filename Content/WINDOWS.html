<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>ReplicaOS 3D</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
  touch-action: none;
}

#ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* ================= WINDOWS ================= */
.appwindow {
  position: absolute;
  width: 320px;
  height: 220px;
  background: rgba(20,20,20,0.95);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  overflow: hidden;
  pointer-events: auto;

  left: 100px;
  top: 100px;
}

.hidden { display: none; }

.window-titlebar {
  height: 40px;
  background: rgba(255,255,255,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
  color: white;
  cursor: grab;
}

.window-content {
  width: 100%;
  height: calc(100% - 40px);
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="ui">

  <!-- CALC -->
  <div id="calc" class="appwindow hidden">
    <div class="window-titlebar">
      Calculator
      <button onclick="closeWindow('calc')">×</button>
    </div>
    <iframe class="window-content" src="Apps/com.calc.app/Index.html"></iframe>
  </div>

  <!-- NOTES -->
  <div id="notes" class="appwindow hidden">
    <div class="window-titlebar">
      Notes
      <button onclick="closeWindow('notes')">×</button>
    </div>
    <div class="window-content">
      <textarea style="width:100%; height:100%; background:transparent; color:white; border:none;">
Write notes...
      </textarea>
    </div>
  </div>

  <!-- BROWSER -->
  <div id="browser" class="appwindow hidden">
    <div class="window-titlebar">
      Browser
      <button onclick="closeWindow('browser')">×</button>
    </div>
    <iframe class="window-content" src="https://example.com"></iframe>
  </div>

</div>

<script>

/* ================= WINDOW SYSTEM ================= */
function openWindow(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove("hidden");
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add("hidden");
}

/* ================= DRAG SYSTEM ================= */
document.querySelectorAll(".appwindow").forEach(win => {
  const bar = win.querySelector(".window-titlebar");

  let dragging = false, offsetX = 0, offsetY = 0;

  bar.addEventListener("mousedown", start);
  bar.addEventListener("touchstart", start, { passive: false });

  function start(e) {
    e.preventDefault();
    dragging = true;

    const rect = win.getBoundingClientRect();
    const pos = getPos(e);

    offsetX = pos.x - rect.left;
    offsetY = pos.y - rect.top;

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", stop);
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("touchend", stop);
  }

  function move(e) {
    if (!dragging) return;
    e.preventDefault();

    const pos = getPos(e);
    win.style.left = (pos.x - offsetX) + "px";
    win.style.top = (pos.y - offsetY) + "px";
  }

  function stop() {
    dragging = false;

    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", stop);
    document.removeEventListener("touchmove", move);
    document.removeEventListener("touchend", stop);
  }

  function getPos(e) {
    return e.touches
      ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
      : { x: e.clientX, y: e.clientY };
  }
});

/* ================= THREE BACKGROUND ================= */
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geo = new THREE.BufferGeometry();
const arr = [];

for (let i=0;i<3000;i++) {
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
  arr.push((Math.random()-0.5)*20);
}

geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.02 });
scene.add(new THREE.Points(geo, mat));

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
