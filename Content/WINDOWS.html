<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReplicaOS - Ultimate</title>
    <style>
        :root {
            --taskbar-bg: rgba(20, 20, 20, 0.85);
            --win-bg: #f3f3f3;
            --accent: #0078d4;
            --title-bar: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Desktop */
        #desktop {
            height: calc(100vh - 48px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 90px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-auto-flow: column;
            gap: 15px;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            color: white; cursor: pointer; padding: 10px; border-radius: 8px;
            transition: background 0.2s;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.15); }
        .icon img { width: 45px; height: 45px; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .icon span { font-size: 11px; text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }

        /* Window Styling */
        .window {
            position: absolute; width: 400px; height: 500px;
            background: var(--win-bg); border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: none; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.2); z-index: 100;
        }

        .title-bar {
            padding: 12px 15px; background: var(--title-bar);
            display: flex; justify-content: space-between; align-items: center;
            cursor: move; user-select: none; border-bottom: 1px solid #ddd;
        }

        .window-controls button {
            border: none; background: transparent; padding: 5px 12px;
            cursor: pointer; font-size: 14px; border-radius: 4px;
        }
        .btn-close:hover { background: #e81123; color: white; }

        .content { flex-grow: 1; overflow: auto; display: flex; flex-direction: column; position: relative; }

        /* Chat System */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .chat-input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .chat-send { margin-left: 8px; background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 20px; cursor: pointer; }
        .msg { padding: 8px 12px; border-radius: 15px; background: #e2e2e2; max-width: 85%; font-size: 13px; align-self: flex-start; }
        .msg.me { background: var(--accent); color: white; align-self: flex-end; }

        /* Video Call */
        #remoteVideo { width: 100%; height: 100%; background: #222; object-fit: cover; }
        #localVideo { width: 100px; height: 130px; position: absolute; bottom: 70px; right: 10px; border: 2px solid white; border-radius: 4px; object-fit: cover; z-index: 10; }
        .video-ui { padding: 15px; background: #1a1a1a; display: flex; flex-direction: column; gap: 10px; }
        
        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: var(--taskbar-bg); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 9999; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .taskbar-left, .taskbar-right { display: flex; align-items: center; color: white; padding: 0 15px; }
        .start-btn { cursor: pointer; padding: 10px; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .window { width: 100% !important; height: calc(100vh - 48px) !important; top: 0 !important; left: 0 !important; border-radius: 0; }
            #desktop { grid-template-columns: repeat(auto-fill, 80px); padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="desktop">
        <div class="icon" onclick="openWindow('win-chat')">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="Chat">
            <span>Messenger</span>
        </div>
        <div class="icon" onclick="openWindow('win-video')">
            <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png" alt="Call">
            <span>P2P Call</span>
        </div>
        <div class="icon" onclick="openWindow('win-browser')">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Web">
            <span>Browser</span>
        </div>
    </div>

    <div id="win-chat" class="window">
        <div class="title-bar" onmousedown="dragElement(event, 'win-chat')" ontouchstart="dragElement(event, 'win-chat')">
            <span>Global Messenger</span>
            <div class="window-controls"><button class="btn-close" onclick="closeWindow('win-chat')">✕</button></div>
        </div>
        <div class="content">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Aa">
                <button class="chat-send" id="btn-send">Send</button>
            </div>
        </div>
    </div>

    <div id="win-video" class="window">
        <div class="title-bar" onmousedown="dragElement(event, 'win-video')" ontouchstart="dragElement(event, 'win-video')">
            <span>Video Call (WebRTC)</span>
            <div class="window-controls"><button class="btn-close" onclick="closeWindow('win-video')">✕</button></div>
        </div>
        <div class="content">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-ui">
                <div id="my-id" style="color: #aaa; font-size: 11px;">Your ID: ...</div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="target-id" placeholder="Partner ID" style="flex:1; padding:8px; border-radius:4px; border:none;">
                    <button id="btn-call" style="background:#4CAF50; color:white; border:none; padding:8px 15px; border-radius:4px;">Call</button>
                </div>
            </div>
        </div>
    </div>

    <div id="win-browser" class="window" style="width:600px; height:400px;">
        <div class="title-bar" onmousedown="dragElement(event, 'win-browser')" ontouchstart="dragElement(event, 'win-browser')">
            <span>Browser</span>
            <div class="window-controls"><button class="btn-close" onclick="closeWindow('win-browser')">✕</button></div>
        </div>
        <div class="content">
            <iframe src="https://en.m.wikipedia.org" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="taskbar">
        <div class="taskbar-left"><div class="start-btn">🪟</div></div>
        <div class="taskbar-right"><div id="clock">12:00 PM</div></div>
    </div>

    <script type="module">
        // --- FIREBASE CONFIG ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, serverTimestamp } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
  apiKey: "AIzaSyC9P1pSA8sVyaQEGaA5sA8ThPYgmVAFab8",
  authDomain: "replicaos.firebaseapp.com",
  databaseURL: "https://replicaos-default-rtdb.firebaseio.com",
  projectId: "replicaos",
  storageBucket: "replicaos.firebasestorage.app",
  messagingSenderId: "34115825829",
  appId: "1:34115825829:web:246973f8280df47f221d4c",
  measurementId: "G-F26619EETW"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- WINDOW MGMT ---
        let highestZ = 1000;
        window.openWindow = (id) => {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            el.style.zIndex = ++highestZ;
        };
        window.closeWindow = (id) => document.getElementById(id).style.display = 'none';

        window.dragElement = (e, id) => {
            const el = document.getElementById(id);
            el.style.zIndex = ++highestZ;
            let startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            let initialTop = el.offsetTop;
            let initialLeft = el.offsetLeft;

            const onMove = (moveEv) => {
                let curX = moveEv.type.includes('touch') ? moveEv.touches[0].clientX : moveEv.clientX;
                let curY = moveEv.type.includes('touch') ? moveEv.touches[0].clientY : moveEv.clientY;
                el.style.top = (initialTop + (curY - startY)) + "px";
                el.style.left = (initialLeft + (curX - startX)) + "px";
            };
            const onEnd = () => {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('touchmove', onMove);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('mouseup', onEnd, { once: true });
            document.addEventListener('touchend', onEnd, { once: true });
        };

        // --- CHAT LOGIC ---
        const chatInput = document.getElementById('chat-input');
        const btnSend = document.getElementById('btn-send');
        const myName = "User_" + Math.floor(Math.random() * 999);

        btnSend.onclick = () => {
            if(!chatInput.value.trim()) return;
            push(ref(db, 'messages'), { sender: myName, text: chatInput.value, time: serverTimestamp() });
            chatInput.value = "";
        };

        onChildAdded(ref(db, 'messages'), (snap) => {
            const data = snap.val();
            const msgEl = document.createElement('div');
            msgEl.className = `msg ${data.sender === myName ? 'me' : ''}`;
            msgEl.innerText = data.text;
            document.getElementById('chat-messages').appendChild(msgEl);
            document.getElementById('chat-messages').scrollTop = 99999;
        });

        // --- P2P VIDEO CALL LOGIC ---
        const localVid = document.getElementById('localVideo');
        const remoteVid = document.getElementById('remoteVideo');
        const myId = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('my-id').innerText = "Your ID: " + myId;

        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let localStream;

        async function initCamera() {
            if(localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVid.srcObject = localStream;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        }

        pc.ontrack = (e) => remoteVid.srcObject = e.streams[0];

        // Making a Call
        document.getElementById('btn-call').onclick = async () => {
            const target = document.getElementById('target-id').value;
            if(!target) return alert("Enter target ID");
            await initCamera();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            set(ref(db, `calls/${target}`), { offer: { sdp: offer.sdp, type: offer.type }, caller: myId });
            
            onValue(ref(db, `calls/${target}/answer`), async (snap) => {
                if(snap.exists() && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                }
            });
        };

        // Receiving a Call
        onValue(ref(db, `calls/${myId}/offer`), async (snap) => {
            if(snap.exists() && !pc.currentRemoteDescription) {
                await initCamera();
                await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                set(ref(db, `calls/${myId}/answer`), { sdp: answer.sdp, type: answer.type });
            }
        });

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
