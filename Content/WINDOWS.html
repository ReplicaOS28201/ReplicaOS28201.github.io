<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>19OS</title>
  <link rel="stylesheet" href="CSS/main.css">
</head>

<body>
<div id="desktop">
<h2 class="title">19OS</h2>

<div id="myApp" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Calculator</span>
    <div class="window-controls">
       <button onclick="closeWindow('myApp')">×</button>
    </div>
  </div>
  <iframe src="Apps/com.calc.app/Index.html" class="window-content"></iframe>
</div>

<div id="secret" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Secret Lang</span>
    <div class="window-controls">
      <button onclick="closeWindow('secret')">×</button>
    </div>
  </div>
  <iframe src="Apps/com.os.secretlang/Index.html" class="window-content"></iframe>
</div>

<div id="poki" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Poki</span>
    <div class="window-controls">
       <button onclick="closeWindow('poki')">×</button>
    </div>
  </div>
  <iframe src="https://poki.com/" class="window-content"></iframe>
</div>

<div id="crashViewer" class="appwindow hidden">
  <div class="resize-handle resize-br"></div>
  <div class="resize-handle resize-r"></div>
  <div class="resize-handle resize-b"></div>
  <div class="window-titlebar">
    <span>Crash Viewer</span>
    <div class="window-controls">
       <button onclick="closeWindow('crashViewer')">×</button>
    </div>
  </div>
  <div id="crashList"></div>
  <button onclick="clearCrashes()">Clear Logs</button>
</div>

<div class="dock glass">
  <button onclick="openWindow('myApp')">Calculator</button>
  <button onclick="openWindow('secret')">Secret</button>
  <button onclick="openWindow('poki')">Poki</button>
  <button onclick="openWindow('crashViewer')">Crash</button>
</div>
</div>

<script>
// ===============================
// GLOBALS
// ===============================
let zIndexCounter = 100;
const windows = [];

// ===============================
// SPRING PHYSICS
// ===============================
function spring(v) {
  return { value: v, velocity: 0, target: v };
}

function step(s, k = 0.12, d = 0.75) {
  const f = (s.target - s.value) * k;
  s.velocity += f;
  s.velocity *= d;
  s.value += s.velocity;
}

// ===============================
// CORE ENGINE
// ===============================
function createWindowState(win) {
  const rect = win.getBoundingClientRect();
  win._state = {
    x: spring(rect.left),
    y: spring(rect.top),
    w: spring(rect.width),
    h: spring(rect.height),
    scaleX: spring(1),
    scaleY: spring(1),
    rot: spring(0),
    isDragging: false,
    isResizing: false
  };
  windows.push(win);
}

function render(win) {
  const s = win._state;
  win.style.width = s.w.value + "px";
  win.style.height = s.h.value + "px";
  win.style.transform = `translate(${s.x.value}px, ${s.y.value}px) rotate(${s.rot.value}deg) scale(${s.scaleX.value}, ${s.scaleY.value})`;
}

// Main animation loop for all windows
function update() {
  windows.forEach(win => {
    const s = win._state;
    step(s.x); step(s.y);
    step(s.w, 0.15, 0.7); step(s.h, 0.15, 0.7);
    step(s.scaleX, 0.2, 0.6); step(s.scaleY, 0.2, 0.6);
    
    // Tilt logic: only tilt when moving horizontally
    if (s.isDragging) {
      s.rot.target = Math.max(-6, Math.min(6, s.x.velocity * 0.25));
    } else {
      s.rot.target = 0;
    }
    step(s.rot, 0.1, 0.8);
    
    render(win);
  });
  requestAnimationFrame(update);
}

// ===============================
// INTERACTION LOGIC
// ===============================
function bringToFront(el) {
  el.style.zIndex = ++zIndexCounter;
}

function makeDraggable(win) {
  const header = win.querySelector(".window-titlebar");
  const s = win._state;
  let offsetX = 0, offsetY = 0;

  header.addEventListener("pointerdown", e => {
    if (e.target.closest(".window-controls")) return;
    s.isDragging = true;
    bringToFront(win);
    const rect = win.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    win.setPointerCapture(e.pointerId);
  });

  window.addEventListener("pointermove", e => {
    if (!s.isDragging) return;
    s.x.target = e.clientX - offsetX;
    s.y.target = e.clientY - offsetY;
  });

  window.addEventListener("pointerup", e => {
    s.isDragging = false;
  });
}

function makeResizable(win) {
  const handles = win.querySelectorAll(".resize-handle");
  const s = win._state;

  handles.forEach(handle => {
    let startX, startY, startW, startH;

    handle.addEventListener("pointerdown", e => {
      e.stopPropagation();
      s.isResizing = true;
      const rect = win.getBoundingClientRect();
      startX = e.clientX; startY = e.clientY;
      startW = rect.width; startH = rect.height;
      win.setPointerCapture(e.pointerId);
    });

    window.addEventListener("pointermove", e => {
      if (!s.isResizing) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (handle.classList.contains("resize-r") || handle.classList.contains("resize-br")) {
        s.w.target = Math.max(250, startW + dx);
        s.scaleX.target = 1 + (dx * 0.001);
      }
      if (handle.classList.contains("resize-b") || handle.classList.contains("resize-br")) {
        s.h.target = Math.max(150, startH + dy);
        s.scaleY.target = 1 + (dy * 0.001);
      }
    });

    window.addEventListener("pointerup", () => {
      s.isResizing = false;
      s.scaleX.target = 1;
      s.scaleY.target = 1;
    });
  });
}

// ===============================
// WINDOW CONTROLS
// ===============================
function openWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove("hidden");
  el.setAttribute('aria-hidden', 'false');
  bringToFront(el);
}

function closeWindow(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("hidden");
  el.setAttribute('aria-hidden', 'true');
}

// ===============================
// INIT
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".appwindow").forEach(win => {
    createWindowState(win);
    makeDraggable(win);
    makeResizable(win);
    
    // Bring to front on click anywhere
    win.addEventListener('pointerdown', () => bringToFront(win));
  });

  requestAnimationFrame(update);
});
</script>
<script src="js/crashlogger.js"></script>
</body>
</html>
