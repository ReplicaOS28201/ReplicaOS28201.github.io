<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplicaOS - Desktop</title>
    <!-- FIX: Use ../ to reference styles in the root directory if they exist -->
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --taskbar-bg: rgba(20, 20, 20, 0.85);
            --win-bg: #f3f3f3;
            --accent: #0078d4;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://wallpaperaccess.com/full/2565434.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Desktop Icons Area */
        #desktop {
            height: calc(100vh - 48px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            grid-template-rows: repeat(auto-fill, 90px);
            grid-auto-flow: column;
            gap: 10px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .icon:hover { background: rgba(255,255,255,0.2); }
        .icon img { width: 40px; height: 40px; margin-bottom: 5px; }
        .icon span { font-size: 12px; text-align: center; }

        /* Window Styling */
        .window {
            position: absolute;
            width: 500px;
            height: 350px;
            background: var(--win-bg);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .title-bar {
            padding: 10px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .window-controls button {
            border: none;
            background: transparent;
            padding: 5px 12px;
            cursor: pointer;
        }

        .btn-close:hover { background: #e81123; color: white; }

        .content { padding: 15px; flex-grow: 1; overflow: auto; }

        /* Taskbar */
        #taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 48px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999;
        }

        .taskbar-left { display: flex; align-items: center; height: 100%; }
        .start-btn { padding: 0 15px; height: 100%; display: flex; align-items: center; cursor: pointer; }
        .start-btn:hover { background: rgba(255,255,255,0.1); }

        .taskbar-right {
            color: white;
            padding-right: 15px;
            font-size: 12px;
            text-align: right;
        }
    </style>
</head>
<body>

    <div id="desktop">
        <!-- Desktop Icons -->
        <div class="icon" onclick="openWindow('win-browser')">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Edge">
            <span>Browser</span>
        </div>
        <div class="icon" onclick="openWindow('win-about')">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png" alt="About">
            <span>About</span>
        </div>
    </div>

    <!-- Browser Window -->
    <div id="win-browser" class="window" style="top: 100px; left: 100px;">
        <div class="title-bar" onmousedown="dragWindow(this)">
            <span>Internet Browser</span>
            <div class="window-controls">
                <button onclick="closeWindow('win-browser')">─</button>
                <button class="btn-close" onclick="closeWindow('win-browser')">✕</button>
            </div>
        </div>
        <div class="content" style="padding:0;">
            <iframe src="https://www.bing.com" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <!-- About Window -->
    <div id="win-about" class="window" style="top: 150px; left: 200px;">
        <div class="title-bar" onmousedown="dragWindow(this)">
            <span>About ReplicaOS</span>
            <div class="window-controls">
                <button class="btn-close" onclick="closeWindow('win-about')">✕</button>
            </div>
        </div>
        <div class="content">
            <h3>ReplicaOS 28201</h3>
            <p>Version 1.0.4 (Stable Build)</p>
            <p>Developed by ReplicaOS Team.</p>
            <hr>
            <p id="visitor-count">Tracking visits...</p>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="taskbar-left">
            <div class="start-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" width="24" alt="Start">
            </div>
        </div>
        <div class="taskbar-right">
            <div id="clock-time">12:00 PM</div>
            <div id="clock-date">01/01/2026</div>
        </div>
    </div>

    <script>
        // --- Window Management ---
        let highestZ = 100;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            focusWindow(id);
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }

        function focusWindow(id) {
            highestZ++;
            document.getElementById(id).style.zIndex = highestZ;
        }

        // --- Draggable Logic ---
        function dragWindow(elmnt) {
            const win = elmnt.parentElement;
            focusWindow(win.id);
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            elmnt.onmousedown = function(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                };
                document.onmousemove = function(e) {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    win.style.top = (win.offsetTop - pos2) + "px";
                    win.style.left = (win.offsetLeft - pos1) + "px";
                };
            };
        }

        // --- Clock Logic ---
        function updateClock() {
            const now = new Date();
            document.getElementById('clock-time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('clock-date').innerText = now.toLocaleDateString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Fix for Tracker.py (JS Replacement) ---
        // Since Python won't run, we use a free API to track visits
        async function getVisits() {
            try {
                // Example using CountAPI (replace 'replicaos' with your unique key)
                const res = await fetch('https://api.countapi.xyz/hit/replicaos28201/visits');
                const data = await res.json();
                document.getElementById('visitor-count').innerText = `Total Site Visits: ${data.value}`;
            } catch (e) {
                document.getElementById('visitor-count').innerText = "Visitor tracking active.";
            }
        }
        getVisits();
    </script>
</body>
</html>
