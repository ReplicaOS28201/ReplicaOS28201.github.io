<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReplicaOS Pro - v2.0</title>
    <style>
        :root {
            --taskbar-bg: rgba(25, 25, 25, 0.8);
            --win-bg: rgba(245, 245, 245, 0.95);
            --accent: #0078d4;
            --glass: blur(12px) saturate(180%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80') center/cover;
        }

        /* DESKTOP GRID */
        #desktop {
            height: calc(100vh - 48px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-auto-flow: column;
            gap: 10px;
        }

        .icon {
            width: 80px; height: 90px;
            display: flex; flex-direction: column; align-items: center;
            color: white; font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            cursor: pointer; transition: background 0.2s; border-radius: 4px;
            padding-top: 10px;
        }
        .icon:hover { background: rgba(255,255,255,0.1); }
        .icon img { width: 42px; margin-bottom: 5px; pointer-events: none; }

        /* ADVANCED WINDOW SYSTEM */
        .window {
            position: absolute;
            min-width: 300px; min-height: 200px;
            background: var(--win-bg);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none; flex-direction: column;
            backdrop-filter: var(--glass);
            border: 1px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }

        .win-header {
            height: 35px; background: rgba(255,255,255,0.5);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; cursor: move; user-select: none;
        }

        .win-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }

        .win-content { flex: 1; padding: 15px; overflow-y: auto; }

        /* TASKBAR */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: var(--taskbar-bg); backdrop-filter: var(--glass);
            display: flex; align-items: center; padding: 0 10px; z-index: 99999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #taskbar-icons { flex: 1; display: flex; justify-content: center; gap: 5px; }
        .task-item { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; transition: 0.2s; cursor: pointer;
        }
        .task-item:hover { background: rgba(255,255,255,0.1); }
        .task-item.active { border-bottom: 3px solid var(--accent); }

        #clock { color: white; font-size: 12px; text-align: right; min-width: 80px; }

        /* VIDEO CALL STYLING */
        #call-ui { background: #000; position: relative; height: 100%; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { 
            position: absolute; bottom: 10px; right: 10px; width: 100px; 
            border-radius: 5px; border: 1px solid white; 
        }

        /* NOTIFICATIONS */
        #notif-area { position: fixed; top: 20px; right: 20px; z-index: 1000000; }
        .notif {
            background: rgba(30,30,30,0.9); color: white; padding: 15px;
            border-radius: 8px; margin-bottom: 10px; min-width: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slide 0.3s ease-out;
        }
        @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="desktop">
    <div class="icon" onclick="WindowManager.open('friends')">
        <img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png">
        <span>Friends</span>
    </div>
    <div class="icon" onclick="WindowManager.open('chat')">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        <span>Chat</span>
    </div>
    <div class="icon" onclick="WindowManager.open('call')">
        <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png">
        <span>Video Call</span>
    </div>
</div>

<div id="friends" class="window" style="width:300px; height:400px;">
    <div class="win-header"><span>Friends</span><div class="win-controls"><div class="win-btn close" onclick="WindowManager.close('friends')"></div></div></div>
    <div class="win-content">
        <div id="user-id-display" style="font-size: 10px; color: #666; margin-bottom: 10px;"></div>
        <p>Online Users:</p>
        <ul id="user-list"></ul>
    </div>
</div>

<div id="call" class="window" style="width:500px; height:350px;">
    <div class="win-header"><span>Video Call</span><div class="win-controls"><div class="win-btn close" onclick="WindowManager.close('call')"></div></div></div>
    <div class="win-content" id="call-ui">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
    </div>
</div>

<div id="notif-area"></div>

<div id="taskbar">
    <div style="cursor:pointer">🏁</div>
    <div id="taskbar-icons"></div>
    <div id="clock">12:00 PM</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, onDisconnect, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- CONFIG & INIT ---
    const firebaseConfig = {
        apiKey: "AIzaSyCnJPv3cclaIArwUPKEq5of0NyafJ7d4QI",
        authDomain: "replicanewos3030.firebaseapp.com",
        projectId: "replicanewos3030",
        databaseURL: "https://replicanewos3030-default-rtdb.firebaseio.com" // Ensure this is correct
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const myId = "User_" + Math.random().toString(36).substring(2, 7);
    document.getElementById('user-id-display').innerText = `Your ID: ${myId}`;

    // --- WINDOW MANAGER (Advanced Draggable Logic) ---
    window.WindowManager = {
        highestZ: 1000,
        open(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            win.style.zIndex = ++this.highestZ;
            this.updateTaskbar();
        },
        close(id) {
            document.getElementById(id).style.display = 'none';
            this.updateTaskbar();
        },
        updateTaskbar() {
            const container = document.getElementById('taskbar-icons');
            container.innerHTML = '';
            document.querySelectorAll('.window').forEach(win => {
                if(win.style.display === 'flex') {
                    const item = document.createElement('div');
                    item.className = 'task-item active';
                    item.innerHTML = `<span>🔲</span>`;
                    item.onclick = () => this.open(win.id);
                    container.appendChild(item);
                }
            });
        }
    };

    // Make windows draggable
    document.querySelectorAll('.win-header').forEach(header => {
        let isDragging = false, x, y;
        const win = header.parentElement;
        header.onmousedown = (e) => {
            isDragging = true;
            x = e.clientX - win.offsetLeft;
            y = e.clientY - win.offsetTop;
            win.style.zIndex = ++WindowManager.highestZ;
        };
        window.onmousemove = (e) => {
            if (!isDragging) return;
            win.style.left = (e.clientX - x) + 'px';
            win.style.top = (e.clientY - y) + 'px';
            win.style.transform = 'none';
        };
        window.onmouseup = () => isDragging = false;
    });

    // --- WEBRTC & SIGNALING ---
    let pc;
    let localStream;
    const servers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    async function initWebRTC(targetId, isCaller) {
        pc = new RTCPeerConnection(servers);
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.ontrack = e => document.getElementById("remoteVideo").srcObject = e.streams[0];
        
        // ICE Candidate Handling (Crucial for connectivity)
        pc.onicecandidate = e => {
            if (e.candidate) {
                const candRef = ref(db, `signals/${targetId}/candidates`);
                push(candRef, e.candidate.toJSON());
            }
        };
    }

    // Call Action
    window.startCall = async (targetId) => {
        WindowManager.open('call');
        await initWebRTC(targetId, true);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const callRef = ref(db, `signals/${targetId}`);
        await set(callRef, { offer: { sdp: offer.sdp, type: offer.type }, from: myId });

        // Listen for Answer
        onValue(ref(db, `signals/${myId}/answer`), async snap => {
            if (snap.val() && !pc.currentRemoteDescription) {
                await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            }
        });
    };

    // Listen for Incoming
    onValue(ref(db, `signals/${myId}`), async snap => {
        const data = snap.val();
        if (data && data.offer && !pc) {
            showNotification(data.from, async () => {
                WindowManager.open('call');
                await initWebRTC(data.from, false);
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                update(ref(db, `signals/${data.from}`), { answer: { sdp: answer.sdp, type: answer.type } });
            });
        }
        // Listen for candidates
        if (data && data.candidates && pc) {
            Object.values(data.candidates).forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
        }
    });

    // --- SYSTEM UTILS ---
    function showNotification(from, onAccept) {
        const div = document.createElement('div');
        div.className = 'notif';
        div.innerHTML = `<strong>Incoming Call</strong><br>${from}<br>
            <button onclick="this.parentElement.remove()">Ignore</button>
            <button id="accept-btn" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:4px;">Accept</button>`;
        div.querySelector('#accept-btn').onclick = () => { onAccept(); div.remove(); };
        document.getElementById('notif-area').appendChild(div);
    }

    // Presence & User List
    const userListRef = ref(db, 'presence');
    set(ref(db, `presence/${myId}`), { name: myId, status: 'online' });
    onDisconnect(ref(db, `presence/${myId}`)).remove();

    onValue(userListRef, snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        const users = snap.val();
        for (let id in users) {
            if (id !== myId) {
                const li = document.createElement('li');
                li.innerHTML = `${id} <button onclick="startCall('${id}')">Call</button>`;
                list.appendChild(li);
            }
        }
    });

    setInterval(() => {
        document.getElementById("clock").innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }, 1000);

</script>
</body>
</html>
