<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Lab</title>
<style>
:root { font-family: "Segoe UI", system-ui, sans-serif; color-scheme: dark; }
body { margin: 0; min-height: 100vh; background: #0f172a; color: white; }
main { display: grid; grid-template-columns: minmax(240px, 360px) 1fr; gap: 20px; min-height: 100vh; }
aside { padding: 26px; background: rgba(255,255,255,.06); }
h1 { margin-top: 0; }
label { display: grid; gap: 8px; margin: 18px 0; color: #cbd5e1; }
input[type="color"] { width: 100%; height: 70px; border: 0; background: transparent; }
input[type="range"] { width: 100%; accent-color: #38bdf8; }
button { border: 0; border-radius: 12px; padding: 12px 14px; font-weight: 800; cursor: pointer; background: #38bdf8; color: #082f49; }
.palette { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; padding: 26px; align-content: center; }
.swatch { min-height: 150px; border-radius: 22px; padding: 14px; display: flex; align-items: end; justify-content: space-between; box-shadow: 0 24px 70px rgba(0,0,0,.28); cursor: pointer; }
.swatch span { background: rgba(0,0,0,.38); padding: 7px 10px; border-radius: 999px; font-weight: 800; }
@media (max-width: 720px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<main>
  <aside>
    <h1>Color Lab</h1>
    <p>Create quick palettes and click any swatch to copy its hex value.</p>
    <label>Seed color <input id="seed" type="color" value="#38bdf8"></label>
    <label>Spread <input id="spread" type="range" min="10" max="90" value="42"></label>
    <button id="random">Random Palette</button>
  </aside>
  <section class="palette" id="palette" aria-live="polite"></section>
</main>
<script>
const seed = document.getElementById("seed");
const spread = document.getElementById("spread");
const palette = document.getElementById("palette");
function hexToHsl(hex) {
  const r = parseInt(hex.slice(1,3),16) / 255;
  const g = parseInt(hex.slice(3,5),16) / 255;
  const b = parseInt(hex.slice(5,7),16) / 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > .5 ? d / (2 - max - min) : d / (max + min);
    h = max === r ? (g - b) / d + (g < b ? 6 : 0) : max === g ? (b - r) / d + 2 : (r - g) / d + 4;
    h *= 60;
  }
  return [h, s * 100, l * 100];
}
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return `#${[f(0), f(8), f(4)].map(value => Math.round(value * 255).toString(16).padStart(2, "0")).join("")}`;
}
function render() {
  const [h, s, l] = hexToHsl(seed.value);
  const delta = Number(spread.value);
  palette.innerHTML = "";
  [-2, -1, 0, 1, 2].forEach(step => {
    const color = hslToHex((h + step * delta + 360) % 360, Math.min(92, s + Math.abs(step) * 5), Math.max(24, Math.min(76, l + step * 3)));
    const card = document.createElement("button");
    card.className = "swatch";
    card.style.background = color;
    card.innerHTML = `<span>${color.toUpperCase()}</span><span>Copy</span>`;
    card.onclick = async () => navigator.clipboard?.writeText(color.toUpperCase());
    palette.appendChild(card);
  });
}
document.getElementById("random").onclick = () => { seed.value = `#${Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0")}`; render(); };
seed.oninput = spread.oninput = render;
render();
</script>
</body>
</html>
