<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Studio</title>
<style>
:root { font-family: "Segoe UI", system-ui, sans-serif; color-scheme: dark; }
body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #020617, #1e1b4b); color: #f8fafc; }
main { max-width: 1040px; margin: 0 auto; padding: 28px; }
h1 { margin: 0; font-size: clamp(2.2rem, 7vw, 5rem); letter-spacing: -.08em; }
.layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; margin-top: 22px; }
.panel, .preview, .preset { background: rgba(15, 23, 42, .76); border: 1px solid rgba(255,255,255,.13); border-radius: 24px; box-shadow: 0 24px 70px rgba(0,0,0,.26); }
.panel { padding: 20px; }
label { display: grid; gap: 8px; margin: 14px 0; color: #cbd5e1; font-weight: 700; }
input, select, button { font: inherit; border: 0; border-radius: 14px; padding: 11px 13px; }
input[type="color"] { width: 100%; height: 56px; padding: 4px; background: rgba(255,255,255,.08); }
input[type="range"], select { width: 100%; accent-color: #38bdf8; background: rgba(255,255,255,.08); color: white; }
button { cursor: pointer; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #c084fc); color: #020617; }
button.secondary { background: rgba(255,255,255,.1); color: #e2e8f0; }
.preview { min-height: 420px; padding: 24px; background: var(--wallpaper); overflow: hidden; }
.window { max-width: 520px; margin: 44px auto 0; border-radius: var(--radius); background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(var(--blur)); box-shadow: 0 30px 90px rgba(0,0,0,.38); }
.title { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.12); }
.content { padding: 22px; }
.pill { display: inline-block; background: var(--accent); color: #020617; padding: 8px 12px; border-radius: 999px; font-weight: 900; }
.presets { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
.preset { padding: 14px; cursor: pointer; text-align: left; color: white; }
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
@media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<main>
  <p>Customization</p>
  <h1>Theme Studio</h1>
  <div class="layout">
    <section class="panel" aria-label="Theme controls">
      <label>Accent <input id="accent" type="color" value="#38bdf8"></label>
      <label>Glass strength <input id="glass" type="range" min="4" max="28" value="12"></label>
      <label>Corner radius <input id="radius" type="range" min="8" max="34" value="22"></label>
      <label>Blur <input id="blur" type="range" min="4" max="36" value="20"></label>
      <label>Wallpaper
        <select id="wallpaper">
          <option value="aurora">Aurora Night</option>
          <option value="sunset">Neon Sunset</option>
          <option value="forest">Emerald Grid</option>
          <option value="mono">Mono Glass</option>
        </select>
      </label>
      <div class="actions">
        <button id="apply">Apply to ReplicaOS</button>
        <button class="secondary" id="save">Save preset</button>
      </div>
    </section>
    <section>
      <div class="preview" id="preview">
        <div class="window">
          <div class="title"><strong>ReplicaOS Window</strong><span>● ● ●</span></div>
          <div class="content">
            <span class="pill">Live Preview</span>
            <h2>Your desktop, your vibe.</h2>
            <p>Theme Studio sends accent, wallpaper, blur, and radius settings to the parent ReplicaOS shell when installed.</p>
          </div>
        </div>
      </div>
      <div class="presets" id="presets"></div>
    </section>
  </div>
</main>
<script>
const STORAGE_KEY = "replicaos_theme_studio";
const PRESET_KEY = "replicaos_theme_presets";
const wallpapers = {
  aurora: "radial-gradient(circle at 20% 20%, #22d3ee, transparent 28%), radial-gradient(circle at 80% 0%, #a855f7, transparent 32%), linear-gradient(135deg, #020617, #1e1b4b)",
  sunset: "radial-gradient(circle at 15% 25%, #fb7185, transparent 30%), radial-gradient(circle at 85% 20%, #facc15, transparent 24%), linear-gradient(135deg, #2e1065, #020617)",
  forest: "radial-gradient(circle at 25% 20%, #34d399, transparent 30%), linear-gradient(135deg, #022c22, #020617)",
  mono: "linear-gradient(135deg, #111827, #020617)"
};
const controls = ["accent", "glass", "radius", "blur", "wallpaper"].reduce((map, id) => ({ ...map, [id]: document.getElementById(id) }), {});
const preview = document.getElementById("preview");
const presets = document.getElementById("presets");
function theme() {
  return {
    accent: controls.accent.value,
    glass: `rgba(255,255,255,${Number(controls.glass.value) / 100})`,
    border: `rgba(255,255,255,${Math.min(0.45, Number(controls.glass.value) / 70)})`,
    radius: controls.radius.value,
    blur: controls.blur.value,
    wallpaper: wallpapers[controls.wallpaper.value]
  };
}
function paint() {
  const next = theme();
  preview.style.setProperty("--accent", next.accent);
  preview.style.setProperty("--glass", next.glass);
  preview.style.setProperty("--border", next.border);
  preview.style.setProperty("--radius", `${next.radius}px`);
  preview.style.setProperty("--blur", `${next.blur}px`);
  preview.style.setProperty("--wallpaper", next.wallpaper);
}
function renderPresets() {
  const saved = JSON.parse(localStorage.getItem(PRESET_KEY) || "[]");
  presets.innerHTML = saved.map((item, index) => `<button class="preset" data-index="${index}"><strong>${item.name}</strong><br><small>${item.accent}</small></button>`).join("");
}
Object.values(controls).forEach(control => control.addEventListener("input", paint));
document.getElementById("apply").onclick = () => {
  const next = theme();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  window.parent.postMessage({ type: "replicaos:theme", payload: next }, "*");
};
document.getElementById("save").onclick = () => {
  const saved = JSON.parse(localStorage.getItem(PRESET_KEY) || "[]");
  saved.unshift({ name: `Preset ${saved.length + 1}`, ...theme() });
  localStorage.setItem(PRESET_KEY, JSON.stringify(saved.slice(0, 8)));
  renderPresets();
};
presets.onclick = event => {
  const button = event.target.closest("button[data-index]");
  if (!button) return;
  const saved = JSON.parse(localStorage.getItem(PRESET_KEY) || "[]")[Number(button.dataset.index)];
  if (!saved) return;
  controls.accent.value = saved.accent;
  controls.radius.value = saved.radius;
  controls.blur.value = saved.blur;
  const wallpaperName = Object.keys(wallpapers).find(name => wallpapers[name] === saved.wallpaper) || "aurora";
  controls.wallpaper.value = wallpaperName;
  paint();
};
paint();
renderPresets();
</script>
</body>
</html>
