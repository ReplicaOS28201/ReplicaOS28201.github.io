<!-- ================= DOCK ================= -->
<div class="dock">
  <button onclick="openWindow('calc')">Calc</button>
  <button onclick="openWindow('notes')">Notes</button>
  <button onclick="openWindow('browser')">Web</button>
</div>
<script>
  // ================= DOCK COMMUNICATOR =================
window.Dock = (() => {

  let mainChannel = null;

  function connectMain(callback) {
    mainChannel = callback;
  }

  function init() {
    const dock = document.querySelector(".dock");

    dock.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        const app = btn.dataset.app;

        // 1. Notify MAIN (UI control)
        if (mainChannel) {
          mainChannel({
            type: "open-app",
            app
          });
        }

        // 2. Talk to SYSTEM
        if (window.System) {
          System.open(app);
        }
      });
    });
  }

  // Send data from apps → system via dock
  function send(app, data) {
    if (!window.System) return null;
    return System.send(app, data);
  }

  return {
    init,
    connectMain,
    send
  };

})();
</script>
<style>
.dock {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 40px;
  z-index: 9999;
}

.dock button {
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.dock button:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}
</style>
