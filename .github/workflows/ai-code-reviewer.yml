name: Gemini Elite Code Architect

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Only run if actual code files change to save API quota
    paths:
      - '**.js'
      - '**.ts'
      - '**.py'
      - '**.go'
      - '**.cpp'
      - '**.java'
      - '**.html'
      - '**.css'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  advanced-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gets full history for better context

      - name: Gemini Advanced Analysis
        uses: google-gemini/generative-ai-gh-action@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-1.5-pro' # Using Pro for deeper reasoning
          prompt: |
            You are a Senior Principal Engineer and Security Researcher. 
            Review the following PR changes with high rigor:
            
            1. **Logic & Architecture**: Does this change break existing patterns? Is there a more scalable way to write this?
            2. **Security Deep-Scan**: Look for SQL injection, XSS, insecure dependencies, or exposed secrets.
            3. **Language-Specific Optimization**: 
               - If Python: Suggest vectorized operations or async/await improvements.
               - If JS/TS: Check for memory leaks or inefficient re-renders.
               - If CSS/HTML: Check for accessibility (A11y) and responsive flaws.
            4. **Edge Cases**: Identify what happens if inputs are null, empty, or unexpected.
            
            Format your response with:
            - **Summary**: A high-level overview of the impact.
            - **Critical Finds**: Any bugs that will crash the app (use 🚨).
            - **Suggestions**: Refactoring tips for better readability (use 💡).
            - **Security**: Security observations (use 🔒).
            
            If the code is flawless and follows all SOLID principles, celebrate the author!
