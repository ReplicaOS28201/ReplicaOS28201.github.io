<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReplicaOS Admin Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #0a0a0a;
            --border: #222;
            --accent: #00ff41; /* Terminal Green */
            --danger: #ff4444;
        }

        body {
            margin:0;
            background: var(--bg);
            color:white;
            font-family: 'Courier New', monospace;
            display:flex;
            height:100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #111;
            padding: 20px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel {
            flex:1;
            overflow-y:auto;
            padding:15px;
            border-right:1px solid var(--border);
        }

        h2 { 
            margin-top:0; 
            font-size: 1.2rem; 
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        button {
            background:#1a1a1a;
            color:white;
            border:1px solid #444;
            padding:8px 12px;
            cursor:pointer;
            transition: 0.2s;
        }

        button:hover { background:#333; border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .device {
            padding:10px;
            border-bottom:1px solid var(--border);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .status-active { color: var(--accent); }
        .status-banned { color: var(--danger); }

        #map {
            height:400px;
            width:100%;
            border:1px solid #333;
            margin-top: 10px;
        }

        .log-entry {
            font-size: 0.75rem;
            margin-bottom: 8px;
            padding: 5px;
            background: #111;
        }

        #logout-btn { position: fixed; bottom: 10px; right: 10px; font-size: 0.7rem; }
        .hidden { display: none !important; }
    </style>
</head>

<body>

<div id="auth-overlay">
    <div class="login-box">
        <h3>REPLICA_OS LOGIN</h3>
        <input type="email" id="email" placeholder="Admin Email" style="padding:5px">
        <input type="password" id="password" placeholder="Password" style="padding:5px">
        <button id="login-btn">Secure Login</button>
    </div>
</div>

<div class="panel">
    <h2>🌍 Devices</h2>
    <div id="devices"></div>
</div>

<div class="panel">
    <h2>🗺️ World Operations</h2>
    <div id="map"></div>
    <button id="logout-btn">SYSTEM_LOGOUT</button>
</div>

<div class="panel">
    <h2>🔑 Access Management</h2>
    <button onclick="generateKey()" id="key-gen-btn">Create New Session Key</button>
    <div id="keys" style="margin-top:10px"></div>
    
    <h2 style="margin-top:30px">📊 System Logs</h2>
    <div id="logs"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

// REPLACE WITH YOUR ACTUAL FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyC9P1pSA8sVyaQEGaA5sA8ThPYgmVAFab8",
    authDomain: "replicaos.firebaseapp.com",
    projectId: "replicaos",
    storageBucket: "replicaos.firebasestorage.app",
    messagingSenderId: "34115825829",
    appId: "1:34115825829:web:246973f8280df47f221d4c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app);

/* ================= AUTH LOGIC ================= */

const loginBtn = document.getElementById('login-btn');
const overlay = document.getElementById('auth-overlay');

loginBtn.onclick = async () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    try {
        await signInWithEmailAndPassword(auth, e, p);
    } catch (err) {
        alert("Authentication Failed: " + err.message);
    }
};

document.getElementById('logout-btn').onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if (user) {
        overlay.classList.add('hidden');
        initDashboard();
    } else {
        overlay.classList.remove('hidden');
    }
});

/* ================= DASHBOARD LOGIC ================= */

function initDashboard() {
    // 1. Initialize Map
    const map = L.map("map").setView([20, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const markers = {};

    // 2. Listen to Devices
    onSnapshot(collection(db, "devices"), (snap) => {
        const box = document.getElementById("devices");
        box.innerHTML = "";
        
        snap.forEach(d => {
            const data = d.data();
            const div = document.createElement("div");
            div.className = "device";
            div.innerHTML = `
                <b>ID: ${d.id}</b><br>
                IP: ${data.ip || "---"}<br>
                STATUS: <span class="${data.banned ? 'status-banned' : 'status-active'}">
                    ${data.banned ? "⛔ BANNED" : "🟢 ACTIVE"}
                </span><br>
                <button onclick="kickDevice('${d.id}')">KICK</button>
                <button onclick="banDevice('${d.id}')" style="color:red">BAN</button>
            `;
            box.appendChild(div);

            if (data.location) {
                if (markers[d.id]) {
                    markers[d.id].setLatLng([data.location.lat, data.location.lng]);
                } else {
                    markers[d.id] = L.marker([data.location.lat, data.location.lng])
                        .addTo(map)
                        .bindPopup(`Device: ${d.id}`);
                }
            }
        });
    });

    // 3. Listen to Logs (Limit to last 20 for performance)
    const logQuery = query(collection(db, "logs"), orderBy("time", "desc"), limit(20));
    onSnapshot(logQuery, (snap) => {
        const logBox = document.getElementById("logs");
        logBox.innerHTML = "";
        snap.forEach(d => {
            const v = d.data();
            const time = v.time ? new Date(v.time).toLocaleTimeString() : '??';
            logBox.innerHTML += `
                <div class="log-entry">
                    [${time}] ${v.deviceId}<br>
                    ACTION: <b>${v.action}</b>
                </div>
            `;
        });
    });
}

/* ================= ACTIONS ================= */

window.kickDevice = async (id) => {
    if(!confirm("Force disconnect device?")) return;
    await updateDoc(doc(db, "devices", id), { lastSeen: 0 });
};

window.banDevice = async (id) => {
    if(!confirm("PERMANENTLY ban this device?")) return;
    await updateDoc(doc(db, "devices", id), { banned: true });
};

window.generateKey = async () => {
    const btn = document.getElementById('key-gen-btn');
    btn.disabled = true;
    try {
        const generateKeyFn = httpsCallable(functions, "generateKey");
        const res = await generateKeyFn();
        alert("NEW KEY GENERATED:\n" + res.data.key);
    } catch (e) {
        alert("Error: " + e.message);
    } finally {
        btn.disabled = false;
    }
};

</script>

</body>
</html>
