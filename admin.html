<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ReplicaOS Admin Control Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family: monospace;
  display:flex;
  height:100vh;
}

.panel {
  flex:1;
  overflow:auto;
  padding:10px;
  border-right:1px solid #222;
}

h2 { margin-top:0; }

button {
  background:#222;
  color:white;
  border:1px solid #444;
  padding:5px 8px;
  margin:4px;
  cursor:pointer;
}

button:hover { background:#333; }

.device {
  padding:8px;
  border-bottom:1px solid #222;
}

#map {
  height:300px;
  width:100%;
  border:1px solid #333;
}
</style>

</head>

<body>

<!-- ================= DEVICES ================= -->
<div class="panel">
  <h2>🌍 Devices</h2>
  <div id="devices"></div>
</div>

<!-- ================= MAP ================= -->
<div class="panel">
  <h2>🗺️ Live World Map</h2>
  <div id="map"></div>
</div>

<!-- ================= KEYS ================= -->
<div class="panel">
  <h2>🔑 Key Generator</h2>
  <button onclick="generateKey()">Create Key</button>
  <div id="keys"></div>
</div>

<!-- ================= LOGS ================= -->
<div class="panel">
  <h2>📊 Login Logs</h2>
  <div id="logs"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getFunctions,
  httpsCallable
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

/* ================= FIREBASE ================= */

const app = initializeApp({
  apiKey: "AIzaSyC9P1pSA8sVyaQEGaA5sA8ThPYgmVAFab8",
  authDomain: "replicaos.firebaseapp.com",
  projectId: "replicaos",
  storageBucket: "replicaos.firebasestorage.app",
  messagingSenderId: "34115825829",
  appId: "1:34115825829:web:246973f8280df47f221d4c"
});

const db = getFirestore(app);
const functions = getFunctions(app);

/* ================= CLOUD FUNCTION ================= */

const generateKeyFn = httpsCallable(functions, "generateKey");

/* ================= MAP ================= */

const map = L.map("map").setView([20, 0], 2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

const markers = {};

/* ================= DEVICES ================= */

onSnapshot(collection(db, "devices"), (snap) => {

  const box = document.getElementById("devices");
  box.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    const div = document.createElement("div");
    div.className = "device";

    div.innerHTML = `
      <b>${d.id}</b><br>
      IP: ${data.ip || "unknown"}<br>
      ${data.banned ? "⛔ BANNED" : "🟢 ACTIVE"}<br>

      <button onclick="kick('${d.id}')">Kick</button>
      <button onclick="ban('${d.id}')">Ban</button>
    `;

    box.appendChild(div);

    /* ================= MAP UPDATE ================= */

    if (data.location) {
      if (markers[d.id]) {
        markers[d.id].setLatLng([data.location.lat, data.location.lng]);
      } else {
        markers[d.id] = L.marker([
          data.location.lat,
          data.location.lng
        ]).addTo(map).bindPopup(d.id);
      }
    }
  });
});

/* ================= KICK ================= */

window.kick = async (id) => {
  await updateDoc(doc(db, "devices", id), {
    lastSeen: 0
  });
};

/* ================= BAN ================= */

window.ban = async (id) => {
  await updateDoc(doc(db, "devices", id), {
    banned: true
  });
};

/* ================= KEY GENERATION ================= */

window.generateKey = async () => {
  try {
    const res = await generateKeyFn();
    alert("KEY CREATED: " + res.data.key);
  } catch (e) {
    alert("Not authorized (admin only)");
  }
};

/* ================= LOGS ================= */

onSnapshot(collection(db, "logs"), (snap) => {

  const box = document.getElementById("logs");
  box.innerHTML = "";

  snap.forEach(d => {
    const v = d.data();

    box.innerHTML += `
      <div>
        [${new Date(v.time).toLocaleString()}]<br>
        ${v.deviceId} | ${v.ip || "no-ip"} | ${v.action}
      </div>
    `;
  });

});

</script>

</body>
</html>
